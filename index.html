<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Chef-Live-Monitor</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #333; color: white; }
        .sub-row { background: #fff5e6; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="no-print">
        <h1>📊 Live-Übersicht (Chef)</h1>
        <button onclick="window.print()">📥 Monatsabschluss Drucken (PDF)</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Datum</th>
                <th>Hotel</th>
                <th>Zimmer</th>
                <th>Mitarbeiter</th>
                <th>Typ</th>
                <th>Stunden</th>
            </tr>
        </thead>
        <tbody id="liveDaten"></tbody>
    </table>

<script>
    // Dieselbe Firebase Config wie oben einfügen!
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    db.collection("baustellen_daten").orderBy("datum", "desc")
      .onSnapshot((snapshot) => {
        let html = "";
        snapshot.forEach(doc => {
            const d = doc.data();
            const datum = d.datum ? d.datum.toDate().toLocaleDateString() : "...";
            html += `<tr class="${d.istSub ? 'sub-row' : ''}">
                <td>${datum}</td>
                <td>${d.hotel}</td>
                <td>${d.zimmer}</td>
                <td>${d.name}</td>
                <td>${d.istSub ? 'SUB' : 'EIGEN'}</td>
                <td>${d.stunden}</td>
            </tr>`;
        });
        document.getElementById('liveDaten').innerHTML = html;
      });
</script>
</body>
</html>
