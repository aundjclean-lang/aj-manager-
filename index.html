<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="A&J Manager">
<meta name="theme-color" content="#08090d">
<title>A&J Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08090d;--bg2:#0e1118;--bg3:#131720;--navy3:#181d28;
  --gold:#d4a843;--gold2:#f0c96a;--gold3:rgba(212,168,67,0.1);
  --cream:#e8e0d0;--muted:#5a6472;
  --border:rgba(212,168,67,0.12);--border2:rgba(212,168,67,0.22);
  --green:#4caf7d;--red:#e05555;--blue:#5b9bd5;
}
html,body{background:var(--bg);color:var(--cream);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 0%,rgba(212,168,67,0.08) 0%,transparent 60%)}
.login-box{background:var(--bg2);border:1px solid rgba(212,168,67,0.2);padding:32px;max-width:360px;width:100%;text-align:center;border-radius:10px;box-shadow:0 24px 80px rgba(0,0,0,0.6)}
.login-logo{font-family:Georgia,serif;font-size:3rem;font-weight:900;color:var(--gold)}
.login-sub{font-size:0.5rem;letter-spacing:0.4em;text-transform:uppercase;color:var(--muted);margin:4px 0 24px}
.role-btn{width:100%;background:transparent;border:1px solid var(--border2);color:var(--cream);font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;padding:14px;cursor:pointer;border-radius:3px;text-align:left;display:flex;align-items:center;gap:12px;margin-bottom:10px;transition:all 0.2s}
.role-btn.gold{background:var(--gold);color:#08090d;font-weight:700;border-color:var(--gold)}
.role-desc{font-size:0.6rem;color:var(--muted);display:block;margin-top:2px;text-transform:none;letter-spacing:0.04em;font-weight:300}
.role-btn.gold .role-desc{color:#08090d;opacity:0.7}
/* APP */
.app-wrap{display:none}
.app-wrap.show{display:block}
.topbar{background:rgba(13,17,24,0.97);border-bottom:1px solid rgba(212,168,67,0.15);padding:11px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.tb-logo{font-family:Georgia,serif;font-size:1.15rem;font-weight:900;color:var(--gold)}
.tb-info{font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.tb-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.out-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;padding:5px 10px;cursor:pointer;border-radius:2px}
.tabs{background:var(--bg2);border-bottom:1px solid rgba(212,168,67,0.1);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 14px;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold);background:rgba(212,168,67,0.06)}
.content{padding:14px}
/* COMPONENTS */
.card{background:var(--bg2);border:1px solid rgba(212,168,67,0.1);border-radius:6px;padding:14px;margin-bottom:12px}
.card-title{font-family:Georgia,serif;font-size:0.95rem;color:var(--gold);margin-bottom:12px}
.inp{background:rgba(255,255,255,0.04);border:1px solid rgba(212,168,67,0.15);color:var(--cream);padding:8px 10px;font-size:0.8rem;outline:none;border-radius:4px;width:100%;transition:border-color 0.15s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--muted);font-size:0.74rem}
.lbl{font-size:0.52rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;display:block}
.frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.ff{display:flex;flex-direction:column;flex:1;min-width:90px}
.btn{background:transparent;border:1px solid var(--border2);color:var(--gold);font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;padding:7px 14px;cursor:pointer;border-radius:2px;transition:all 0.2s;white-space:nowrap}
.btn:active{opacity:0.7}
.btn.primary{background:var(--gold);color:#08090d;font-weight:700;border-color:var(--gold)}
.btn.sm{padding:5px 10px;font-size:0.56rem}
.btn.danger{border-color:rgba(200,80,80,0.3);color:#e88}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(95px,1fr));gap:8px;margin-bottom:12px}
.stat{background:var(--bg3);border:1px solid rgba(212,168,67,0.1);padding:12px;text-align:center;border-radius:5px}
.stat-v{font-family:Georgia,serif;font-size:1.45rem;color:var(--gold2);display:block;line-height:1}
.stat-l{font-size:0.5rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:3px;display:block}
/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:0.76rem}
.tbl th{padding:6px 7px;text-align:left;font-size:0.52rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border2);font-weight:400}
.tbl td{padding:7px 7px;border-bottom:1px solid rgba(30,58,82,0.4);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:0.6rem;font-weight:600}
.b-ok{background:rgba(45,106,79,0.15);color:#5dbf8a}
.b-warn{background:rgba(181,69,27,0.15);color:#f4845f}
.b-grey{background:rgba(255,255,255,0.06);color:var(--muted)}
.b-gold{background:var(--gold3);color:var(--gold2);border:1px solid var(--border2)}
/* TA / SZ / LU inputs */
.ta-wrap,.sz-wrap,.lu-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.ta-tbl,.sz-tbl,.lu-tbl{border-collapse:collapse;width:100%;font-size:0.78rem}
.ta-tbl th,.sz-tbl thead th,.lu-tbl th{background:var(--navy3);color:var(--gold);font-size:0.54rem;letter-spacing:0.07em;text-transform:uppercase;font-weight:600;padding:6px 3px;text-align:center;border:1px solid var(--border);line-height:1.3}
.sz-tbl thead th.ac{background:#071510;color:#81c784}
.sz-tbl thead th.zc{background:#07101a;color:#90caf9}
.ta-tbl td,.sz-tbl tbody td,.lu-tbl td{border:1px solid rgba(30,58,82,0.5);padding:0;vertical-align:middle}
.ta-tbl tr:nth-child(even) td,.sz-tbl tbody tr:nth-child(even) td,.lu-tbl tr:nth-child(even) td{background:rgba(8,18,28,0.35)}
.sz-tbl tbody tr.filled td{background:rgba(20,50,25,0.18)}
.ta-tbl tr.ges-row td,.lu-tbl tr.sum-row td,.lu-tbl tr.mid-row td{background:var(--navy3)!important;border-top:2px solid var(--gold)}
.ti,.sz-inp,.lu-inp{width:100%;background:transparent;border:none;outline:none;font-size:0.78rem;padding:5px 3px;text-align:center;color:var(--cream)}
.ti.nm{text-align:left;padding-left:7px}
.ti.zi,.sz-inp.zi,.lu-inp.zi{color:var(--gold2);font-weight:700;background:rgba(0,80,160,0.12)}
.ti.ai,.sz-inp.ai,.lu-inp.ai{color:#81c784;font-weight:700;cursor:default;background:rgba(20,80,40,0.15)}
.sz-inp.at{color:#90caf9;font-weight:700;cursor:default;background:rgba(20,60,120,0.2)}
.sz-inp.pa{color:rgba(200,168,75,0.5);cursor:default}
.sz-nr,.lu-nr{text-align:center;font-weight:600;font-size:0.74rem;color:var(--muted);padding:0 3px;background:rgba(0,0,0,0.2);min-width:24px}
.sz-ges td{background:var(--navy3)!important;border-top:2px solid var(--gold)}
.ges-v{font-family:Georgia,serif;font-size:0.88rem;color:var(--gold);text-align:center;padding:5px 3px}
/* SIGNATURES */
.sig-box{background:var(--navy3);border:1px solid var(--border2);border-radius:3px;padding:12px;margin-top:10px}
.sig-lbl{font-size:0.56rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.sig-wrap{border:2px dashed var(--border2);border-radius:2px;background:rgba(255,255,255,0.02);position:relative;touch-action:none}
.sig-canvas{display:block;width:100%;cursor:crosshair;touch-action:none}
.sig-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.68rem;color:var(--muted);pointer-events:none}
.sig-row{display:flex;gap:8px;margin-top:6px;align-items:center}
/* DIENSTPLAN */
.dp-tbl{border-collapse:separate;border-spacing:3px;width:100%}
.dp-name-inp{width:100%;background:transparent;border:1px solid rgba(212,168,67,0.18);border-radius:3px;color:var(--gold);font-size:0.78rem;font-weight:600;padding:5px 7px;outline:none}
.dp-name-inp:focus{border-color:var(--gold);background:rgba(212,168,67,0.04)}
.dp-cell{border-radius:4px;padding:4px 5px;min-height:56px;display:flex;flex-direction:column;gap:3px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);transition:all 0.15s}
.dp-cell:hover{filter:brightness(1.15)}
.dp-cell.st-empty{background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.1)}
.dp-cell.st-A{background:rgba(34,134,58,0.18);border-color:rgba(34,134,58,0.35)}
.dp-cell.st-F{background:rgba(9,105,218,0.15);border-color:rgba(9,105,218,0.3)}
.dp-cell.st-U{background:rgba(154,103,0,0.2);border-color:rgba(154,103,0,0.4)}
.dp-cell.st-K{background:rgba(207,34,46,0.18);border-color:rgba(207,34,46,0.35)}
.dp-cell.st-N{background:rgba(110,119,129,0.2);border-color:rgba(110,119,129,0.3)}
.dp-time{font-size:0.7rem;font-weight:600;text-align:center;color:var(--cream)}
.dp-status{font-size:0.6rem;text-align:center;margin-top:auto}
.dp-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;padding:20px}
.dp-modal.open{display:flex}
.dp-modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:20px;width:100%;max-width:320px}
/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;padding:10px 18px;border-radius:3px;font-size:0.74rem;font-weight:600;z-index:9999;display:none;border:1px solid;max-width:300px}
.toast.ok{background:rgba(45,106,79,0.15);color:#5dbf8a;border-color:rgba(45,106,79,0.4)}
.toast.err{background:rgba(181,69,27,0.15);color:#f4845f;border-color:rgba(181,69,27,0.4)}
.toast.info{background:rgba(20,60,140,0.3);color:#90caf9;border-color:rgba(20,60,140,0.5)}
/* EMPTY */
.empty{text-align:center;padding:28px;color:var(--muted);font-size:0.76rem}
/* PRINT */
@media print{
  .topbar,.tabs,.content,.login-screen,.toast,.sig-box,.dp-modal,#aj-ios{display:none!important}
  #print-area,#dp-print-area{display:block!important}
  body,html{background:#fff!important;color:#000!important;margin:0!important;padding:0!important}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  @page{size:A4 portrait;margin:12mm}
}
#print-area,#dp-print-area{display:none}
/* RESPONSIVE */
@media(min-width:768px){.content{padding:20px;max-width:1024px;margin:0 auto}}
@media(min-width:1280px){
  .app-wrap{display:grid;grid-template-columns:200px 1fr;grid-template-rows:auto 1fr;min-height:100vh}
  .app-wrap.show{display:grid}
  .topbar{grid-column:1/-1}
  .tabs{grid-column:1;grid-row:2;flex-direction:column;overflow-x:visible;overflow-y:auto;border-right:1px solid var(--border);border-bottom:none;padding:16px 0;height:calc(100vh - 52px);position:sticky;top:52px;align-self:start}
  .tab{padding:12px 20px;border-bottom:none;border-left:2px solid transparent;text-align:left}
  .tab.active{border-left-color:var(--gold);border-bottom:none;background:var(--gold3)}
  .content{grid-column:2;grid-row:2;padding:24px;max-width:none}
}
@media(min-width:768px) and (max-width:1279px){
  .app-wrap{display:block!important}
  .tabs{display:flex!important;flex-direction:row!important;overflow-x:auto!important;border-right:none!important;height:auto!important}
  .tab{border-left:none!important;border-bottom:2px solid transparent!important}
  .tab.active{border-left-color:transparent!important;border-bottom-color:var(--gold)!important}
  .content{display:block!important;padding:16px!important}
}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:var(--navy3)}::-webkit-scrollbar-thumb{background:rgba(30,58,82,0.8);border-radius:2px}
</style>
</head>
<body>
<div id="print-area"></div><div id="dp-print-area"></div>
<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">A&amp;J</div>
    <div class="login-sub">Cleaning Services GmbH</div>
    <div id="step1">
      <p style="font-size:0.85rem;color:var(--cream);margin-bottom:18px">Wer bist du?</p>
      <button class="role-btn" id="btn-tl">
        <span style="font-size:1.1rem">📋</span>
        <div>TEAMLEADER<span class="role-desc">Tagesabrechnung · Stundenzettel · Dienstplan</span></div>
      </button>
      <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px">
        <button id="btn-chef-goto" style="background:transparent;border:none;color:var(--muted);font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;width:100%;padding:4px">🔒 Chef / Admin Login</button>
      </div>
    </div>
    <div id="step-vora" style="display:none">
      <p style="font-size:0.82rem;color:var(--gold);margin-bottom:14px;font-weight:600">Teamleader Login</p>
      <div style="margin-bottom:10px"><label class="lbl">Hotel</label>
        <select id="v-hotel" style="width:100%;background:var(--navy3);border:1px solid var(--border2);color:var(--cream);font-size:0.82rem;padding:10px 12px;outline:none;border-radius:3px"><option value="">Hotel auswählen...</option></select>
      </div>
      <div style="margin-bottom:10px"><label class="lbl">Name</label>
        <input id="v-name" type="text" placeholder="Name..." style="width:100%;background:var(--navy3);border:1px solid var(--border2);color:var(--gold);font-size:0.9rem;font-weight:600;padding:10px 12px;outline:none;border-radius:3px">
      </div>
      <div style="margin-bottom:12px"><label class="lbl">Passwort <span style="font-size:0.55rem;opacity:0.5;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input id="v-pw" type="password" placeholder="Passwort..." style="width:100%;background:#fff;border:2px solid var(--gold);color:#000;font-size:0.95rem;font-weight:700;padding:10px 12px;outline:none;border-radius:3px">
        <div id="v-pw-err" style="color:#f4845f;font-size:0.68rem;margin-top:5px;display:none">Falsches Passwort!</div>
      </div>
      <button id="btn-vora-login" style="width:100%;background:var(--gold);color:#08090d;border:none;font-size:0.85rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;padding:14px;border-radius:3px;cursor:pointer">Einloggen</button>
      <button id="btn-back-vora" style="background:transparent;border:none;color:var(--muted);font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;width:100%;padding:6px;margin-top:8px">← Zurück</button>
    </div>
    <div id="step-chef" style="display:none">
      <p style="font-size:0.82rem;color:var(--gold);margin-bottom:10px;font-weight:600">🔒 Chef / Admin</p>
      <input class="inp" id="chef-pw" type="password" placeholder="Passwort..." style="margin-bottom:8px">
      <div id="chef-pw-err" style="color:#f4845f;font-size:0.68rem;margin-bottom:8px;display:none">Falsches Passwort</div>
      <button class="role-btn gold" id="btn-chef-login" style="justify-content:center;margin-bottom:8px">✓ Als Chef einloggen</button>
      <button id="btn-back-chef" style="background:transparent;border:none;color:var(--muted);font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;width:100%;padding:4px">← Zurück</button>
    </div>
  </div>
</div>
<!-- APP -->
<div class="app-wrap" id="app-wrap">
  <div class="topbar">
    <div><div class="tb-logo">A&amp;J</div><div class="tb-info" id="tb-info"></div></div>
    <div class="tb-right" id="tb-right">
      <span id="tb-user" style="font-size:0.62rem;color:var(--muted)"></span>
      <button class="out-btn" id="btn-logout">Abmelden</button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
</div>
<div class="toast" id="toast"></div>
<!-- DIENSTPLAN CELL MODAL -->
<div class="dp-modal" id="dp-modal">
  <div class="dp-modal-box">
    <div style="font-size:0.82rem;color:var(--gold);font-weight:600;margin-bottom:12px" id="dp-modal-title">Schicht bearbeiten</div>
    <div style="margin-bottom:10px"><label class="lbl">Arbeitszeit</label>
      <input class="inp" id="dp-modal-time" placeholder="09:00-15:00" maxlength="11">
    </div>
    <div style="margin-bottom:14px"><label class="lbl">Status</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px" id="dp-modal-statbtns">
        <button class="btn" data-st="A" style="font-size:0.72rem;padding:9px">✓ Arbeit</button>
        <button class="btn" data-st="F" style="font-size:0.72rem;padding:9px">Frei</button>
        <button class="btn" data-st="U" style="font-size:0.72rem;padding:9px">Urlaub</button>
        <button class="btn" data-st="K" style="font-size:0.72rem;padding:9px">Krank</button>
        <button class="btn" data-st="N" style="font-size:0.72rem;padding:9px;grid-column:1/-1">Nicht erschienen</button>
        <button class="btn danger" data-st="" style="font-size:0.72rem;padding:9px;grid-column:1/-1">✕ Löschen</button>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn primary" id="dp-modal-ok" style="flex:2">✓ Übernehmen</button>
      <button class="btn" id="dp-modal-cancel">Abbrechen</button>
    </div>
  </div>
</div>
<!-- iOS Install -->
<div id="aj-ios" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#0e1118;border-top:1px solid rgba(212,168,67,0.3);padding:14px 16px;z-index:9999;flex-direction:column;gap:8px">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:38px;height:38px;background:var(--gold);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-weight:900;font-size:0.82rem;color:#08090d">A&amp;J</div>
      <div><div style="font-size:0.82rem;font-weight:700;color:var(--cream)">A&amp;J Manager</div><div style="font-size:0.65rem;color:var(--muted)">Als App installieren</div></div>
    </div>
    <button id="btn-ios-close" style="background:transparent;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:4px">✕</button>
  </div>
  <div style="background:rgba(212,168,67,0.06);border:1px solid rgba(212,168,67,0.15);border-radius:8px;padding:10px 12px;font-size:0.72rem;color:#a0b0c0;line-height:1.6">
    1. Tippe auf <strong style="color:var(--gold)">⬆ Teilen</strong> in Safari<br>
    2. <strong style="color:var(--gold)">"Zum Home-Bildschirm"</strong><br>
    3. <strong style="color:var(--gold)">Hinzufügen</strong>
  </div>
</div>

<script>

// ============================================================
// UTILS
// ============================================================
function ge(id){return document.getElementById(id);}
function gv(id){var e=ge(id);return e?e.value:'';}
function qs(sel){return document.querySelector(sel);}
function toast(msg,type,ms){
  try{var t=ge('toast');if(!t)return;t.textContent=msg;t.className='toast '+(type||'ok');t.style.display='block';clearTimeout(t._t);t._t=setTimeout(function(){if(t)t.style.display='none';},ms||2800);}catch(e){}
}
function t2m(s){if(!s||s.indexOf(':')<0)return null;var p=s.split(':'),h=parseInt(p[0]),m=parseInt(p[1]);return isNaN(h)||isNaN(m)?null:h*60+m;}
function m2t(m){if(m==null||isNaN(m))return '';return String(Math.floor(m/60)%24).padStart(2,'0')+':'+String(Math.round(m%60)).padStart(2,'0');}
if(!String.prototype.padStart){String.prototype.padStart=function(n,c){var s=String(this);c=c||' ';while(s.length<n)s=c+s;return s.slice(-n);};}

var FB_BASE='https://aj-manager-28a6c-default-rtdb.europe-west1.firebasedatabase.app';
var FB_FAIL=0;

function fbSaveUrl(url){
  if(url)FB_BASE=url.replace(/\/$/,'');
  localStorage.setItem('aj_fb_url',FB_BASE);
}
(function(){var u=localStorage.getItem('aj_fb_url');if(u)FB_BASE=u;})();

function fbRef(p){return FB_BASE+'/'+p+'.json';}
function fbKey(s){if(!s)return'unknown';return s.replace(/[.#$\[\] ]/g,'_');}

function fbGet(path,cb){
  // Try fetch silently - no error spam
  fetch(fbRef(path),{method:'GET',cache:'no-store'})
    .then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(function(d){FB_FAIL=0;if(cb)cb(d);})
    .catch(function(){
      FB_FAIL++;
      if(cb)cb(null);
    });
}

function fbPatch(path,data){
  if(!FB_BASE)return;
  fetch(fbRef(path),{
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)
  })
  .then(function(r){if(r.ok)console.log('Firebase OK');})
  .catch(function(){
    // Silently fail - local storage still saved
  });
}

function fbPush(){
  if(!USER||!USER.hotel)return;
  var h=USER.hotel,hk=fbKey(h),pl={};
  ['sz','ta','lu','r1','dp','ma','mb'].forEach(function(k){
    if(DATA[k]&&DATA[k][h])pl[k]=DATA[k][h];
  });
  if(Object.keys(pl).length>0){
    try{fbPatch('hotels/'+hk,pl);}catch(e){}
  }
}

function fbPull(cb){
  if(!USER){if(cb)cb(false);return;}
  var path=USER.role==='chef'?'hotels':'hotels/'+fbKey(USER.hotel);
  toast('Lade von Firebase...','info',2000);
  fbGet(path,function(val){
    if(!val||typeof val!=='object'){
      toast('Firebase nicht erreichbar. Lokale Daten werden verwendet.','info',4000);
      if(cb)cb(false);return;
    }
    try{
      if(USER.role==='chef'){
        Object.keys(val).forEach(function(hk){
          var hd=val[hk];if(!hd||typeof hd!=='object')return;
          Object.keys(HOTELS).forEach(function(hn){
            if(fbKey(hn)!==hk)return;
            ['sz','ta','lu','r1','dp','ma','mb'].forEach(function(k){
              if(hd[k]){if(!DATA[k])DATA[k]={};DATA[k][hn]=hd[k];}
            });
          });
        });
      } else {
        var hn=USER.hotel;
        ['sz','ta','lu','r1','dp','ma','mb'].forEach(function(k){
          if(val[k]){if(!DATA[k])DATA[k]={};DATA[k][hn]=val[k];}
        });
      }
      localStorage.setItem('aj4',JSON.stringify(DATA));
      toast('Firebase: Daten geladen!','ok',3000);
      if(cb)cb(true);
    }catch(e){if(cb)cb(false);}
  });
}

function initVoraLogin(){
  var sel=ge('v-hotel');if(!sel)return;

    var o=document.createElement('option');

    sel.appendChild(o);
  });
  var vc=[];try{vc=JSON.parse(localStorage.getItem('aj_vora_config')||'[]');}catch(e){}
  sel.onchange=function(){
    var h=this.value,ni=ge('v-name');if(!ni)return;

    var found='';
    vc.forEach(function(v){if(v.hotels&&v.hotels.indexOf(h)>=0&&v.aktiv!==false)found=v.name;});
    if(!found)found=VORA_NAMES[h]||'';
    ni.value=found;ni.style.color=found?'var(--gold)':'var(--cream)';
    if(found){var pw=ge('v-pw');if(pw){pw.value='';pw.focus();}}
  };
}
function doVoraLogin(){
  var hotel=gv('v-hotel'),name=gv('v-name').trim(),pw=gv('v-pw').trim();
  var errEl=ge('v-pw-err');
  if(!hotel){toast('Hotel auswählen!','err');return;}
  if(!name){toast('Name eingeben!','err');return;}
  var vc=[];try{vc=JSON.parse(localStorage.getItem('aj_vora_config')||'[]');}catch(e){}
  var correctPw='',active=true;
  vc.forEach(function(v){if(v.name===name){correctPw=v.pw||'';active=v.aktiv!==false;}});
  if(!active){toast('Konto deaktiviert!','err');return;}
  if(correctPw&&pw!==correctPw){
    if(errEl){errEl.style.display='block';errEl.textContent='Falsches Passwort!';}
    var pwI=ge('v-pw');if(pwI){pwI.value='';pwI.focus();}
    return;
  }
  if(errEl)errEl.style.display='none';
  USER={role:'vora',hotel:hotel,name:name};
  startApp();
}

function taCalc(ri){

  if(isRS){var ses=parseFloat(gv('ta_ses_'+ri))||0;ist=zi/(cfg.ziH||2.5)+gr/(cfg.aptH||2.0)+ses*(cfg.sesH||1.0)+chk*(cfg.ckMin||4)/60+pub+son+(cfg.pub||0);}
  else if(isSp){var mini=parseFloat(gv('ta_mini_'+ri))||0;ist=zi/(cfg.ziH||3)+gr/(cfg.ziH||3)+mini*(cfg.miniMin||3)/60+chk*(cfg.ckMin||4)/60+pub+son+(cfg.pub||0);}

  var istEl=ge('ta_ist_'+ri);if(istEl)istEl.value=ist>0?ist.toFixed(2):'';

function taAutoTransfer(ri,zi,gr,chk,pub,son,ist,cfg){

  if(!monat)monat=new Date().toISOString().slice(0,7);

  var totIst=0,totZi=0;

function getNRWHolidays(yr){
  var h={};
  function add(m,d,name){h[yr+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0')]=name;}
  // Easter
  var a=yr%19,b=Math.floor(yr/100),cc=yr%100;
  var d2=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3);
  var h2=(19*a+b-d2-g+15)%30,i=Math.floor(cc/4),k=cc%4;
  var l=(32+2*e+2*i-h2-k)%7;
  var m2=Math.floor((a+11*h2+22*l)/451);
  var eM=Math.floor((h2+l-7*m2+114)/31),eD=((h2+l-7*m2+114)%31)+1;
  var easter=new Date(yr,eM-1,eD);
  function ep(days){var d3=new Date(easter);d3.setDate(d3.getDate()+days);return yr+'-'+String(d3.getMonth()+1).padStart(2,'0')+'-'+String(d3.getDate()).padStart(2,'0');}
  add(1,1,'Neujahr');add(5,1,'Tag der Arbeit');add(10,3,'Tag d. Deutschen Einheit');
  add(11,1,'Allerheiligen');add(12,25,'1. Weihnachtstag');add(12,26,'2. Weihnachtstag');
  h[ep(-2)]='Karfreitag';h[ep(0)]='Ostersonntag';h[ep(1)]='Ostermontag';
  h[ep(39)]='Himmelfahrt';h[ep(49)]='Pfingstsonntag';h[ep(50)]='Pfingstmontag';h[ep(60)]='Fronleichnam';
  return h;
}

function szCalcGes(){

function r1LoadTables(){

var view=gv(‘r1-view-sel’)||‘lu’;

// Build filtered names list

if(DATA.r1[hotel]&&DATA.r1[hotel][mon]){
Object.keys(DATA.r1[hotel][mon]).forEach(function(d){
DATA.r1[hotel][mon][d].forEach(function(e){if(e.name&&r1Names.indexOf(e.name)<0)r1Names.push(e.name);});
});
}
if(DATA.sz[hotel]){Object.keys(DATA.sz[hotel]).forEach(function(mn){if(isR1Name(mn)&&r1Names.indexOf(mn)<0)r1Names.push(mn);});}

// Apply filter

}

function r1CalcDay(mk,day,maName){
var cfg=getCfg(USER.hotel);
var isRS=USER.hotel.indexOf(‘Bruhl’)>=0;
var zi=parseFloat(gv(‘r1_’+mk+’*zi*’+day))||0;
var gr=parseFloat(gv(‘r1_’+mk+’*gr*’+day))||0;
var chk=parseFloat(gv(‘r1_’+mk+’*chk*’+day))||0;
var son=parseFloat(gv(‘r1_’+mk+’*son*’+day))||0;
var ist=isRS?zi/(cfg.ziH||2.5)+gr/(cfg.aptH||2.0)+chk*cfg.ckMin/60:zi/cfg.ziH+gr/(cfg.grH||cfg.ziH)+chk*cfg.ckMin/60+son;
var el=document.getElementById(‘r1_’+mk+’*ist*’+day);
if(el) el.value=ist>0?ist.toFixed(2):’’;
var hotel=USER.hotel;
var mon=gv(‘r1-mon’)||new Date().toISOString().slice(0,7);
if(!DATA.r1[hotel]) DATA.r1[hotel]={};
if(!DATA.r1[hotel][mon]) DATA.r1[hotel][mon]={};
if(!DATA.r1[hotel][mon][day]) DATA.r1[hotel][mon][day]=[];
var entries=DATA.r1[hotel][mon][day],idx=-1;

function sigInit(id,hintId,statId){
var canvas=document.getElementById(id);
if(!canvas) return;
var ctx=canvas.getContext(‘2d’);
var drawing=false;
var rect=canvas.parentElement.getBoundingClientRect();
canvas.width=(rect.width||300)*window.devicePixelRatio;
canvas.height=80*window.devicePixelRatio;
canvas.style.width=(rect.width||300)+‘px’;
canvas.style.height=‘80px’;
ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
ctx.strokeStyle=’#c8a84b’; ctx.lineWidth=2; ctx.lineCap=‘round’; ctx.lineJoin=‘round’;
function pos(e){var r=canvas.getBoundingClientRect();var src=e.touches?e.touches[0]:e;return{x:src.clientX-r.left,y:src.clientY-r.top};}
function start(e){e.preventDefault();drawing=true;var p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);var h=document.getElementById(hintId);if(h)h.style.opacity=‘0’;}
function move(e){if(!drawing)return;e.preventDefault();var p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();var s=document.getElementById(statId);if(s)s.textContent=‘✓ Unterschrift OK’;}
function end(e){e.preventDefault();drawing=false;}
canvas.addEventListener(‘mousedown’,start);
canvas.addEventListener(‘mousemove’,move);
canvas.addEventListener(‘mouseup’,end);
canvas.addEventListener(‘touchstart’,start,{passive:false});
canvas.addEventListener(‘touchmove’,move,{passive:false});
canvas.addEventListener(‘touchend’,end,{passive:false});
}

function sigClear(id,hintId,statId){
var canvas=document.getElementById(id);
if(!canvas) return;
canvas.getContext(‘2d’).clearRect(0,0,canvas.width,canvas.height);
var h=document.getElementById(hintId);if(h)h.style.opacity=‘1’;
var s=document.getElementById(statId);if(s)s.textContent=’’;
}

// Chef: Filter buttons

// Filter

if(mf){
cont.querySelectorAll(’[data-mf]’).forEach(function(b){b.style.background=‘transparent’;b.style.color=‘var(–gold)’;b.style.fontWeight=‘400’;});

var all2=[];try{all2=JSON.parse(localStorage.getItem(‘aj_meldungen’)||’[]’);}catch(e){}
var filtered=mf===‘alle’?all2:mf===‘offen’?all2.filter(function(m){return m.status===‘offen’;}):all2.filter(function(m){return m.typ===mf;});
meldRenderList(filtered.slice().reverse());
return;
}
// Approve
var aid=t.getAttribute(‘data-approve’);
if(aid){
var note=gv(‘note-’+aid)||’’;
meldSetStatus(parseInt(aid),‘genehmigt’,note);
return;
}
// Reject
var rid=t.getAttribute(‘data-reject’);
if(rid){
var note2=gv(‘note-’+rid)||’’;
meldSetStatus(parseInt(rid),‘abgelehnt’,note2);
return;
}
});
}

function meldSetStatus(id,status,note){
var all=[];try{all=JSON.parse(localStorage.getItem(‘aj_meldungen’)||’[]’);}catch(e){}
all.forEach(function(m){
if(m.id===id){m.status=status;if(note)m.chefNote=note;m.bearbeitetVon=USER.name;m.bearbeitetAm=new Date().toLocaleDateString(‘de-DE’);}
});
localStorage.setItem(‘aj_meldungen’,JSON.stringify(all));
toast(status===‘genehmigt’?‘Genehmigt!’:‘Abgelehnt!’,status===‘genehmigt’?‘ok’:‘err’,2500);
pgMeld();
}

function meldRenderList(items){
var list=ge(‘meld-list’);if(!list)return;
if(!items.length){list.innerHTML=’<div class="empty">Keine Einträge</div>’;return;}
var html=’’;
items.forEach(function(m){
var icon=m.typ===‘krank’?‘🤒’:m.typ===‘urlaub’?‘🏖️’:‘📋’;
var stColor=m.status===‘offen’?’#f4845f’:m.status===‘genehmigt’?’#5dbf8a’:’#e88’;
var stLabel=m.status===‘offen’?‘Offen’:m.status===‘genehmigt’?‘Genehmigt’:‘Abgelehnt’;

html+=’<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div style="flex:1">’;
html+=’<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:1.1rem">’+icon+’</span><b style="color:var(--cream)">’+m.von+’</b><span style="font-size:0.62rem;color:var(--muted)">’+m.hotel+’</span><span style="font-size:0.58rem;background:rgba(255,255,255,0.06);padding:2px 7px;border-radius:10px;color:var(--muted)">’+m.datum+’</span></div>’;
html+=’<div style="font-size:0.8rem;color:var(--cream);margin-bottom:4px">’+m.text+’</div>’;
if(m.von_datum&&m.bis_datum)html+=’<div style="font-size:0.7rem;color:var(--muted)">Zeitraum: ‘+m.von_datum+’ – ‘+m.bis_datum+’</div>’;
if(m.foto)html+=’<div style="margin-top:6px"><img src="'+m.foto+'" style="max-width:200px;max-height:150px;border-radius:4px;border:1px solid var(--border2);cursor:pointer" onclick="this.style.maxWidth=this.style.maxWidth===\'100%\'?\'200px\':\'100%\'"></div>’;
if(m.chefNote)html+=’<div style="margin-top:6px;font-size:0.7rem;color:#5dbf8a;background:rgba(45,106,79,0.1);padding:5px 8px;border-radius:3px">Chef: ‘+m.chefNote+’</div>’;
html+=’</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">’;
html+=’<span style="font-size:0.65rem;color:'+stColor+';font-weight:700;border:1px solid '+stColor+';border-radius:10px;padding:2px 8px">’+stLabel+’</span>’;
if(m.status===‘offen’){html+=’<div style="display:flex;gap:4px"><button class="btn sm" style="color:#5dbf8a;border-color:rgba(45,106,79,0.4)" data-approve="'+m.id+'">✓ OK</button><button class="btn sm danger" data-reject="'+m.id+'">✕</button></div><input class="inp" style="width:130px;font-size:0.7rem;padding:4px 7px" placeholder="Notiz..." id="note-'+m.id+'">’;}
html+=’</div></div></div>’;
});
