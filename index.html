<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<title>A&amp;J Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08090e;
  --bg2:#0d1117;
  --bg3:#111824;
  --bg4:#171f2e;
  --gold:#c9a84c;
  --gold2:#e0bb70;
  --cream:#dce6f0;
  --muted:#4a5a6a;
  --green:#3dba76;
  --red:#e05252;
  --blue:#4a9fd4;
  --border:rgba(201,168,76,0.15);
  --border2:rgba(201,168,76,0.3);
  --sat:env(safe-area-inset-top);
  --sab:env(safe-area-inset-bottom);
}
html,body{background:var(--bg);color:var(--cream);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;padding-top:var(--sat)}
/* INPUTS - ABSOLUTE FORCE */
input,select,textarea{-webkit-appearance:none;appearance:none}
input:not([type=checkbox]):not([type=radio]),select,textarea{
  color:var(--cream)!important;
  -webkit-text-fill-color:var(--cream)!important;
  background:#0d1525!important;
  opacity:1!important;
}
input:-webkit-autofill,input:-webkit-autofill:focus,input:-webkit-autofill:hover{
  -webkit-text-fill-color:var(--cream)!important;
  -webkit-box-shadow:0 0 0 100px #0d1525 inset!important;
  caret-color:var(--cream)!important;
}
[id^="ta_nm_"],[id^="ta_zi_"],[id^="ta_gr_"],[id^="ta_chk_"],[id^="ta_pub_"],
[id^="ta_son_"],[id^="ta_wae_"],[id^="ta_auf_"],[id^="ta_ses_"],[id^="ta_mini_"],
[id^="ta_ist_"],[id^="sz_"]{
  color:var(--cream)!important;
  -webkit-text-fill-color:var(--cream)!important;
  background:#0d1525!important;
  opacity:1!important;
}
[id^="ta_zi_"]{color:var(--gold2)!important;-webkit-text-fill-color:var(--gold2)!important;background:#0a1830!important}
[id^="ta_ist_"],[id^="sz_ist_"]{color:var(--green)!important;-webkit-text-fill-color:var(--green)!important}
input::placeholder,textarea::placeholder{color:var(--muted)!important;-webkit-text-fill-color:var(--muted)!important;opacity:1!important}
/* LOGIN */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:max(60px,calc(var(--sat)+40px)) 20px max(40px,calc(var(--sab)+20px));background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(201,168,76,0.08) 0%,transparent 70%)}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:36px 28px;max-width:360px;width:100%;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,0.7)}
.logo{font-family:Georgia,serif;font-size:3.2rem;font-weight:900;color:var(--gold);line-height:1;letter-spacing:-1px}
.logo-sub{font-size:0.46rem;letter-spacing:0.5em;text-transform:uppercase;color:var(--muted);margin:6px 0 28px;display:block}
.role-btn{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--cream);padding:14px 16px;border-radius:8px;text-align:left;display:flex;align-items:center;gap:14px;margin-bottom:10px;text-decoration:none;cursor:pointer;transition:border-color .2s;-webkit-user-select:none}
.role-btn:active{border-color:var(--border2);background:var(--bg4)}
.role-btn.gold{background:var(--gold);color:#08090e;font-weight:700;border-color:var(--gold)}
.role-btn.gold:active{background:#b8962a}
.role-name{font-size:0.78rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;display:block}
.role-desc{font-size:0.6rem;color:var(--muted);display:block;margin-top:2px;font-weight:400;text-transform:none;letter-spacing:0}
.role-btn.gold .role-name,.role-btn.gold .role-desc{color:#08090e}
.role-btn.gold .role-desc{opacity:0.7}
/* APP */
.app{display:none}
.app.on{display:block}
/* TOPBAR */
.topbar{background:rgba(13,17,23,0.97);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:200;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);height:48px}
.tb-logo{font-family:Georgia,serif;font-size:1rem;font-weight:900;color:var(--gold);flex-shrink:0}
.tb-sep{width:1px;height:14px;background:var(--border);flex-shrink:0}
.tb-hotel{font-size:0.56rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0}
.tb-name{font-size:0.56rem;color:var(--muted);white-space:nowrap;max-width:70px;overflow:hidden;text-overflow:ellipsis}
.tb-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.tb-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:0.52rem;letter-spacing:0.08em;text-transform:uppercase;padding:5px 10px;border-radius:5px;cursor:pointer;white-space:nowrap;-webkit-user-select:none}
.tb-btn:active{background:var(--bg3)}
/* TABS */
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:48px;z-index:199}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 13px;font-size:0.54rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;cursor:pointer;-webkit-user-select:none;transition:color .15s}
.tab.on{color:var(--gold2);border-bottom-color:var(--gold)}
/* CONTENT */
.content{padding:14px;padding-bottom:max(20px,calc(var(--sab)+14px))}
@media(min-width:600px){.content{max-width:960px;margin:0 auto;padding:20px}}
/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.card-hd{font-family:Georgia,serif;font-size:0.9rem;color:var(--gold);margin-bottom:12px}
.empty{text-align:center;padding:32px;color:var(--muted);font-size:0.76rem;line-height:1.8}
/* FORM */
.inp{background:#0d1525!important;border:1px solid var(--border);color:var(--cream)!important;-webkit-text-fill-color:var(--cream)!important;padding:8px 10px;font-size:0.8rem;outline:none;border-radius:6px;width:100%;transition:border-color .15s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--muted)!important;-webkit-text-fill-color:var(--muted)!important}
.lbl{font-size:0.5rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;display:block}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.col{display:flex;flex-direction:column;flex:1;min-width:80px}
/* BUTTONS */
.btn{background:transparent;border:1px solid var(--border2);color:var(--gold);font-size:0.56rem;letter-spacing:0.12em;text-transform:uppercase;padding:7px 13px;border-radius:5px;cursor:pointer;white-space:nowrap;-webkit-user-select:none;transition:background .15s;display:inline-flex;align-items:center;gap:5px}
.btn:active{background:rgba(201,168,76,0.1)}
.btn.prim{background:var(--gold);color:#08090e;font-weight:700;border-color:var(--gold);font-size:0.6rem;padding:9px 18px}
.btn.prim:active{background:#b8962a}
.btn.sm{padding:5px 10px;font-size:0.5rem;border-radius:4px}
.btn.red{border-color:rgba(224,82,82,0.3);color:var(--red)}
.btn.red:active{background:rgba(224,82,82,0.08)}
.btn.grn{border-color:rgba(61,186,118,0.3);color:var(--green)}
.btn.grn:active{background:rgba(61,186,118,0.08)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:0.58rem;font-weight:600}
.b-pend{background:rgba(201,168,76,0.12);color:var(--gold2);border:1px solid rgba(201,168,76,0.25)}
.b-ok{background:rgba(61,186,118,0.1);color:var(--green);border:1px solid rgba(61,186,118,0.2)}
.b-no{background:rgba(224,82,82,0.1);color:var(--red);border:1px solid rgba(224,82,82,0.2)}
.b-grey{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid var(--border)}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(85px,1fr));gap:8px;margin-bottom:12px}
.stat{background:var(--bg3);border:1px solid var(--border);padding:12px 8px;text-align:center;border-radius:6px}
.stat-n{font-family:Georgia,serif;font-size:1.4rem;color:var(--gold2);display:block;line-height:1}
.stat-l{font-size:0.46rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-top:3px;display:block}
/* TA TABLE */
.ta-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:8px}
.ta-tbl{border-collapse:collapse;width:100%;min-width:520px;font-size:0.75rem}
.ta-tbl th{background:var(--bg4);color:var(--gold);font-size:0.5rem;letter-spacing:0.08em;text-transform:uppercase;font-weight:600;padding:6px 3px;text-align:center;border:1px solid var(--border)}
.ta-tbl td{border:1px solid rgba(23,31,46,0.8);padding:0;background:#0b1220}
.ta-tbl tr:nth-child(even) td{background:#080f1c}
.ta-tbl tr.ges td{background:var(--bg4)!important;border-top:2px solid var(--gold)}
.ti{width:100%;background:#0d1525!important;border:none;outline:none;font-size:0.75rem;color:var(--cream)!important;-webkit-text-fill-color:var(--cream)!important;padding:6px 3px;text-align:center;opacity:1!important;-webkit-appearance:none;caret-color:var(--cream)}
.ti.nm{text-align:left;padding-left:7px;min-width:90px}
.ti.zi{color:var(--gold2)!important;-webkit-text-fill-color:var(--gold2)!important;font-weight:700;background:#0a1830!important}
.ti.ai{color:var(--green)!important;-webkit-text-fill-color:var(--green)!important;font-weight:700;background:rgba(61,186,118,0.05)!important;cursor:default}
/* SZ TABLE */
.sz-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.sz-tbl{border-collapse:collapse;width:100%;min-width:480px;font-size:0.75rem}
.sz-tbl thead th{background:var(--bg4);color:var(--muted);font-size:0.5rem;letter-spacing:0.07em;text-transform:uppercase;font-weight:500;padding:6px 3px;text-align:center;border:1px solid var(--border)}
.sz-tbl thead th.hg{color:var(--green)}
.sz-tbl thead th.hz{color:var(--blue)}
.sz-tbl tbody td{border:1px solid rgba(23,31,46,0.8);padding:0;background:#0b1220}
.sz-tbl tbody tr:nth-child(even) td{background:#080f1c}
.sz-tbl tbody tr.filled td{background:#081812}
.sz-tbl tfoot td{background:var(--bg4)!important;border-top:2px solid var(--gold)}
.si{width:100%;background:#0d1525!important;border:none;outline:none;font-size:0.75rem;color:var(--cream)!important;-webkit-text-fill-color:var(--cream)!important;padding:6px 3px;text-align:center;opacity:1!important;-webkit-appearance:none;caret-color:var(--cream)}
.si.zi{color:var(--gold2)!important;-webkit-text-fill-color:var(--gold2)!important;font-weight:700}
.si.ai{color:var(--green)!important;-webkit-text-fill-color:var(--green)!important;font-weight:700;cursor:default}
.si.at{color:var(--blue)!important;-webkit-text-fill-color:var(--blue)!important;cursor:default}
.si.ro{color:var(--muted)!important;-webkit-text-fill-color:var(--muted)!important;cursor:default}
.sz-nr{text-align:center;font-size:0.7rem;color:var(--muted);padding:0 3px;background:var(--bg3)!important;min-width:22px}
.sz-ges{background:var(--bg4)!important;border-top:2px solid var(--gold);text-align:center;padding:5px 3px;font-family:Georgia,serif;color:var(--gold2);font-size:0.82rem;font-weight:700}
/* LU TABLE */
.lu-tbl{border-collapse:collapse;width:100%;font-size:0.75rem}
.lu-tbl th{background:var(--bg4);color:var(--muted);font-size:0.5rem;letter-spacing:0.08em;text-transform:uppercase;padding:6px 7px;border-bottom:1px solid var(--border2);font-weight:500;text-align:center}
.lu-tbl th:first-child{text-align:left}
.lu-tbl td{padding:7px;border-bottom:1px solid rgba(23,31,46,0.8);vertical-align:middle;text-align:center}
.lu-tbl td:first-child{text-align:left;font-weight:600}
.lu-tbl tr:last-child td{border-bottom:none}
.lu-tbl tr.sum td{background:var(--bg4)!important;border-top:2px solid var(--gold);font-weight:700;color:var(--gold2)}
/* TOAST */
.toast{position:fixed;bottom:max(16px,calc(var(--sab)+10px));right:14px;padding:10px 16px;border-radius:7px;font-size:0.72rem;font-weight:600;z-index:9999;display:none;border:1px solid;max-width:280px;line-height:1.5;box-shadow:0 8px 32px rgba(0,0,0,0.6)}
.toast.ok{background:rgba(61,186,118,0.1);color:var(--green);border-color:rgba(61,186,118,0.25)}
.toast.err{background:rgba(224,82,82,0.1);color:var(--red);border-color:rgba(224,82,82,0.25)}
.toast.inf{background:rgba(74,159,212,0.1);color:var(--blue);border-color:rgba(74,159,212,0.25)}
/* PRINT */
@media print{
  body *{visibility:hidden!important}
  #pra,#pra *{visibility:visible!important}
  #pra{position:fixed!important;top:0!important;left:0!important;width:100%!important;background:#fff!important;color:#000!important;display:block!important;z-index:99999!important}
  .login,.app{display:none!important}
  html,body{background:#fff!important;padding:0!important}
  @page{size:A4 portrait;margin:10mm}
}
#pra{display:none;background:#fff!important;color:#000!important}
/* DESKTOP */
@media(min-width:1200px){
  .app.on{display:grid;grid-template-columns:200px 1fr;grid-template-rows:48px 1fr;min-height:100vh}
  .topbar{grid-column:1/-1;position:sticky;top:0}
  .tabs{grid-column:1;grid-row:2;flex-direction:column;overflow-x:visible;overflow-y:auto;border-right:1px solid var(--border);border-bottom:none;padding:12px 0;height:calc(100vh - 48px);position:sticky;top:48px;align-self:start}
  .tab{padding:11px 16px;border-bottom:none;border-left:2px solid transparent}
  .tab.on{border-left-color:var(--gold);border-bottom:none;background:rgba(201,168,76,0.06)}
  .content{grid-column:2;grid-row:2;padding:20px 24px;max-width:none}
}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.2);border-radius:3px}
</style>
</head>
<body>

<!-- LOGIN -->

<div class="login" id="login">
  <div class="login-box">
    <div class="logo">A&amp;J</div>
    <span class="logo-sub">Cleaning Services GmbH</span>
    <div id="login-tl">
      <a href="javascript:void(0)" class="role-btn" onclick="showTlLogin()">
        <span style="font-size:1.6rem">📋</span>
        <span><span class="role-name">Teamleader</span><span class="role-desc">Tagesabrechnung · Stundenzettel · Dienstplan</span></span>
      </a>
      <a href="javascript:void(0)" class="role-btn gold" onclick="showChefLogin()">
        <span style="font-size:1.6rem">👑</span>
        <span><span class="role-name">Chef / Admin</span><span class="role-desc">Alle Hotels · Live-Kontrolle · Auswertung</span></span>
      </a>
      <div style="text-align:center;margin-top:12px;font-size:0.58rem;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:6px">
        <span id="fb-dot" style="width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block"></span>
        Firebase Live-Sync
      </div>
    </div>
    <div id="login-tl-form" style="display:none">
      <div style="margin-bottom:14px"><label class="lbl">Hotel</label>
        <select class="inp" id="v-hotel">
          <option value="">— Hotel auswählen —</option>
          <option>RS Hotel Bruhl</option><option>Atrium Apart Bruhl</option>
          <option>McDreams Düsseldorf</option><option>McDreams Köln</option>
          <option>McDreams Dortmund</option><option>McDreams Düsseldorf Airport</option>
          <option>Four Points Ratingen</option><option>Ramada Ratingen</option>
          <option>FOUR Essen City Centre</option><option>Spark by Hilton Essen</option>

      </div>
      <div style="margin-bottom:14px"><label class="lbl">Name</label><input class="inp" id="v-name" placeholder="Dein Name" autocomplete="off"></div>
      <div style="margin-bottom:14px"><label class="lbl">Passwort</label><input class="inp" id="v-pw" type="password" placeholder="Passwort"></div>
      <div id="v-err" style="display:none;font-size:0.68rem;color:var(--red);margin-bottom:10px"></div>
      <a href="javascript:void(0)" class="role-btn gold" onclick="doTlLogin()"><span>🔐</span><span class="role-name">Einloggen</span></a>
      <a href="javascript:void(0)" class="role-btn" style="margin-top:6px" onclick="showMain()"><span>←</span><span class="role-name" style="color:var(--muted)">Zurück</span></a>
    </div>
    <div id="login-chef-form" style="display:none">
      <div style="margin-bottom:14px"><label class="lbl">Passwort</label><input class="inp" id="c-pw" type="password" placeholder="Chef-Passwort"></div>
      <div id="c-err" style="display:none;font-size:0.68rem;color:var(--red);margin-bottom:10px"></div>
      <a href="javascript:void(0)" class="role-btn gold" onclick="doChefLogin()"><span>🔐</span><span class="role-name">Als Chef einloggen</span></a>
      <a href="javascript:void(0)" class="role-btn" style="margin-top:6px" onclick="showMain()"><span>←</span><span class="role-name" style="color:var(--muted)">Zurück</span></a>
    </div>
  </div>
</div>

<!-- APP -->

<div class="app" id="app">
  <div class="topbar">
    <span class="tb-logo">A&amp;J</span>
    <span class="tb-sep"></span>
    <span class="tb-hotel" id="tb-hotel"></span>
    <div class="tb-right">
      <span class="tb-dot" id="fb-dot2"></span>
      <span class="tb-name" id="tb-name"></span>
      <button class="tb-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
</div>

<div class="toast" id="toast"></div>
<div id="pra"></div>

<script>
// ============================================================
// KONFIGURATION
// ============================================================
var FB = 'https://aj-manager-28a6c-default-rtdb.europe-west1.firebasedatabase.app';
var FB_OFF = false;

var HOTELS = {
  'RS Hotel Bruhl':          {nr:'1001',typ:'rs', ziH:2.5,aptH:2.0,sesH:1.0,ckMin:4,pub:0},
  'Atrium Apart Bruhl':      {nr:'1002',typ:'rs', ziH:2.5,aptH:2.0,sesH:1.0,ckMin:4,pub:0},
  'McDreams Düsseldorf':     {nr:'1003',typ:'mc', ziH:3.5,ckMin:4},
  'McDreams Köln':           {nr:'1004',typ:'mc', ziH:3.5,ckMin:4},
  'McDreams Dortmund':       {nr:'1005',typ:'mc', ziH:3.5,ckMin:4},
  'McDreams Düsseldorf Airport':{nr:'1006',typ:'mc',ziH:3.5,ckMin:4},
  'Four Points Ratingen':    {nr:'1007',typ:'std',ziH:2.5,ckMin:4},
  'Ramada Ratingen':         {nr:'1008',typ:'std',ziH:2.5,ckMin:4},
  'FOUR Essen City Centre':  {nr:'1009',typ:'std',ziH:2.5,ckMin:4},
  'Spark by Hilton Essen':   {nr:'1010',typ:'sp', ziH:3.0,miniMin:3,ckMin:4}
};
var TA_ROWS = 12;

// ============================================================
// DATA
// ============================================================
var DATA;
try{DATA=JSON.parse(localStorage.getItem('aj5')||'{}');}catch(e){DATA={};}
['ta','sz','lu','r1','ma','dp'].forEach(function(k){if(!DATA[k])DATA[k]={};});

function save(){
  try{localStorage.setItem('aj5',JSON.stringify(DATA));}catch(e){}
}

// ============================================================
// USER
// ============================================================
var USER = null;

// ============================================================
// FIREBASE
// ============================================================
function sk(s){return (s||'').replace(/[^a-zA-Z0-9_]/g,'_').replace(/__+/g,'_').replace(/^_|_$/g,'')||'x';}

function fbReq(method,path,data,cb){
  if(FB_OFF)return;
  var url=FB+'/'+path+'.json';
  var xhr=new XMLHttpRequest();
  xhr.open(method,url,true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.timeout=12000;
  xhr.onload=function(){
    var dot=ge('fb-dot2');if(dot)dot.style.background=xhr.status<300?'#3dba76':'#e05252';
    if(cb&&xhr.status<300)try{cb(JSON.parse(xhr.responseText));}catch(e){}
  };
  xhr.onerror=xhr.ontimeout=function(){var d=ge('fb-dot2');if(d)d.style.background='#e05252';};
  xhr.send(data?JSON.stringify(clean(data)):null);
}
function fbPut(path,data){fbReq('PUT',path,data,null);}
function fbGet(path,cb){fbReq('GET',path,null,cb);}
function fbDel(path){fbReq('DELETE',path,null,null);}

function clean(v){
  if(v===null||v===undefined||v===''||v!==v)return null;
  if(typeof v==='number'||typeof v==='boolean'||typeof v==='string')return v;
  if(Array.isArray(v)){
    var a=v.map(clean).filter(function(x){return x!==null;});
    return a.length?a:null;
  }
  var o={};
  Object.keys(v).forEach(function(k){
    var vv=clean(v[k]);
    if(vv!==null)o[sk(k)]=vv;
  });
  return Object.keys(o).length?o:null;
}

// HELPERS
// ============================================================
function ge(id){return document.getElementById(id);}
function gv(id){var e=ge(id);return e?e.value:'';}
function sv(id,v){var e=ge(id);if(e)e.value=v;}

function toast(msg,type,ms){
  var t=ge('toast');if(!t)return;
  t.textContent=msg;
  t.className='toast '+(type||'ok');
  t.style.display='block';
  clearTimeout(t._t);
  t._t=setTimeout(function(){t.style.display='none';},ms||3500);
}

function m2t(m){
  if(!m&&m!==0)return '';
  var h=Math.floor(Math.abs(m)/60),mi=Math.abs(m)%60;
  return String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0');
}
function t2m(t){
  if(!t)return null;
  var p=(t+'').split(':');
  if(p.length<2)return null;
  return parseInt(p[0]||0)*60+parseInt(p[1]||0);
}

function cfg(hotel){return HOTELS[hotel]||{typ:'std',ziH:2.5,ckMin:4};}
function typ(hotel){return (HOTELS[hotel]||{}).typ||'std';}
function calcIst(hotel,zi,gr,ses,chk,pub,son,mini){
  var c=cfg(hotel),t=typ(hotel);
  var ist=0;
  if(t==='rs')      ist=zi/(c.ziH||2.5)+gr/(c.aptH||2.0)+ses*(c.sesH||1.0)+chk*(c.ckMin||4)/60+pub+son;
  else if(t==='mc') ist=zi/(c.ziH||3.5)+gr/(c.ziH||3.5)+chk*(c.ckMin||4)/60+pub;
  else if(t==='sp') ist=zi/(c.ziH||3)+gr/(c.ziH||3)+mini*(c.miniMin||3)/60+chk*(c.ckMin||4)/60+pub+son;
  else              ist=zi/(c.ziH||2.5)+gr/(c.ziH||2.5)+chk*(c.ckMin||4)/60+pub+son;
  return Math.round(ist*100)/100;
}
function isSub(name){
  return /\s[A-Z0-9]{1,4}$/.test((name||'').trim());
}
function now_ym(){var n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');}
function now_date(){var n=new Date();return String(n.getDate()).padStart(2,'0')+'.'+String(n.getMonth()+1).padStart(2,'0')+'.'+n.getFullYear();}
function dkey(day){return 'd'+String(day).padStart(2,'0');}

function fbPoll(){
  if(!USER||FB_OFF)return;
  if(USER.role==='chef'){
    fbGet('hotels',function(val){
      if(!val||typeof val!=='object')return;
      Object.keys(val).forEach(function(hk){
        var hd=val[hk];if(!hd)return;
        Object.keys(HOTELS).forEach(function(hn){
          if(sk(hn)!==hk)return;
          ['ta','sz','lu','r1','dp','ma'].forEach(function(k){
            if(hd[k]&&typeof hd[k]==='object'){DATA[k][hn]=hd[k];}
          });
          if(hd.online){if(!DATA.online)DATA.online={};DATA.online[hn]=hd.online;}
        });
      });
      save();
      if(currentTab==='dash')pgDash();
      else if(currentTab==='live')pgLive();
      else if(currentTab==='sz')pgSz();
      else if(currentTab==='lu')pgLu();
    });
  } else {
    fbGet('hotels/'+sk(USER.hotel),function(val){
      if(!val)return;
      var hn=USER.hotel;
      ['ta','sz','lu','r1','dp','ma'].forEach(function(k){
        if(val[k])DATA[k][hn]=val[k];
      });
      save();
    });
  }
}

}

function saveTa(){
  var hotel=USER.hotel;
  var datum=(gv('ta-datum')||'').trim();
  if(!datum){toast('Datum eingeben!','err');return;}

  // Collect rows
  var rows=[];
  for(var ri=0;ri<TA_ROWS;ri++){
    var nm=(gv('ta_nm_'+ri)||'').trim();
    if(!nm)continue;
    var zi=parseFloat(gv('ta_zi_'+ri))||0;
    var gr=parseFloat(gv('ta_gr_'+ri))||0;
    var ses=parseFloat(gv('ta_ses_'+ri))||0;
    var chk=parseFloat(gv('ta_chk_'+ri))||0;
    var pub=parseFloat(gv('ta_pub_'+ri))||0;
    var son=parseFloat(gv('ta_pub_'+ri))||0;
    var mini=parseFloat(gv('ta_mini_'+ri))||0;
    var ist=calcIst(hotel,zi,gr,ses,chk,pub,son,mini);
    rows.push({name:nm,zi:zi,gr:gr,ses:ses,chk:chk,pub:pub,son:son,mini:mini,ist:ist});
  }
  if(!rows.length){toast('Keine Mitarbeiter eingegeben!','err');return;}

  // Parse date
  var monat='',dk='';
  if(datum.indexOf('.')>=0){
    var dp=datum.split('.');
    monat=(dp[2]||new Date().getFullYear())+'-'+String(parseInt(dp[1])||1).padStart(2,'0');
    dk=dkey(parseInt(dp[0])||1);
  } else {
    monat=datum.slice(0,7);
    dk=dkey(parseInt(datum.slice(8,10))||1);
  }

  // 1. Save TA
  if(!DATA.ta[hotel])DATA.ta[hotel]={};
  DATA.ta[hotel][datum]={datum:datum,hotel:hotel,tl:USER.name,tlLoginTime:USER.loginTime||'',rows:rows,savedAt:Date.now(),status:'pending'};

  // 2. Transfer to SZ (per MA)
  rows.forEach(function(row){
    var mk=sk(row.name);
    if(!DATA.sz[hotel])DATA.sz[hotel]={};
    if(!DATA.sz[hotel][mk])DATA.sz[hotel][mk]={name:row.name};
    if(!DATA.sz[hotel][mk][monat])DATA.sz[hotel][mk][monat]={tage:{},istGes:0,ziGes:0,grGes:0};
    var von='09:00';
    var bisMin=(t2m(von)||540)+Math.round(row.ist*60)+30;
    DATA.sz[hotel][mk][monat].tage[dk]={
      zi:row.zi,gr:row.gr,ses:row.ses,chk:row.chk,pub:row.pub,son:row.son,mini:row.mini,
      von:von,bis:row.ist>0?m2t(bisMin):'',ist:row.ist,pause:0.5
    };
    // Recalc totals
    var tot={ist:0,zi:0,gr:0};
    Object.keys(DATA.sz[hotel][mk][monat].tage).forEach(function(d){
      var t=DATA.sz[hotel][mk][monat].tage[d];
      tot.ist+=Number(t.ist)||0;
      tot.zi+=Number(t.zi)||0;
      tot.gr+=Number(t.gr)||0;
    });
    DATA.sz[hotel][mk][monat].istGes=Math.round(tot.ist*100)/100;
    DATA.sz[hotel][mk][monat].ziGes=tot.zi;
    DATA.sz[hotel][mk][monat].grGes=tot.gr;
  });

  // 3. Update Leistungsübersicht
  if(!DATA.lu[hotel])DATA.lu[hotel]={};
  if(!DATA.lu[hotel][monat])DATA.lu[hotel][monat]={rows:{}};
  var day={zi:0,gr:0,ses:0,chk:0,pub:0,son:0,mini:0,ist:0};
  Object.keys(DATA.sz[hotel]).forEach(function(mk){
    var m=DATA.sz[hotel][mk];
    if(!m||!m[monat]||!m[monat].tage||!m[monat].tage[dk])return;
    var t=m[monat].tage[dk];
    day.zi+=Number(t.zi)||0;day.gr+=Number(t.gr)||0;
    day.ses+=Number(t.ses)||0;day.chk+=Number(t.chk)||0;
    day.pub+=Number(t.pub)||0;day.son+=Number(t.son)||0;
    day.mini+=Number(t.mini)||0;day.ist+=Number(t.ist)||0;
  });
  day.ist=Math.round(day.ist*100)/100;
  DATA.lu[hotel][monat].rows[dk]=day;

  // 4. SUB → r1
  rows.forEach(function(row){
    if(!isSub(row.name))return;
    if(!DATA.r1[hotel])DATA.r1[hotel]={};
    if(!DATA.r1[hotel][monat])DATA.r1[hotel][monat]={};
    if(!DATA.r1[hotel][monat][dk])DATA.r1[hotel][monat][dk]=[];
    var list=DATA.r1[hotel][monat][dk];
    var idx=-1;
    list.forEach(function(e,i){if(e.name===row.name)idx=i;});
    var entry={name:row.name,zi:row.zi,gr:row.gr,ist:row.ist};
    if(idx>=0)list[idx]=entry;else list.push(entry);
  });

  // 5. Save locally
  save();

  // 6. Firebase
  var hk=sk(hotel);
  var datumKey=sk(monat+'-'+dk.slice(1));
  var inboxKey=datumKey+'_'+hk;
  fbPut('hotels/'+hk+'/tagesabrechnung/'+datumKey,DATA.ta[hotel][datum]);
  fbPut('chef/inbox/'+inboxKey,DATA.ta[hotel][datum]);
  fbPut('hotels/'+hk+'/sz',DATA.sz[hotel]);
  fbPut('hotels/'+hk+'/lu',DATA.lu[hotel]);
  if(DATA.r1[hotel]&&DATA.r1[hotel][monat])fbPut('hotels/'+hk+'/r1',DATA.r1[hotel]);
  fbPut('notifications/ta_'+Date.now(),{hotel:hotel,datum:datum,tl:USER.name,ts:Date.now()});

  // 7. Done - show result and switch to SZ
  var luZi=DATA.lu[hotel][monat].rows[dk].zi;
  toast('✅ Gespeichert! '+rows.length+' MA · '+luZi+' Zi · Firebase ✓','ok',5000);
  DATA._last={hotel:hotel,monat:monat,dk:dk,firstMa:rows[0].name,ts:Date.now()};
  setTimeout(function(){switchTab('sz');},600);
}

function pgSz(){

  var hotel=(USER.role==='chef'&&USER.chefHotel)?USER.chefHotel:USER.hotel;

  var thisM=now_ym();

  });
  // Add MAs from ma config
  (DATA.ma[hotel]||[]).forEach(function(m){if(m.name&&maList.indexOf(m.name)<0)maList.push(m.name);});

  // Determine which MA to show
  var activeMa=maList[0]||'';
  if(USER.role==='tl'&&maList.indexOf(USER.name)>=0)activeMa=USER.name;
  if(DATA._last&&DATA._last.hotel===hotel&&Date.now()-DATA._last.ts<600000){
    var fl=DATA._last.firstMa;
    if(fl&&maList.indexOf(fl)>=0)activeMa=fl;
    else{
      for(var i=0;i<maList.length;i++){if(sk(maList[i])===sk(fl)){activeMa=maList[i];break;}}
    }
  }

  var html='<div class="card">';

function szLoad(maName,monat){
  var wrap=ge('sz-table-wrap');if(!wrap)return;
  var hotel=(USER.role==='chef'&&USER.chefHotel)?USER.chefHotel:USER.hotel;
  var isRS=typ(hotel)==='rs';
  var szH=DATA.sz[hotel]||{};
  var mk=sk(maName);
  var mData=(szH[maName]&&szH[maName][monat])||(szH[mk]&&szH[mk][monat])||{tage:{},istGes:0,ziGes:0};
  var tage=mData.tage||{};

  var monParts=(monat||'').split('-');
  var yr=parseInt(monParts[0])||new Date().getFullYear();
  var mo=parseInt(monParts[1])||1;

  var html='<div class="card"><div class="sz-wrap"><table class="sz-tbl">';
  html+='<thead><tr>';
  html+='<th class="sz-nr">Tag</th>';
  html+='<th style="min-width:50px">Von</th>';
  html+='<th class="hg" style="min-width:50px">Bis</th>';
  html+='<th style="min-width:36px">Pause</th>';
  html+='<th class="hg" style="min-width:48px">Ist-Std</th>';
  if(isRS){html+='<th class="hz" style="min-width:40px">DZ</th><th style="min-width:40px">Apt.</th>';}
  else{html+='<th class="hz" style="min-width:40px">Zimmer</th><th style="min-width:40px">Grundr.</th>';}
  html+='<th style="min-width:36px">Chk</th>';
  html+='</tr></thead><tbody>';

  var totIst=0,totZi=0,totGr=0;
  for(var day=1;day<=31;day++){
    var dt=new Date(yr,mo-1,day);
    if(dt.getMonth()!==mo-1){
      html+='<tr style="opacity:0.15"><td class="sz-nr">'+day+'</td><td colspan="7"></td></tr>';
      continue;
    }
    var dow=['So','Mo','Di','Mi','Do','Fr','Sa'][dt.getDay()];
    var isWE=dt.getDay()===0||dt.getDay()===6;
    var kdk=dkey(day);
    var sv=tage[kdk]||tage[String(day)]||{};
    var filled=!!sv.ist;
    if(filled){totIst+=Number(sv.ist)||0;totZi+=Number(sv.zi)||0;totGr+=Number(sv.gr)||0;}
    var bg=isWE?'background:rgba(201,168,76,0.04)':'';
    html+='<tr class="'+(filled?'filled':'')+'" style="'+bg+'">';
    html+='<td class="sz-nr" style="color:'+(isWE?'var(--gold)':'var(--muted)')+'">'+day+'<br><span style="font-size:0.52rem">'+dow+'</span></td>';
    html+='<td><input class="si" id="sz_von_'+day+'" value="'+(sv.von||'')+'" placeholder="09:00" style="color:var(--cream)!important;-webkit-text-fill-color:var(--cream)!important;background:#0d1525!important"></td>';
    html+='<td><input class="si at" id="sz_bis_'+day+'" value="'+(sv.bis||'')+'" readonly></td>';
    html+='<td><input class="si ro" id="sz_pau_'+day+'" value="'+(sv.pause||'')+'" readonly></td>';
    html+='<td><input class="si ai" id="sz_ist_'+day+'" value="'+(sv.ist||'')+'" readonly></td>';
    html+='<td><input class="si zi" id="sz_zi_'+day+'" type="number" min="0" value="'+(sv.zi||'')+'" style="color:var(--gold2)!important;-webkit-text-fill-color:var(--gold2)!important;background:#0a1830!important"></td>';
    html+='<td><input class="si" id="sz_gr_'+day+'" type="number" min="0" value="'+(sv.gr||'')+'" style="color:var(--cream)!important;-webkit-text-fill-color:var(--cream)!important;background:#0d1525!important"></td>';
    html+='<td><input class="si" id="sz_chk_'+day+'" type="number" min="0" value="'+(sv.chk||'')+'" style="color:var(--cream)!important;-webkit-text-fill-color:var(--cream)!important;background:#0d1525!important"></td>';
    html+='</tr>';
  }
  html+='</tbody><tfoot><tr>';
  html+='<td colspan="4" class="sz-ges" style="text-align:left;padding-left:7px">GESAMT</td>';
  html+='<td class="sz-ges" id="sz-tot-ist">'+( totIst>0?totIst.toFixed(2)+' h':'-')+'</td>';
  html+='<td class="sz-ges" id="sz-tot-zi">'+( totZi||'-')+'</td>';
  html+='<td class="sz-ges" id="sz-tot-gr">'+( totGr||'-')+'</td>';
  html+='<td class="sz-ges"></td>';
  html+='</tr></tfoot></table></div></div>';

  wrap.innerHTML=html;

  // Auto-calc on Von/Zi input
  wrap.oninput=function(e){
    var id=(e.target&&e.target.id)||'';
    var mDay=id.match(/sz_(?:von|zi|gr|chk)_(\d+)/);
    if(mDay)szCalcDay(parseInt(mDay[1]),monat,hotel);
    szCalcTot();
  };
}

function szCalcDay(day,monat,hotel){
  var zi=parseFloat(gv('sz_zi_'+day))||0;
  var gr=parseFloat(gv('sz_gr_'+day))||0;
  var chk=parseFloat(gv('sz_chk_'+day))||0;
  var von=gv('sz_von_'+day)||'09:00';
  var ist=calcIst(hotel,zi,gr,0,chk,0,0,0);
  var vonMin=t2m(von)||540;
  sv('sz_ist_'+day,ist>0?ist.toFixed(2):'');
  sv('sz_bis_'+day,ist>0?m2t(vonMin+Math.round(ist*60)+30):'');
  sv('sz_pau_'+day,ist>0?'0,50':'');
  var row=ge('sz_von_'+day);if(row)row.closest('tr').className=ist>0?'filled':'';
}

function szCalcTot(){
  var ist=0,zi=0,gr=0;
  for(var d=1;d<=31;d++){
    ist+=parseFloat(gv('sz_ist_'+d))||0;
    zi+=parseFloat(gv('sz_zi_'+d))||0;
    gr+=parseFloat(gv('sz_gr_'+d))||0;
  }
  var ei=ge('sz-tot-ist');if(ei)ei.textContent=ist>0?ist.toFixed(2)+' h':'-';
  var ez=ge('sz-tot-zi');if(ez)ez.textContent=zi||'-';
  var eg=ge('sz-tot-gr');if(eg)eg.textContent=gr||'-';
}

function szSave(){
  var hotel=(USER.role==='chef'&&USER.chefHotel)?USER.chefHotel:USER.hotel;
  var maName=gv('sz-ma')||USER.name;
  var monat=gv('sz-mon');
  if(!monat){toast('Monat wählen!','err');return;}
  var mk=sk(maName);
  if(!DATA.sz[hotel])DATA.sz[hotel]={};
  if(!DATA.sz[hotel][mk])DATA.sz[hotel][mk]={name:maName};
  var tage={};var totIst=0,totZi=0,totGr=0;
  for(var d=1;d<=31;d++){
    var zi=gv('sz_zi_'+d),ist=parseFloat(gv('sz_ist_'+d))||0;
    if(!zi&&!ist)continue;
    tage[dkey(d)]={zi:parseFloat(zi)||0,gr:parseFloat(gv('sz_gr_'+d))||0,
      chk:parseFloat(gv('sz_chk_'+d))||0,von:gv('sz_von_'+d)||'09:00',
      bis:gv('sz_bis_'+d)||'',ist:ist,pause:0.5};
    totIst+=ist;totZi+=parseFloat(zi)||0;totGr+=parseFloat(gv('sz_gr_'+d))||0;
  }
  DATA.sz[hotel][mk][monat]={tage:tage,istGes:Math.round(totIst*100)/100,ziGes:totZi,grGes:totGr};
  save();
  fbPut('hotels/'+sk(hotel)+'/sz',DATA.sz[hotel]);
  toast('✅ Stundenzettel gespeichert','ok');
}

function luLoad(monat){
  var wrap=ge('lu-body');if(!wrap)return;
  var hotel=(USER.role==='chef'&&USER.chefHotel)?USER.chefHotel:USER.hotel;
  var szH=DATA.sz[hotel]||{};
  var luH=(DATA.lu[hotel]&&DATA.lu[hotel][monat])||{rows:{}};
  var luRows=luH.rows||{};
  var r1H=(DATA.r1[hotel]&&DATA.r1[hotel][monat])||{};

  // Collect all days
  var days={};
  Object.keys(luRows).forEach(function(d){days[d]=1;});
  Object.keys(szH).forEach(function(mk){
    var m=szH[mk];if(!m||!m[monat])return;
    Object.keys((m[monat].tage)||{}).forEach(function(d){days[d]=1;});
  });
  var dayList=Object.keys(days).sort(function(a,b){
    return parseInt(a.replace('d',''))-parseInt(b.replace('d',''));
  });

  // Separate own vs sub
  var own=[],sub=[];
  Object.keys(szH).forEach(function(mk){
    var n=szH[mk].name||mk.replace(/_/g,' ');
    if(isSub(n))sub.push({mk:mk,name:n,d:szH[mk]});
    else own.push({mk:mk,name:n,d:szH[mk]});
  });

  var out='';

  // ── EIGENE MA ──
  out+='<div class="card">';
  out+='<div style="font-size:0.72rem;font-weight:700;color:var(--gold);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)">👤 Eigene Mitarbeiter — '+monat+'</div>';
  if(!own.length||!dayList.length){
    out+='<div class="empty" style="padding:16px">Keine Daten. Tagesabrechnung speichern.</div>';
  } else {
    out+='<div style="overflow-x:auto"><table class="lu-tbl">';
    out+='<thead><tr><th style="min-width:90px">Mitarbeiter</th>';
    dayList.forEach(function(d){out+='<th>'+d.replace('d','')+'.</th>';});
    out+='<th style="color:var(--gold)">Σ Zi</th><th style="color:var(--green)">Σ Std</th></tr></thead><tbody>';
    var totZi=0,totIst=0;
    own.forEach(function(ma,idx){
      var mon=ma.d[monat]||{tage:{},ziGes:0,istGes:0};
      var maZi=0,maIst=0;
      out+='<tr style="'+(idx%2?'background:rgba(0,0,0,0.2)':'')+'">';
      out+='<td>'+ma.name+'</td>';
      dayList.forEach(function(d){
        var t=(mon.tage&&(mon.tage[d]||mon.tage[parseInt(d.replace('d',''))]))||{};
        var z=parseInt(t.zi)||0,ist=parseFloat(t.ist)||0;
        maZi+=z;maIst+=ist;
        out+='<td style="'+(z>0?'color:var(--gold);font-weight:700':'color:var(--muted)')+'">'+( z||'-')+'</td>';
      });
      totZi+=maZi;totIst+=maIst;
      out+='<td style="color:var(--gold);font-weight:700">'+maZi+'</td>';
      out+='<td style="color:var(--green);font-weight:700">'+maIst.toFixed(1)+'h</td>';
      out+='</tr>';
    });
    out+='<tr class="sum"><td>GESAMT</td>';
    dayList.forEach(function(d){
      var r=luRows[d]||{};out+='<td>'+(parseInt(r.zi)||'-')+'</td>';
    });
    out+='<td>'+totZi+'</td><td>'+totIst.toFixed(1)+'h</td></tr>';
    out+='</tbody></table></div>';
  }
  out+='</div>';

  // ── SUB ──
  var subData={};
  Object.keys(r1H).forEach(function(d){
    (r1H[d]||[]).forEach(function(e){
      if(!subData[e.name])subData[e.name]={zi:0,ist:0,days:{}};
      subData[e.name].zi+=e.zi||0;
      subData[e.name].ist+=e.ist||0;
      subData[e.name].days[d]=e;
    });
  });
  // Also from SZ
  sub.forEach(function(ma){
    var mon=ma.d[monat]||{tage:{}};
    if(!subData[ma.name])subData[ma.name]={zi:0,ist:0,days:{}};
    Object.keys(mon.tage||{}).forEach(function(d){
      if(!subData[ma.name].days[d]){
        subData[ma.name].zi+=parseInt(mon.tage[d].zi)||0;
        subData[ma.name].ist+=parseFloat(mon.tage[d].ist)||0;
        subData[ma.name].days[d]=mon.tage[d];
      }
    });
  });
  var subNames=Object.keys(subData);

  out+='<div class="card">';
  out+='<div style="font-size:0.72rem;font-weight:700;color:var(--gold);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)">🏢 Subunternehmer — '+monat+'</div>';
  if(!subNames.length){
    out+='<div class="empty" style="padding:16px">Kein SUB.<br><small style="color:var(--muted)">Name mit Kürzel eingeben: z.B. "Ali R1", "Nast SO"</small></div>';
  } else {
    out+='<div style="overflow-x:auto"><table class="lu-tbl">';
    out+='<thead><tr><th>Name</th>';
    dayList.forEach(function(d){out+='<th>'+d.replace('d','')+'.</th>';});
    out+='<th style="color:var(--gold)">Σ Zi</th><th style="color:var(--green)">Σ Std</th></tr></thead><tbody>';
    var sTotZi=0,sTotIst=0;
    subNames.forEach(function(nm,idx){
      var s=subData[nm];
      out+='<tr style="'+(idx%2?'background:rgba(0,0,0,0.2)':'')+'">';
      out+='<td style="color:var(--gold2)">'+nm+'</td>';
      dayList.forEach(function(d){
        var e=s.days[d];var z=e?parseInt(e.zi)||0:0;
        out+='<td style="'+(z?'color:var(--gold);font-weight:700':'color:var(--muted)')+'">'+( z||'-')+'</td>';
      });
      sTotZi+=s.zi;sTotIst+=s.ist;
      out+='<td style="color:var(--gold);font-weight:700">'+s.zi+'</td>';
      out+='<td style="color:var(--green);font-weight:700">'+s.ist.toFixed(1)+'h</td>';
      out+='</tr>';
    });
    out+='<tr class="sum"><td>GESAMT SUB</td>';
    dayList.forEach(function(){out+='<td></td>';});
    out+='<td>'+sTotZi+'</td><td>'+sTotIst.toFixed(1)+'h</td></tr>';
    out+='</tbody></table></div>';
  }
  out+='</div>';

  wrap.innerHTML=out;
}

// ============================================================
function pgDash(){
  var c=ge('content');if(!c)return;
  var now=new Date();
  var thisM=now_ym();

  // Stats across all hotels
  var totTA=0,totPend=0,totZi=0,totMa=0;
  Object.keys(HOTELS).forEach(function(hotel){
    var ta=DATA.ta[hotel]||{};
    Object.keys(ta).forEach(function(d){
      totTA++;
      if((ta[d].status||'pending')==='pending')totPend++;
    });
    var lu=DATA.lu[hotel];
    if(lu&&lu[thisM]&&lu[thisM].rows){
      Object.values(lu[thisM].rows).forEach(function(r){totZi+=r.zi||0;});
    }
    var sz=DATA.sz[hotel]||{};
    totMa+=Object.keys(sz).length;
  });

  var html='';
  // Stats
  html+='<div class="stats">';
  html+='<div class="stat"><span class="stat-n">'+totTA+'</span><span class="stat-l">Abrechnungen</span></div>';
  html+='<div class="stat"><span class="stat-n" style="color:var(--gold2)">'+totPend+'</span><span class="stat-l">Ausstehend</span></div>';
  html+='<div class="stat"><span class="stat-n">'+totZi+'</span><span class="stat-l">Zimmer / Monat</span></div>';
  html+='<div class="stat"><span class="stat-n">'+totMa+'</span><span class="stat-l">Mitarbeiter</span></div>';
  html+='</div>';

  // Inbox - pending TAs
  html+='<div class="card"><div class="card-hd">Inbox — Tagesabrechnungen</div>';
  var pendList=[];
  Object.keys(HOTELS).forEach(function(hotel){
    var ta=DATA.ta[hotel]||{};
    Object.keys(ta).sort().reverse().forEach(function(d){
      var t=ta[d];
      pendList.push({hotel:hotel,datum:d,ta:t});
    });
  });
  if(!pendList.length){
    html+='<div class="empty">Keine Abrechnungen eingegangen.</div>';
  } else {
    pendList.slice(0,20).forEach(function(item){
      var t=item.ta;
      var status=t.status||'pending';
      var badge=status==='approved'?'<span class="badge b-ok">✓ Genehmigt</span>':
                status==='rejected'?'<span class="badge b-no">✗ Abgelehnt</span>':
                '<span class="badge b-pend">⏳ Ausstehend</span>';
      html+='<div style="background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-bottom:8px">';
      html+='<div style="display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap">';
      html+='<div style="flex:1;min-width:0">';
      html+='<div style="font-weight:700;font-size:0.8rem;color:var(--cream)">'+item.hotel+'</div>';
      html+='<div style="font-size:0.64rem;color:var(--muted);margin-top:2px">'+item.datum+(t.tl?' · TL: '+t.tl:'')+(t.tlLoginTime?' · Eingeloggt: '+t.tlLoginTime:'')+'</div>';
      if(t.rows&&t.rows.length){
        html+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">';
        t.rows.forEach(function(r){
          html+='<span style="font-size:0.62rem;background:var(--bg4);border:1px solid var(--border);padding:2px 7px;border-radius:4px;color:'+(isSub(r.name)?'var(--gold2)':'var(--cream)')+'">';
          html+=(isSub(r.name)?'🏢 ':'👤 ')+r.name+': '+r.zi+' Zi</span>';
        });
        html+='</div>';
      }
      html+='</div>';
      html+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">'+badge;
      if(status==='pending'){
        html+='<div style="display:flex;gap:5px">';
        html+='<button class="btn sm grn" data-approve="'+item.hotel+'|'+item.datum+'">✓</button>';
        html+='<button class="btn sm red" data-reject="'+item.hotel+'|'+item.datum+'">✗</button>';
        html+='</div>';
      }
      html+='<button class="btn sm red" data-del="'+item.hotel+'|'+item.datum+'">🗑</button>';
      html+='</div></div></div>';
    });
  }
  html+='</div>';

  // Per hotel summary
  html+='<div class="card"><div class="card-hd">Hotels Übersicht — '+thisM+'</div>';
  Object.keys(HOTELS).forEach(function(hotel){
    var lu=DATA.lu[hotel];
    var luM=lu&&lu[thisM]&&lu[thisM].rows||{};
    var zi=0;Object.values(luM).forEach(function(r){zi+=r.zi||0;});
    var sz=DATA.sz[hotel]||{};
    var maCount=Object.keys(sz).length;
    var online=DATA.online&&DATA.online[hotel]||{};
    var onlineList=Object.values(online);
    html+='<div style="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);gap:10px">';
    html+='<div style="flex:1;font-size:0.76rem;font-weight:600;color:var(--cream)">'+hotel+'</div>';
    if(onlineList.length)onlineList.forEach(function(tl){
      html+='<span style="font-size:0.58rem;color:var(--green);background:rgba(61,186,118,0.08);padding:2px 7px;border-radius:10px">🟢 '+tl.name+' '+tl.loginTime+'</span>';
    });
    html+='<span style="font-size:0.64rem;color:var(--muted)">'+maCount+' MA · '+zi+' Zi</span>';
    html+='</div>';
  });
  html+='</div>';

  c.innerHTML=html;
}

function approveTa(hotel,datum){
  if(!DATA.ta[hotel]||!DATA.ta[hotel][datum])return;
  DATA.ta[hotel][datum].status='approved';
  save();
  var hk=sk(hotel),dk=sk(datum);
  fbPut('hotels/'+hk+'/tagesabrechnung/'+dk+'/status','approved');
  fbPut('chef/inbox/'+dk+'_'+hk+'/status','approved');
  toast('✅ Genehmigt','ok');
  setTimeout(function(){if(currentTab==='dash')pgDash();else if(currentTab==='live')pgLive();},300);
}
function rejectTa(hotel,datum){
  if(!DATA.ta[hotel]||!DATA.ta[hotel][datum])return;
  DATA.ta[hotel][datum].status='rejected';
  save();
  var hk=sk(hotel),dk=sk(datum);
  fbPut('hotels/'+hk+'/tagesabrechnung/'+dk+'/status','rejected');

    t2=t2.parentNode;

    var a=t.getAttribute&&t.getAttribute('data-approve');
    var r=t.getAttribute&&t.getAttribute('data-reject');
    var d=t.getAttribute&&t.getAttribute('data-del');
    if(a){var p=a.split('|');approveTa(p[0],p[1]);return;}

    if(d){var p3=d.split('|');delTa(p3[0],p3[1]);return;}
    t=t.parentNode;
  }
});

    }
    tRows+='<tr class="ges"><td colspan="4">GESAMT<\/td><td>'+totIst.toFixed(2)+' h<\/td><td>'+totZi+'<\/td><\/tr>';
    pages+='<div class="page"><h2>Stundenzettel — '+monNames[mo]+' '+yr+'<\/h2><div class="meta">Mitarbeiter: <b>'+maName+'<\/b> | Hotel: '+hotel+'<\/div><table><tr><th>Datum<\/th><th>Von<\/th><th>Bis<\/th><th>Pause<\/th><th>Ist-Std<\/th><th>Zimmer<\/th><\/tr>'+tRows+'<\/table><div class="sig"><div class="sig-box">Unterschrift Mitarbeiter<\/div><div class="sig-box">Unterschrift Teamleader<\/div><\/div><\/div>';
  });
  prtBase('<style>'+css+'@page{size:A4 portrait;margin:8mm}<\/style>'+pages);
}
