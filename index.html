<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>A&J Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--navy:#0d1b2a;--navy2:#111f2e;--navy3:#162538;
--gold:#c8a84b;--gold2:#e8cc7a;--gold3:rgba(200,168,75,0.1);
--cream:#f0e8d5;--muted:#6a7a8a;
--border:rgba(30,58,82,0.8);--border2:rgba(200,168,75,0.2);
--ok:rgba(45,106,79,0.15);--warn:rgba(181,69,27,0.15);
--agreen:rgba(20,80,40,0.2);--ablue:rgba(20,60,160,0.2);
}
html,body{background:var(--navy);color:var(--cream);font-family:'Josefin Sans',sans-serif;min-height:100vh}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(–navy2);border:1px solid var(–border2);padding:32px;max-width:340px;width:100%;text-align:center;border-radius:4px}
.login-logo{font-family:‘Playfair Display’,serif;font-size:3rem;font-weight:900;color:var(–gold)}
.login-sub{font-size:0.5rem;letter-spacing:0.4em;text-transform:uppercase;color:var(–muted);margin:4px 0 24px}
.role-btn{width:100%;background:transparent;border:1px solid var(–border2);color:var(–cream);font-family:‘Josefin Sans’,sans-serif;font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;padding:14px;cursor:pointer;border-radius:3px;text-align:left;display:flex;align-items:center;gap:12px;margin-bottom:10px;transition:all 0.2s}
.role-btn:hover{background:var(–gold3);border-color:var(–gold)}
.role-btn.gold{background:var(–gold);color:var(–navy);font-weight:700;border-color:var(–gold)}
.role-btn.gold:hover{background:var(–gold2)}
.role-desc{font-size:0.6rem;color:var(–muted);display:block;margin-top:2px;text-transform:none;letter-spacing:0.04em;font-weight:300}
.role-btn.gold .role-desc{color:var(–navy);opacity:0.7}
.hotel-sel{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(–border2);color:var(–cream);padding:10px;font-family:‘Josefin Sans’,sans-serif;font-size:0.82rem;outline:none;border-radius:3px;margin-bottom:10px}
.name-inp-login{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(–border2);color:var(–cream);padding:10px;font-family:‘Josefin Sans’,sans-serif;font-size:0.82rem;outline:none;border-radius:3px;margin-bottom:10px}
.name-inp-login::placeholder{color:var(–muted)}

/* APP */
.app-screen{display:none}
.app-screen.show{display:block}

/* TOPBAR */
.topbar{background:var(–navy2);border-bottom:1px solid var(–border2);padding:11px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100}
.tb-logo{font-family:‘Playfair Display’,serif;font-size:1.1rem;font-weight:900;color:var(–gold)}
.tb-info{font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(–muted)}
.tb-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.out-btn{background:transparent;border:1px solid var(–border);color:var(–muted);font-family:‘Josefin Sans’,sans-serif;font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;padding:5px 10px;cursor:pointer;border-radius:2px}

/* TABS */
.tabs{background:var(–navy3);border-bottom:1px solid var(–border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:11px 14px;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(–muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
.tab.active{color:var(–gold);border-bottom-color:var(–gold)}

/* CONTENT */
.content{padding:14px}

/* CARD */
.card{background:var(–navy2);border:1px solid var(–border);border-radius:3px;padding:14px;margin-bottom:12px}
.card-title{font-family:‘Playfair Display’,serif;font-size:0.9rem;color:var(–gold);margin-bottom:12px}

/* INPUTS */
.inp{background:rgba(255,255,255,0.05);border:1px solid var(–border);color:var(–cream);padding:7px 9px;font-family:‘Josefin Sans’,sans-serif;font-size:0.8rem;outline:none;border-radius:2px;width:100%}
.inp:focus{border-color:var(–gold)}
.inp::placeholder{color:var(–muted);font-size:0.74rem}
.lbl{font-size:0.52rem;letter-spacing:0.14em;text-transform:uppercase;color:var(–muted);margin-bottom:3px;display:block}
.frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.ff{display:flex;flex-direction:column;flex:1;min-width:90px}

/* BUTTONS */
.btn{background:transparent;border:1px solid var(–border2);color:var(–gold);font-family:‘Josefin Sans’,sans-serif;font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;padding:7px 14px;cursor:pointer;border-radius:2px;transition:all 0.2s;white-space:nowrap}
.btn:hover{background:var(–gold3)}
.btn.primary{background:var(–gold);color:var(–navy);font-weight:700;border-color:var(–gold)}
.btn.primary:hover{background:var(–gold2)}
.btn.sm{padding:5px 10px;font-size:0.56rem}
.btn.danger{border-color:rgba(200,80,80,0.3);color:#e88}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(95px,1fr));gap:8px;margin-bottom:12px}
.stat{background:var(–navy3);border:1px solid var(–border);padding:12px;text-align:center;border-radius:2px}
.stat-v{font-family:‘Playfair Display’,serif;font-size:1.4rem;color:var(–gold);display:block;line-height:1}
.stat-l{font-size:0.5rem;letter-spacing:0.14em;text-transform:uppercase;color:var(–muted);margin-top:3px;display:block}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:0.76rem}
.tbl th{padding:6px 7px;text-align:left;font-size:0.52rem;letter-spacing:0.14em;text-transform:uppercase;color:var(–muted);border-bottom:1px solid var(–border2);font-weight:400}
.tbl td{padding:7px 7px;border-bottom:1px solid rgba(30,58,82,0.4);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,0.015)}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:0.6rem;font-weight:600}
.b-ok{background:rgba(45,106,79,0.15);color:#5dbf8a}
.b-warn{background:rgba(181,69,27,0.15);color:#f4845f}
.b-grey{background:rgba(255,255,255,0.06);color:var(–muted)}
.b-gold{background:var(–gold3);color:var(–gold2);border:1px solid var(–border2)}

/* STUNDENZETTEL TABLE */
.sz-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.sz-tbl{border-collapse:collapse;min-width:580px;width:100%;font-size:0.75rem}
.sz-tbl thead th{background:var(–navy3);color:var(–gold);font-size:0.54rem;letter-spacing:0.07em;text-transform:uppercase;font-weight:600;padding:6px 3px;text-align:center;border:1px solid var(–border);line-height:1.3}
.sz-tbl thead th.ac{background:#071510;color:#81c784}
.sz-tbl thead th.zc{background:#07101a;color:#90caf9}
.sz-tbl tbody td{border:1px solid rgba(30,58,82,0.5);padding:0;vertical-align:middle}
.sz-tbl tbody tr:nth-child(even) td{background:rgba(8,18,28,0.4)}
.sz-tbl tbody tr.filled td{background:rgba(20,50,25,0.2)}
.sz-nr{text-align:center;font-weight:600;font-size:0.74rem;color:var(–muted);padding:0 3px;background:rgba(0,0,0,0.2);min-width:24px}
.sz-inp{width:100%;background:transparent;border:none;outline:none;font-family:‘Josefin Sans’,sans-serif;font-size:0.76rem;padding:5px 3px;text-align:center;color:var(–cream)}
.sz-inp.zi{color:var(–gold2);font-weight:700;font-size:0.85rem;background:rgba(0,80,160,0.15)}
.sz-inp.at{color:#90caf9;font-weight:700;cursor:default;background:rgba(20,60,120,0.2)}
.sz-inp.ai{color:#81c784;font-weight:700;cursor:default;background:rgba(20,80,40,0.18)}
.sz-inp.pa{color:rgba(200,168,75,0.5);cursor:default}
.sz-ges td{background:var(–navy3)!important;border-top:2px solid var(–gold)}
.sz-ges-v{font-family:‘Playfair Display’,serif;font-size:0.9rem;color:var(–gold);text-align:center;padding:5px 3px}

/* TAGESABRECHNUNG TABLE */
.ta-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.ta-tbl{border-collapse:collapse;min-width:600px;width:100%;font-size:0.78rem}
.ta-tbl th{background:var(–navy3);color:var(–gold);font-size:0.54rem;letter-spacing:0.07em;text-transform:uppercase;font-weight:600;padding:6px 3px;text-align:center;border:1px solid var(–border);line-height:1.3}
.ta-tbl th.nm{text-align:left;padding-left:7px;min-width:120px}
.ta-tbl td{border:1px solid rgba(30,58,82,0.5);padding:0;vertical-align:middle}
.ta-tbl tr:nth-child(even) td{background:rgba(8,18,28,0.35)}
.ta-tbl tr.ges-row td{background:var(–navy3)!important;border-top:2px solid var(–gold)}
.ta-inp{width:100%;background:transparent;border:none;outline:none;font-family:‘Josefin Sans’,sans-serif;font-size:0.78rem;padding:5px 3px;text-align:center;color:var(–cream)}
.ta-inp.nm{text-align:left;padding-left:7px}
.ta-inp.zi{color:var(–gold2);font-weight:700;font-size:0.85rem;background:rgba(0,80,160,0.12)}
.ta-inp.ai{color:#81c784;font-weight:700;cursor:default;background:rgba(20,80,40,0.15)}
.ta-sel{width:100%;background:rgba(5,15,25,0.8);border:none;outline:none;font-family:‘Josefin Sans’,sans-serif;font-size:0.76rem;padding:5px 5px;color:var(–cream);cursor:pointer}
.ta-ges-v{font-family:‘Playfair Display’,serif;font-size:0.88rem;color:var(–gold);text-align:center;padding:5px 3px}

/* LEISTUNGSÜBERSICHT */
.lu-tbl{border-collapse:collapse;width:100%;font-size:0.76rem}
.lu-tbl th{background:var(–navy3);color:var(–gold);font-size:0.52rem;letter-spacing:0.07em;text-transform:uppercase;font-weight:600;padding:6px 3px;text-align:center;border:1px solid var(–border);line-height:1.3}
.lu-tbl td{border:1px solid rgba(30,58,82,0.5);padding:0;vertical-align:middle}
.lu-tbl tr:nth-child(even) td{background:rgba(8,18,28,0.35)}
.lu-tbl tr.mid-row td,.lu-tbl tr.sum-row td{background:var(–navy3)!important;border-top:2px solid var(–gold)}
.lu-nr{text-align:center;font-weight:700;font-size:0.74rem;color:var(–muted);padding:0 3px;background:rgba(0,0,0,0.2);min-width:28px}
.lu-inp{width:100%;background:transparent;border:none;outline:none;font-family:‘Josefin Sans’,sans-serif;font-size:0.76rem;padding:5px 3px;text-align:center;color:var(–cream)}
.lu-inp.zi{color:var(–gold2);font-weight:700;background:rgba(0,80,160,0.1)}
.lu-inp.ai{color:#81c784;font-weight:700;cursor:default;background:rgba(20,80,40,0.12)}
.lu-ges-v{font-family:‘Playfair Display’,serif;font-size:0.85rem;color:var(–gold);text-align:center;padding:5px 3px}

/* DIENSTPLAN */
.dp-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.dp-tbl{border-collapse:collapse;min-width:700px;width:100%;font-size:0.74rem}
.dp-tbl th{background:var(–navy3);color:var(–gold);font-size:0.54rem;letter-spacing:0.07em;text-transform:uppercase;font-weight:600;padding:6px 3px;text-align:center;border:1px solid var(–border);line-height:1.3}
.dp-inp{width:100%;background:transparent;border:none;outline:none;font-family:‘Josefin Sans’,sans-serif;font-size:0.74rem;padding:5px 2px;text-align:center;color:var(–cream)}
.dp-inp.nm{text-align:left;padding-left:7px;color:var(–cream)}
.dp-inp.vora{color:var(–gold);font-weight:600}
.dp-inp.frei{color:#5dbf8a;font-weight:700}
.dp-tbl td{border:1px solid rgba(30,58,82,0.5);padding:0;vertical-align:middle}
.dp-tbl tr:nth-child(even) td{background:rgba(8,18,28,0.35)}
.dp-zi-row td{background:rgba(200,168,75,0.04)!important}
.dp-ma-row td{background:rgba(8,18,28,0.6)!important}
.dp-bel-row td{background:rgba(5,12,22,0.5)!important}

/* SIG */
.sig-box{background:var(–navy3);border:1px solid var(–border2);border-radius:3px;padding:12px;margin-top:10px}
.sig-lbl{font-size:0.56rem;letter-spacing:0.15em;text-transform:uppercase;color:var(–muted);margin-bottom:6px}
.sig-canvas-wrap{border:2px dashed var(–border2);border-radius:2px;background:rgba(255,255,255,0.02);position:relative;touch-action:none}
.sig-canvas{display:block;width:100%;cursor:crosshair;touch-action:none}
.sig-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.68rem;color:var(–muted);pointer-events:none;text-align:center;transition:opacity 0.3s}
.sig-row{display:flex;gap:8px;margin-top:6px;align-items:center}
.sig-ok{font-size:0.63rem;color:#5dbf8a;margin-left:auto}

/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;padding:10px 18px;border-radius:3px;font-size:0.74rem;font-weight:600;z-index:9999;display:none;border:1px solid;max-width:280px}
.toast.ok{background:rgba(45,106,79,0.15);color:#5dbf8a;border-color:rgba(45,106,79,0.4)}
.toast.err{background:rgba(181,69,27,0.15);color:#f4845f;border-color:rgba(181,69,27,0.4)}
.toast.info{background:rgba(20,60,140,0.3);color:#90caf9;border-color:rgba(20,60,140,0.5)}
.empty{text-align:center;padding:28px;color:var(–muted);font-size:0.76rem}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(–navy)}
::-webkit-scrollbar-thumb{background:rgba(30,58,82,0.8);border-radius:2px}
@media print{.topbar,.tabs,.content{display:none!important}#dp-print-area{display:block!important}body{background:#fff!important}}
#dp-print-area{display:none}

/* ── TABLET (768px+) ── */
@media (min-width: 768px) {
.login-box { max-width:420px; padding:40px; }
.login-logo { font-size:3.5rem; }
.content { padding:20px; max-width:900px; margin:0 auto; }
.card { padding:18px; }
.tabs { justify-content:center; }
.tab { padding:14px 22px; font-size:0.65rem; }
.topbar { padding:14px 24px; }
.tb-logo { font-size:1.3rem; }
.stats { grid-template-columns: repeat(4, 1fr); }
.sz-tbl { font-size:0.82rem; }
.sz-inp { font-size:0.82rem; padding:7px 4px; }
.ta-tbl { font-size:0.82rem; }
.ta-inp { font-size:0.82rem; padding:7px 4px; }
.lu-tbl { font-size:0.82rem; }
.lu-inp { font-size:0.82rem; padding:7px 4px; }
.dp-tbl { font-size:0.78rem; }
.dp-inp { font-size:0.78rem; }
.btn { padding:9px 18px; font-size:0.65rem; }
.inp { font-size:0.85rem; padding:8px 10px; }
.frow { gap:12px; }
}

/* ── DESKTOP (1024px+) ── */
@media (min-width: 1024px) {
.app-screen { display:grid; grid-template-columns:220px 1fr; grid-template-rows:auto 1fr; min-height:100vh; }
.topbar { grid-column:1/-1; }
.tabs {
grid-column:1;
grid-row:2;
flex-direction:column;
overflow-x:visible;
overflow-y:auto;
border-right:1px solid var(–border);
border-bottom:none;
padding:16px 0;
height:calc(100vh - 52px);
position:sticky;
top:52px;
align-self:start;
}
.tab {
padding:12px 20px;
border-bottom:none;
border-left:2px solid transparent;
border-right:none;
text-align:left;
font-size:0.62rem;
}
.tab.active {
border-left-color:var(–gold);
border-bottom:none;
background:var(–gold3);
}
.content {
grid-column:2;
grid-row:2;
padding:24px;
max-width:1100px;
}
.card { padding:20px; margin-bottom:16px; }
.stats { grid-template-columns: repeat(4,1fr); gap:14px; }
.sz-wrap, .ta-wrap, .dp-wrap { overflow-x:visible; }
.sz-tbl, .ta-tbl, .lu-tbl, .dp-tbl { min-width:unset; width:100%; font-size:0.82rem; }
.login-box { max-width:440px; }
.tbl td, .tbl th { padding:9px 10px; font-size:0.78rem; }
}

/* ── LARGE DESKTOP (1400px+) ── */
@media (min-width: 1400px) {
.content { max-width:1300px; }
.stats { grid-template-columns: repeat(6,1fr); }
}
</style>

</head>

function taCalc(ri) {
var cfg = getCfg(USER.hotel);
var isRS = USER.hotel.indexOf(‘Bruhl’) >= 0;
var zi = parseFloat(gv(‘ta_zi_’+ri))||0;
var gr = parseFloat(gv(‘ta_gr_’+ri))||0; // Apartment for RS
var chk = parseFloat(gv(‘ta_chk_’+ri))||0;
var pub = parseFloat(gv(‘ta_pub_’+ri))||0;
var son = parseFloat(gv(‘ta_son_’+ri))||0;
var ist;
if (isRS) {
// DZ: 2.5 Zi/h, Apartment: 2.0 Zi/h, Sessel: 1h fest, Checker: 4 min
var sesH = parseFloat(gv(‘ta_ses_’+ri))||0; // Sessel in dedicated ses field
ist = zi/(cfg.ziH||2.5) + gr/(cfg.aptH||2.0) + sesH*(cfg.sesH||1.0) + chk*cfg.ckMin/60 + pub + son + cfg.pub;
} else if (USER.hotel === ‘Spark by Hilton Essen’) {
var mini = parseFloat(gv(‘ta_mini_’+ri))||0;
ist = zi/cfg.ziH + gr/cfg.ziH + mini*(cfg.miniMin||3)/60 + chk*cfg.ckMin/60 + pub + son + cfg.pub;
} else if (USER.hotel.indexOf(‘McDreams’) >= 0 || USER.hotel.indexOf(‘Dusseldorf’) >= 0) {
ist = zi/cfg.ziH + gr/cfg.ziH + chk*cfg.ckMin/60 + pub + cfg.pub;
} else {
ist = zi/cfg.ziH + gr/(cfg.grH||cfg.ziH) + chk*cfg.ckMin/60 + pub + son + cfg.pub;
}
var istEl = document.getElementById(‘ta_ist_’+ri);
if (istEl) istEl.value = ist > 0 ? ist.toFixed(2) : ‘’;

taCalcGes();
taAutoTransfer(ri, zi, gr, chk, pub, son, ist, cfg);
}

function taCalcGes() {
var isRSgc = USER.hotel.indexOf(‘Bruhl’) >= 0;
var isMCgc = USER.hotel.indexOf(‘McDreams’) >= 0 || USER.hotel.indexOf(‘Dusseldorf’) >= 0;
var gcols = isRSgc ? [‘zi’,‘gr’,‘ses’,‘chk’,‘pub’,‘son’,‘auf’] : isMCgc ? [‘zi’,‘gr’,‘chk’,‘pub’] : [‘zi’,‘gr’,‘chk’,‘pub’,‘wae’,‘son’,‘auf’];
gcols.forEach(function(col) {
var sum = 0;
for (var ri=0; ri<TA_ROWS; ri++) {
sum += parseFloat(gv(‘ta_’+col+’*’+ri))||0;
}
var el = document.getElementById(’tages*’+col);
if (el) el.textContent = sum || ‘–’;
});
var sumIst = 0;
for (var ri=0; ri<TA_ROWS; ri++) {
sumIst += parseFloat(gv(‘ta_ist_’+ri))||0;
}
var el = document.getElementById(‘tages_ist’);
if (el) el.textContent = sumIst > 0 ? sumIst.toFixed(2)+’ h’ : ‘–’;
}

function taAutoTransfer(ri, zi, gr, chk, pub, son, ist, cfg) {
var maName = getTaName(ri);
if (!maName) return;

// Get date and day
var datumStr = gv(‘ta-datum’) || ‘’;
var day = null;
if (datumStr.indexOf(’.’) >= 0) {
day = parseInt(datumStr.split(’.’)[0]);
}
if (!day || day < 1 || day > 31) return;

var hotel = USER.hotel;
var von = startTime(maName);
var bis = ist > 0 ? m2t((t2m(von)||0) + ist*60 + 0.5*60) : ‘’;

// ── 1. Stundenzettel für diesen MA speichern ──
if (!DATA.sz[hotel]) DATA.sz[hotel] = {};
if (!DATA.sz[hotel][maName]) DATA.sz[hotel][maName] = {};

// Get monat from datum
var monat = ‘’;
if (datumStr.indexOf(’.’) >= 0) {
var parts = datumStr.split(’.’);
monat = (parts[2]||new Date().getFullYear())+’-’+String(parts[1]||1).padStart(2,‘0’);

function luCalcRow(day, cfg) {
if (!cfg) cfg = getCfg(USER.hotel);
var isRS = USER.hotel.indexOf(‘Bruhl’) >= 0;
var zi = parseFloat(gv(‘lu_zi_’+day))||0;
var gr = parseFloat(gv(‘lu_gr_’+day))||0;
var ses = parseFloat(gv(‘lu_ses_’+day))||0;
var chk = parseFloat(gv(‘lu_chk_’+day))||0;
var pub = parseFloat(gv(‘lu_pub_’+day))||0;
var son = parseFloat(gv(‘lu_son_’+day))||0;
var ist;
var pub2 = parseFloat(gv(‘lu_pub_’+day))||0;
if (isRS) {
ist = zi/(cfg.ziH||2.5) + gr/(cfg.aptH||2.0) + ses*(cfg.sesH||1.0) + chk*cfg.ckMin/60 + pub2;
} else if (USER.hotel === ‘Spark by Hilton Essen’) {
var mini2 = parseFloat(gv(‘lu_mini_’+day))||0;
ist = zi/cfg.ziH + gr/cfg.ziH + mini2*(cfg.miniMin||3)/60 + chk*cfg.ckMin/60 + pub + son;
} else {
ist = zi/cfg.ziH + gr/(cfg.grH||cfg.ziH) + chk*cfg.ckMin/60 + pub + son;
}
var el = document.getElementById(‘lu_ist_’+day);
if (el) el.value = ist>0 ? ist.toFixed(2) : ‘’;
luCalcAllSums(cfg);
}

function sigInit(id, hintId, statId) {
var canvas = document.getElementById(id);
if (!canvas) return;
var ctx = canvas.getContext(‘2d’);
var drawing = false;
var rect = canvas.parentElement.getBoundingClientRect();
canvas.width = (rect.width||300) * window.devicePixelRatio;
canvas.height = 80 * window.devicePixelRatio;
canvas.style.width = (rect.width||300)+‘px’;
canvas.style.height = ‘80px’;
ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
ctx.strokeStyle = ‘#c8a84b’;
ctx.lineWidth = 2;
ctx.lineCap = ‘round’;
ctx.lineJoin = ‘round’;

function pos(e) {
var r = canvas.getBoundingClientRect();
var src = e.touches ? e.touches[0] : e;
return {x:src.clientX-r.left, y:src.clientY-r.top};
}
function start(e) {
e.preventDefault(); drawing=true;
var p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y);
var h=document.getElementById(hintId); if(h) h.style.opacity=‘0’;
}
function move(e) {
if(!drawing) return; e.preventDefault();
var p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke();
var s=document.getElementById(statId); if(s) s.textContent=’\u2713 Unterschrift OK’;
}
function end(e) { e.preventDefault(); drawing=false; }
canvas.addEventListener(‘mousedown’,start);
canvas.addEventListener(‘mousemove’,move);
canvas.addEventListener(‘mouseup’,end);
canvas.addEventListener(‘touchstart’,start,{passive:false});
canvas.addEventListener(‘touchmove’,move,{passive:false});
canvas.addEventListener(‘touchend’,end,{passive:false});
}

function sigClear(id, hintId, statId) {
var canvas = document.getElementById(id);
if (!canvas) return;
canvas.getContext(‘2d’).clearRect(0,0,canvas.width,canvas.height);
var h=document.getElementById(hintId); if(h) h.style.opacity=‘1’;
var s=document.getElementById(statId); if(s) s.textContent=’’;
}

function r1CalcDayEl(el) {
var mk = el.getAttribute(‘data-mk’);
var day = parseInt(el.getAttribute(‘data-day’));
var maName = el.getAttribute(‘data-ma’);
if (mk&&day&&maName) r1CalcDay(mk, day, maName);
}

function r1CalcDay(mk, day, maName) {
var cfg = getCfg(USER.hotel);
var isRS = USER.hotel.indexOf(‘Bruhl’)>=0;
var zi = parseFloat(gv(‘r1_’+mk+’*zi*’+day))||0;
var gr = parseFloat(gv(‘r1_’+mk+’*gr*’+day))||0;
var chk = parseFloat(gv(‘r1_’+mk+’*chk*’+day))||0;
var son = parseFloat(gv(‘r1_’+mk+’*son*’+day))||0;
var ist = isRS ? zi/(cfg.ziH||2.5)+gr/(cfg.aptH||2.0)+chk*cfg.ckMin/60 : zi/cfg.ziH+gr/(cfg.grH||cfg.ziH)+chk*cfg.ckMin/60+son;
var el = document.getElementById(‘r1_’+mk+’*ist*’+day);
if (el) el.value = ist>0?ist.toFixed(2):’’;
var hotel = USER.hotel;
var mon = gv(‘r1-mon’)||new Date().toISOString().slice(0,7);
if (!DATA.r1[hotel]) DATA.r1[hotel]={};
if (!DATA.r1[hotel][mon]) DATA.r1[hotel][mon]={};
if (!DATA.r1[hotel][mon][day]) DATA.r1[hotel][mon][day]=[];
var entries=DATA.r1[hotel][mon][day], idx=-1;
for(var i=0;i<entries.length;i++){if(entries[i].name===maName){idx=i;break;}}
var entry={name:maName,zi:zi,gr:gr,chk:chk,son:son,ist:ist>0?ist:0};
if(idx>=0) entries[idx]=entry; else entries.push(entry);
saveData();
}

var printDiv = document.getElementById(‘print-area’);

printDiv.innerHTML = html;
window.print();
setTimeout(function(){printDiv.innerHTML=’’;},1500);
}
