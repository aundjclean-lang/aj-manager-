<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&J Manager</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d1b2a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-box {
  background: #111f2e;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: gold;
  border: none;
  border-radius: 6px;
  font-weight: bold;
}

</style>
</head>

<body>

<div class="login-box">
  <h2 style="color: gold;">A&J</h2>
  <p>Login</p>

  <input id="user" placeholder="Name eingeben">

  <button onclick="login()">Einloggen</button>
</div>

<script>

// 👇 HIER KOMMEN DEINE USER + ROLLEN
let users = {
  "akram": "admin",
  "linda": "teamleader",
  "max": "mitarbeiter"
};

// 👇 LOGIN (ohne Passwort)
function login() {
  const user = document.getElementById("user").value.toLowerCase();

  if (!user) {
    alert("Bitte Namen eingeben");
    return;
  }

  // wenn user nicht existiert → automatisch Mitarbeiter
  if (!users[user]) {
    users[user] = "mitarbeiter";
  }

  // speichern (wichtig!)
  localStorage.setItem("user", user);
  localStorage.setItem("role", users[user]);

  // weiter zur App
  window.location.href = "dashboard.html";
}

</script>

</body>
</html>
