<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&J Manager</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d1b2a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-box {
  background: #111f2e;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
}

h1 {
  color: gold;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
}

button {
  margin-top: 15px;
  padding: 10px;
  width: 100%;
  background: gold;
  border: none;
  border-radius: 6px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="login-box">
  <h1>A&J</h1>
  <p>Login</p>

  <input id="user" placeholder="Benutzer">
  <input id="pass" type="password" placeholder="Passwort">

  <button onclick="login()">Einloggen</button>

  <p id="error" style="color:red;"></p>
</div>

<script>
function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if (user === "admin" && pass === "1234") {
    alert("Login erfolgreich");
  } else {
    document.getElementById("error").innerText = "Falsche Daten";
  }
}
</script>

</body>
</html>
