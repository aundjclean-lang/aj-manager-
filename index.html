<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="A&J Manager">
<meta name="theme-color" content="#08090d">
<title>A&J Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08090d;--bg2:#0e1118;--bg3:#131720;--navy3:#181d28;
  --gold:#d4a843;--gold2:#f0c96a;--gold3:rgba(212,168,67,0.1);
  --cream:#e8e0d0;--muted:#5a6472;
  --border:rgba(212,168,67,0.12);--border2:rgba(212,168,67,0.22);
  --green:#4caf7d;--red:#e05555;--blue:#5b9bd5;
}
html,body{background:var(--bg);color:var(--cream);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── LOGIN ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 0%,rgba(212,168,67,0.08) 0%,transparent 60%)}
.login-box{background:var(--bg2);border:1px solid rgba(212,168,67,0.2);padding:32px;max-width:360px;width:100%;text-align:center;border-radius:10px;box-shadow:0 24px 80px rgba(0,0,0,0.6)}
.login-logo{font-family:Georgia,serif;font-size:3rem;font-weight:900;color:var(--gold)}
.login-sub{font-size:0.5rem;letter-spacing:0.4em;text-transform:uppercase;color:var(--muted);margin:4px 0 24px}
.role-btn{width:100%;background:transparent;border:1px solid var(--border2);color:var(--cream);font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;padding:14px;cursor:pointer;border-radius:3px;text-align:left;display:flex;align-items:center;gap:12px;margin-bottom:10px;transition:all 0.2s}
.role-btn.gold{background:var(--gold);color:var(--bg);font-weight:700;border-color:var(--gold)}
.role-desc{font-size:0.6rem;color:var(--muted);display:block;margin-top:2px;text-transform:none;letter-spacing:0.04em;font-weight:300}
.role-btn.gold .role-desc{color:var(--bg);opacity:0.7}

/* ── APP ── */
/* ── APP ── */
.app-wrap{display:none}
.app-wrap.show{display:block}
.topbar{
  background:rgba(13,17,24,0.97);
  border-bottom:1px solid rgba(212,168,67,0.15);
  padding:11px 16px;
  padding-top:max(11px, calc(env(safe-area-inset-top) + 6px));
  display:flex;align-items:center;gap:8px;
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.tb-logo{font-family:Georgia,serif;font-size:1.15rem;font-weight:900;color:var(--gold)}
.tb-info{font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.tb-right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-shrink:0}
.tb-user{font-size:0.6rem;color:var(--muted);white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis}
.out-btn{
  background:transparent;
  border:1px solid rgba(212,168,67,0.3);
  color:var(--gold2);
  font-size:0.6rem;
  letter-spacing:0.08em;
  text-transform:uppercase;
  padding:7px 12px;
  cursor:pointer;
  border-radius:3px;
  white-space:nowrap;
  flex-shrink:0;
}
.tabs{background:var(--bg2);border-bottom:1px solid rgba(212,168,67,0.1);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 14px;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold);background:rgba(212,168,67,0.06)}
.content{padding:14px;padding-bottom:max(14px, calc(env(safe-area-inset-bottom) + 14px))}

/* ── COMPONENTS ── */
.card{background:var(--bg2);border:1px solid rgba(212,168,67,0.1);border-radius:6px;padding:14px;margin-bottom:12px}
.card-title{font-family:Georgia,serif;font-size:0.95rem;color:var(--gold);margin-bottom:12px}
.inp{background:rgba(255,255,255,0.04);border:1px solid rgba(212,168,67,0.15);color:var(--cream);padding:8px 10px;font-size:0.8rem;outline:none;border-radius:4px;width:100%;transition:border-color 0.15s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--muted);font-size:0.74rem}
.lbl{font-size:0.52rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;display:block}
.frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.ff{display:flex;flex-direction:column;flex:1;min-width:90px}
.btn{background:transparent;border:1px solid var(--border2);color:var(--gold);font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;padding:7px 14px;cursor:pointer;border-radius:2px;transition:all 0.2s;white-space:nowrap}
.btn:active{opacity:0.7}
.btn.primary{background:var(--gold);color:#08090d;font-weight:700;border-color:var(--gold)}
.btn.sm{padding:5px 10px;font-size:0.56rem}
.btn.danger{border-color:rgba(200,80,80,0.3);color:#e88}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(95px,1fr));gap:8px;margin-bottom:12px}
.stat{background:var(--bg3);border:1px solid rgba(212,168,67,0.1);padding:12px;text-align:center;border-radius:5px}
.stat-v{font-family:Georgia,serif;font-size:1.45rem;color:var(--gold2);display:block;line-height:1}
.stat-l{font-size:0.5rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:3px;display:block}
.tbl{width:100%;border-collapse:collapse;font-size:0.76rem}
.tbl th{padding:6px 7px;text-align:left;font-size:0.52rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border2);font-weight:400}
.tbl td{padding:7px 7px;border-bottom:1px solid rgba(30,58,82,0.4);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:0.6rem;font-weight:600}
.b-ok{background:rgba(45,106,79,0.15);color:#5dbf8a}
.b-warn{background:rgba(181,69,27,0.15);color:#f4845f}
.b-grey{background:rgba(255,255,255,0.06);color:var(--muted)}
.b-gold{background:var(--gold3);color:var(--gold2);border:1px solid var(--border2)}
.empty{text-align:center;padding:28px;color:var(--muted);font-size:0.76rem}

/* ── TABLE INPUTS ── */
.ta-wrap,.sz-wrap,.lu-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.ta-tbl,.sz-tbl,.lu-tbl{border-collapse:collapse;width:100%;font-size:0.78rem}
.ta-tbl th,.sz-tbl thead th,.lu-tbl th{background:var(--navy3);color:var(--gold);font-size:0.54rem;letter-spacing:0.07em;text-transform:uppercase;font-weight:600;padding:6px 3px;text-align:center;border:1px solid var(--border);line-height:1.3}
.sz-tbl thead th.ac{background:#071510;color:#81c784}
.sz-tbl thead th.zc{background:#07101a;color:#90caf9}
.ta-tbl td,.sz-tbl tbody td,.lu-tbl td{border:1px solid rgba(30,58,82,0.5);padding:0;vertical-align:middle}
.ta-tbl tr:nth-child(even) td,.sz-tbl tbody tr:nth-child(even) td,.lu-tbl tr:nth-child(even) td{background:rgba(8,18,28,0.35)}
.ta-tbl tr.ges-row td{background:var(--navy3)!important;border-top:2px solid var(--gold)}
.sz-tbl tbody tr.filled td{background:rgba(20,50,25,0.18)}
.lu-tbl tr.sum-row td,.lu-tbl tr.mid-row td{background:var(--navy3)!important;border-top:2px solid var(--gold)}
.ti,.sz-inp,.lu-inp{width:100%;background:transparent;border:none;outline:none;font-size:0.78rem;padding:5px 3px;text-align:center;color:var(--cream)}
.ti.nm{text-align:left;padding-left:7px}
.ti.zi,.sz-inp.zi,.lu-inp.zi{color:var(--gold2);font-weight:700;background:rgba(0,80,160,0.12)}
.ti.ai,.sz-inp.ai,.lu-inp.ai{color:#81c784;font-weight:700;cursor:default;background:rgba(20,80,40,0.15)}
.sz-inp.at{color:#90caf9;font-weight:700;cursor:default;background:rgba(20,60,120,0.2)}
.sz-inp.pa{color:rgba(200,168,75,0.5);cursor:default}
.sz-nr,.lu-nr{text-align:center;font-weight:600;font-size:0.74rem;color:var(--muted);padding:0 3px;background:rgba(0,0,0,0.2);min-width:24px}
.sz-ges td{background:var(--navy3)!important;border-top:2px solid var(--gold)}
.ges-v{font-family:Georgia,serif;font-size:0.88rem;color:var(--gold);text-align:center;padding:5px 3px}

/* ── SIGNATURES ── */
.sig-box{background:var(--navy3);border:1px solid var(--border2);border-radius:3px;padding:12px;margin-top:10px}
.sig-lbl{font-size:0.56rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.sig-wrap{border:2px dashed var(--border2);border-radius:2px;background:rgba(255,255,255,0.02);position:relative;touch-action:none}
.sig-canvas{display:block;width:100%;cursor:crosshair;touch-action:none}
.sig-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.68rem;color:var(--muted);pointer-events:none}
.sig-row{display:flex;gap:8px;margin-top:6px;align-items:center}
.sig-ok{font-size:0.63rem;color:#5dbf8a;margin-left:auto}

/* ── TOAST ── */
.toast{position:fixed;bottom:18px;right:18px;padding:10px 18px;border-radius:3px;font-size:0.74rem;font-weight:600;z-index:9999;display:none;border:1px solid;max-width:300px}
.toast.ok{background:rgba(45,106,79,0.15);color:#5dbf8a;border-color:rgba(45,106,79,0.4)}
.toast.err{background:rgba(181,69,27,0.15);color:#f4845f;border-color:rgba(181,69,27,0.4)}
.toast.info{background:rgba(20,60,140,0.3);color:#90caf9;border-color:rgba(20,60,140,0.5)}

/* ── PRINT ── */
@media print{
  /* ALLES verstecken — Schritt 1 */
  *{visibility:hidden!important;background:transparent!important;color:#000!important}
  /* Nur print-area sichtbar — Schritt 2 */
  #print-area,#print-area *{visibility:visible!important}
  /* print-area positionieren */
  #print-area{
    position:absolute!important;
    top:0!important;left:0!important;
    width:100%!important;
    background:#fff!important;
    display:block!important;
    overflow:visible!important;
  }
  /* Schwarze Tabellen-Header */
  #print-area th{background:#000!important;color:#fff!important;visibility:visible!important}
  #print-area .prt-ges td{background:#000!important;color:#fff!important}
  #print-area tr:nth-child(even) td{background:#f5f5f5!important}
  /* Seite */
  html,body{background:#fff!important;margin:0!important;padding:0!important;height:auto!important;overflow:visible!important}
  @page{size:A4 portrait;margin:10mm}
  @page:blank{display:none}
}
#print-area,#dp-print-area{display:none;background:#fff!important;color:#000!important}

/* ── RESPONSIVE ── */
@media(min-width:768px){.content{padding:20px;max-width:960px;margin:0 auto}}
@media(min-width:1280px){
  .app-wrap{display:grid;grid-template-columns:220px 1fr;grid-template-rows:auto 1fr;min-height:100vh}
  .app-wrap.show{display:grid}
  .topbar{grid-column:1/-1}
  .tabs{grid-column:1;grid-row:2;flex-direction:column;overflow-x:visible;overflow-y:auto;border-right:1px solid var(--border);border-bottom:none;padding:16px 0;height:calc(100vh - 52px);position:sticky;top:52px;align-self:start}
  .tab{padding:12px 20px;border-bottom:none;border-left:2px solid transparent;text-align:left}
  .tab.active{border-left-color:var(--gold);border-bottom:none;background:var(--gold3)}
  .content{grid-column:2;grid-row:2;padding:24px;max-width:1100px}
}
@media(min-width:768px) and (max-width:1279px){
  .app-wrap{display:block!important}
  .tabs{display:flex!important;flex-direction:row!important;overflow-x:auto!important;border-right:none!important;height:auto!important}
  .tab{border-left:none!important;border-bottom:2px solid transparent!important}
  .tab.active{border-left-color:transparent!important;border-bottom-color:var(--gold)!important}
  .content{display:block!important;padding:16px!important;max-width:100%!important}
}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--navy3)}
::-webkit-scrollbar-thumb{background:rgba(30,58,82,0.8);border-radius:2px}
</style>
</head>
<body>
<div id="print-area"></div>
<div id="dp-print-area"></div>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 170" width="120px" height="64px" style="display:block;margin:0 auto;overflow:visible">
        <text x="8" y="122" font-family="Georgia,'Times New Roman',serif" font-size="138" font-weight="900" fill="#d4a843" letter-spacing="-4">A&amp;J</text>
        <line x1="8" y1="138" x2="290" y2="138" stroke="#d4a843" stroke-width="1.8"/>
        <text x="8" y="162" font-family="'Helvetica Neue',Arial,sans-serif" font-size="23" font-weight="600" fill="#c8a04b" letter-spacing="5">CLEANING SERVICES</text>
        <path d="M296,128 L299,136 L307,136 L301,141 L304,149 L296,144 L289,149 L292,141 L286,136 L294,136 Z" fill="#c8a04b" opacity="0.9"/>
      </svg>
    </div>
    <div class="login-sub">Cleaning Services GmbH</div>
    <div id="step1">
      <p style="font-size:0.85rem;color:var(--cream);margin-bottom:18px">Wer bist du?</p>
      <button class="role-btn" id="btn-tl">
        <span style="font-size:1.1rem">📋</span>
        <div>TEAMLEADER<span class="role-desc">Tagesabrechnung · Stundenzettel · Dienstplan</span></div>
      </button>
      <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px">
        <button id="btn-chef-goto" style="background:transparent;border:none;color:var(--muted);font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;width:100%;padding:4px">🔒 Chef / Admin Login</button>
      </div>
    </div>
    <div id="step-vora" style="display:none">
      <p style="font-size:0.82rem;color:var(--gold);margin-bottom:14px;font-weight:600">Teamleader Login</p>
      <div style="margin-bottom:10px">
        <label class="lbl">Hotel</label>
        <select id="v-hotel" style="width:100%;background:var(--navy3);border:1px solid var(--border2);color:var(--cream);font-size:0.82rem;padding:10px 12px;outline:none;border-radius:3px">
          <option value="">Hotel auswählen...</option>
        </select>
      </div>
      <div style="margin-bottom:10px">
        <label class="lbl">Name</label>
        <input id="v-name" placeholder="Name..." style="width:100%;background:var(--navy3);border:1px solid var(--border2);color:var(--gold);font-size:0.9rem;font-weight:600;padding:10px 12px;outline:none;border-radius:3px">
      </div>
      <div style="margin-bottom:12px">
        <label class="lbl">Passwort <span style="font-size:0.55rem;opacity:0.5;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input id="v-pw" type="password" placeholder="Passwort..." style="width:100%;background:#fff;border:2px solid var(--gold);color:#000;font-size:0.95rem;font-weight:700;padding:10px 12px;outline:none;border-radius:3px">
        <div id="v-pw-err" style="color:#f4845f;font-size:0.68rem;margin-top:5px;display:none">Falsches Passwort!</div>
      </div>
      <button id="btn-vora-login" style="width:100%;background:var(--gold);color:var(--bg);border:none;font-size:0.85rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;padding:14px;border-radius:3px;cursor:pointer">Einloggen</button>
      <button id="btn-back-vora" style="background:transparent;border:none;color:var(--muted);font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;width:100%;padding:6px;margin-top:8px">← Zurück</button>
    </div>
    <div id="step-chef" style="display:none">
      <p style="font-size:0.82rem;color:var(--gold);margin-bottom:10px;font-weight:600">🔒 Chef / Admin</p>
      <input class="inp" id="chef-pw" type="password" placeholder="Passwort..." style="margin-bottom:8px">
      <div id="chef-pw-err" style="color:#f4845f;font-size:0.68rem;margin-bottom:8px;display:none">Falsches Passwort</div>
      <button class="role-btn gold" id="btn-chef-login" style="justify-content:center;margin-bottom:8px">✓&nbsp; Als Chef einloggen</button>
      <button id="btn-back-chef" style="background:transparent;border:none;color:var(--muted);font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;width:100%;padding:4px">← Zurück</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app-wrap" id="app-wrap">
  <div class="topbar">
      <div style="min-width:0;flex:1;display:flex;align-items:center;gap:10px">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 170" width="44px" height="23px" style="display:block;flex-shrink:0;overflow:visible">
          <text x="8" y="122" font-family="Georgia,'Times New Roman',serif" font-size="138" font-weight="900" fill="#d4a843" letter-spacing="-4">A&amp;J</text>
          <line x1="8" y1="138" x2="290" y2="138" stroke="#d4a843" stroke-width="1.8"/>
          <text x="8" y="162" font-family="'Helvetica Neue',Arial,sans-serif" font-size="23" font-weight="600" fill="#c8a04b" letter-spacing="5">CLEANING SERVICES</text>
          <path d="M296,128 L299,136 L307,136 L301,141 L304,149 L296,144 L289,149 L292,141 L286,136 L294,136 Z" fill="#c8a04b" opacity="0.9"/>
        </svg>
        <div>
          <div class="tb-info" id="tb-info" style="font-size:0.55rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px"></div>
        </div>
      </div>
    <div class="tb-right" id="tb-right">
      <span id="tb-user" class="tb-user"></span>
      <span id="fb-live-dot" title="Verbindungsstatus" style="width:8px;height:8px;border-radius:50%;background:#555;display:inline-block;flex-shrink:0;transition:background 0.3s"></span>
      <button class="out-btn" id="btn-logout">Abmelden</button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
</div>

<div class="toast" id="toast"></div>

<div id="aj-ios" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#0e1118;border-top:1px solid rgba(212,168,67,0.3);padding:14px 16px;z-index:9999;flex-direction:column;gap:8px">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:38px;height:38px;background:var(--gold);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-weight:900;font-size:0.82rem;color:#08090d">A&amp;J</div>
      <div><div style="font-size:0.82rem;font-weight:700;color:var(--cream)">A&amp;J Manager</div><div style="font-size:0.65rem;color:var(--muted)">Als App installieren</div></div>
    </div>
    <button id="btn-ios-close" style="background:transparent;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:4px">✕</button>
  </div>
  <div style="background:rgba(212,168,67,0.06);border:1px solid rgba(212,168,67,0.15);border-radius:8px;padding:10px 12px;font-size:0.72rem;color:#a0b0c0;line-height:1.6">
    1. Tippe auf <strong style="color:var(--gold)">⬆ Teilen</strong> in Safari<br>
    2. <strong style="color:var(--gold)">"Zum Home-Bildschirm"</strong><br>
    3. <strong style="color:var(--gold)">Hinzufügen</strong>
  </div>
</div>

<script>

// ============================================================
// UTILITIES
// ============================================================
function ge(id){return document.getElementById(id);}
function gv(id){var e=ge(id);return e?e.value:'';}
function qs(sel){return document.querySelector(sel);}

function toast(msg,type,ms){
  try{
    var t=ge('toast');if(!t)return;
    t.textContent=msg;t.className='toast '+(type||'ok');t.style.display='block';
    clearTimeout(t._t);t._t=setTimeout(function(){if(t)t.style.display='none';},ms||2800);
  }catch(e){}
}
function t2m(s){
  if(!s||s.indexOf(':')<0)return null;
  var p=s.split(':'),h=parseInt(p[0]),m=parseInt(p[1]);
  return isNaN(h)||isNaN(m)?null:h*60+m;
}
function m2t(m){
  if(m==null||isNaN(m))return '';
  return String(Math.floor(m/60)%24).padStart(2,'0')+':'+String(Math.round(m%60)).padStart(2,'0');
}
// Polyfills
if(!String.prototype.padStart){String.prototype.padStart=function(n,c){var s=String(this);c=c||' ';while(s.length<n)s=c+s;return s.slice(-n);};}
if(!Object.assign){Object.assign=function(t){for(var i=1;i<arguments.length;i++){var s=arguments[i];if(s)for(var k in s)if(Object.prototype.hasOwnProperty.call(s,k))t[k]=s[k];}return t;};}
if(!Object.values){Object.values=function(o){return Object.keys(o).map(function(k){return o[k];});};}
if(!Array.prototype.find){Array.prototype.find=function(fn){for(var i=0;i<this.length;i++)if(fn(this[i],i,this))return this[i];};}
if(!Array.prototype.includes){Array.prototype.includes=function(v){return this.indexOf(v)>=0;};}

var FB_URL='https://aj-manager-28a6c-default-rtdb.europe-west1.firebasedatabase.app';
var FB_POLL=null;
var FB_FAIL_COUNT=0;
var FB_DISABLED=false;
var FB_TOAST_SHOWN=false;
var FB_CONFIRMED=false;

function fbKey(s){
  if(!s)return'unknown';
  return s.replace(/[.#$\[\] \/\\]/g,'_');
}
function fbRef(p){return FB_URL+'/'+p+'.json';}

function fbXHR(method,path,data,cb){
  var url=fbRef(path);
  var xhr=new XMLHttpRequest();
  xhr.open(method,url,true);
  if(data)xhr.setRequestHeader('Content-Type','application/json');
  xhr.timeout=12000;
  xhr.ontimeout=function(){cb&&cb(null,new Error('Timeout'),0);};
  xhr.onerror=function(){cb&&cb(null,new Error('Netzwerkfehler'),0);};
  xhr.onload=function(){
    var status=xhr.status;
    if(status>=200&&status<300){
      var d=null;
      try{if(xhr.responseText&&xhr.responseText!=='null')d=JSON.parse(xhr.responseText);}catch(e){}
      cb&&cb(d,null,status);
    } else {
      cb&&cb(null,new Error('HTTP '+status),status);
    }
  };
  try{xhr.send(data?JSON.stringify(data):null);}
  catch(e){cb&&cb(null,e,0);}
}

function fbGet(p,cb){
  if(FB_DISABLED){cb(null);return;}
  fbXHR('GET',p,null,function(data,err,status){
    var dot=ge('fb-live-dot');
    if(err){
      FB_FAIL_COUNT++;
      if(dot)dot.style.background='#e05555';
      if(FB_FAIL_COUNT>=5&&!FB_TOAST_SHOWN){FB_TOAST_SHOWN=true;toast('Firebase offline — lokal gespeichert','info',4000);}
      if(FB_FAIL_COUNT>=10)FB_DISABLED=true;
      cb(null);
    } else if(status===401||status===403){
      if(!FB_TOAST_SHOWN){FB_TOAST_SHOWN=true;toast('⚠ Firebase Regeln: .read/.write auf true setzen!','err',8000);}
      if(dot)dot.style.background='#e05555';
      FB_DISABLED=true;cb(null);
    } else {
      FB_FAIL_COUNT=0;FB_CONFIRMED=true;
      if(dot)dot.style.background='#4caf7d';
      cb(data);
    }
  });
}

function fbGetXHR(p,cb){fbGet(p,cb);}

function fbPatch(p,data){
  if(FB_DISABLED)return;
  if(!data||typeof data!=='object')return;
  // Daten bereinigen: undefined/NaN/Infinity entfernen
  var cleaned;
  try{
    cleaned=JSON.parse(JSON.stringify(data,function(k,v){
      if(v===undefined||v===null||(typeof v==='number'&&!isFinite(v)))return 0;
      return v;
    }));
  }catch(e){console.warn('fbPatch JSON:',e.message);return;}

  var url=FB_URL+'/'+p+'.json';
  console.log('Firebase WRITE URL:',url);
  console.log('Firebase WRITE DATA:',JSON.stringify(cleaned).slice(0,200));

  var xhr=new XMLHttpRequest();
  xhr.open('PUT',url,true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.timeout=12000;
  xhr.onload=function(){
    var dot=ge('fb-live-dot');
    if(xhr.status>=200&&xhr.status<300){
      if(dot)dot.style.background='#4caf7d';
      FB_FAIL_COUNT=0;
      console.log('Firebase OK:',p);
    } else {
      if(dot)dot.style.background='#e05555';
      FB_FAIL_COUNT++;
      var errMsg=xhr.responseText||'';
      console.error('Firebase Fehler',xhr.status,p,errMsg);
      // Fehlermeldung sichtbar anzeigen
      if(FB_FAIL_COUNT<=2){
        toast('⚠ Firebase '+xhr.status+': '+errMsg.slice(0,80),'err',6000);
      }
    }
  };
  xhr.onerror=function(){
    var dot=ge('fb-live-dot');
    if(dot)dot.style.background='#e05555';
    console.error('Firebase Netzwerkfehler:',p);
    toast('⚠ Firebase: Netzwerkfehler','err',4000);
  };
  xhr.ontimeout=function(){
    console.warn('Firebase Timeout:',p);
  };
  try{xhr.send(JSON.stringify(cleaned));}
  catch(e){console.error('Firebase send:',e.message);}
}

function fbSet(p,data){fbPatch(p,data);}

function fbPush(){
  if(!USER||!USER.hotel||FB_DISABLED)return;
  var h=USER.hotel,hk=fbKey(h),pl={};
  ['sz','ta','lu','r1','dp','ma','mb'].forEach(function(k){
    if(DATA[k]&&DATA[k][h]&&Object.keys(DATA[k][h]).length)pl[k]=DATA[k][h];
  });
  if(Object.keys(pl).length)fbPatch('hotels/'+hk,pl);
  try{
    var km=JSON.parse(localStorage.getItem('aj_krankmeldung')||'{}');
    var ur=JSON.parse(localStorage.getItem('aj_urlaub')||'{}');
    if(Object.keys(km).length)fbPatch('global/krankmeldung',km);
    if(Object.keys(ur).length)fbPatch('global/urlaub',ur);
  }catch(e){}
}


// ── POLL — holt Daten von Firebase alle 6s ──
function fbPollNow(){
  if(!USER||!FB_URL||FB_DISABLED)return;

  if(USER.role==='chef'){
    // Chef: alle Pfade abrufen
    // 1. Notifications
    fbGet('notifications',function(notifs){
      if(!notifs||typeof notifs!=='object')return;
      var dot=ge('fb-live-dot');if(dot)dot.style.background='#4caf7d';
      Object.keys(notifs).forEach(function(nid){
        var n=notifs[nid];
        if(!n||!n.ts||n.gelesen)return;
        if(!window._seenNotifs)window._seenNotifs={};
        if(window._seenNotifs[nid])return;
        window._seenNotifs[nid]=true;
        if(n.typ==='tagesabrechnung'){
          toast('📋 Neue TA: '+(n.hotel||'')+' · '+(n.datum||'')+' · '+(n.tl||''),'info',6000);
          if(typeof ajNotify==='function')ajNotify('📋 Neue Tagesabrechnung!',(n.hotel||'')+' · '+(n.datum||''));
        }
      });
    });

    // 2. dailyReports (neuer Pfad)
    fbGet('dailyReports',function(dr){
      if(!dr||typeof dr!=='object')return;
      Object.keys(dr).forEach(function(hk){
        // Hotel-Key zurück zu Hotel-Name
        Object.keys(HOTELS).forEach(function(hn){
          if(fbKey(hn)!==hk)return;
          if(!DATA.ta[hn])DATA.ta[hn]={};
          Object.keys(dr[hk]).forEach(function(dayKey){
            var datum=dayKey.replace(/_/g,'-');
            DATA.ta[hn][datum]=dr[hk][dayKey];
          });
        });
      });
      localStorage.setItem('aj4',JSON.stringify(DATA));
      if(currentTab==='dash')pgDash();
    });

    // 3. timesheets (neuer Pfad)
    fbGet('timesheets',function(ts){
      if(!ts||typeof ts!=='object')return;
      Object.keys(ts).forEach(function(hk){
        Object.keys(HOTELS).forEach(function(hn){
          if(fbKey(hn)!==hk)return;
          DATA.sz[hn]=ts[hk];
        });
      });
      localStorage.setItem('aj4',JSON.stringify(DATA));
    });

    // 4. hotels/ (alter Pfad für Kompatibilität)
    fbGet('hotels',function(val){
      if(!val||typeof val!=='object')return;
      var dot=ge('fb-live-dot');if(dot)dot.style.background='#4caf7d';
      Object.keys(val).forEach(function(hk){
        var hd=val[hk];if(!hd||typeof hd!=='object')return;
        Object.keys(HOTELS).forEach(function(hn){
          if(fbKey(hn)!==hk)return;
          ['sz','ta','lu','r1','dp','ma','mb'].forEach(function(k){
            if(hd[k]){if(!DATA[k])DATA[k]={};DATA[k][hn]=hd[k];}
          });
        });
      });
      localStorage.setItem('aj4',JSON.stringify(DATA));
      if(currentTab==='dash')pgDash();
    });

    // 5. Krankmeldung + Urlaub
    fbGet('global/krankmeldung',function(km){
      if(!km||typeof km!=='object')return;
      try{
        var local=JSON.parse(localStorage.getItem('aj_krankmeldung')||'{}');
        localStorage.setItem('aj_krankmeldung',JSON.stringify(Object.assign({},km,local)));
      }catch(e){}
    });
    fbGet('global/urlaub',function(ur){
      if(!ur||typeof ur!=='object')return;
      try{
        var local2=JSON.parse(localStorage.getItem('aj_urlaub')||'{}');
        localStorage.setItem('aj_urlaub',JSON.stringify(Object.assign({},ur,local2)));
      }catch(e){}
    });
    if(typeof checkFbNotifications==='function')checkFbNotifications();

  } else {
    // Teamleiter: nur eigenes Hotel lesen
    var path='hotels/'+fbKey(USER.hotel);
    fbGet(path,function(val){
      if(!val||typeof val!=='object')return;
      var hn=USER.hotel;
      ['sz','ta','lu','r1','dp','ma','mb'].forEach(function(k){
        if(val[k]){if(!DATA[k])DATA[k]={};DATA[k][hn]=val[k];}
      });
      localStorage.setItem('aj4',JSON.stringify(DATA));
    });
  }
}

function fbStartPoll(){
  if(FB_POLL)clearInterval(FB_POLL);
  fbPollNow();
  FB_POLL=setInterval(function(){
    if(!FB_DISABLED)fbPollNow();
  },6000);
}

  Object.keys(HOTELS).forEach(function(h){
    var o=document.createElement('option');
    o.value=h;o.textContent=HOTELS[h].nr+' -- '+h;
    sel.appendChild(o);
  });
  var vc=[];try{vc=JSON.parse(localStorage.getItem('aj_vora_config')||'[]');}catch(e){}
  sel.onchange=function(){
    var h=this.value,ni=ge('v-name');if(!ni)return;

    // Vorschlag aus Konfig — aber immer editierbar!
    var found='';
    vc.forEach(function(v){if(v.hotels&&v.hotels.indexOf(h)>=0&&v.aktiv!==false)found=v.name;});
    if(!found)found=VORA_NAMES[h]||'';

    ni.removeAttribute('readonly'); // Immer editierbar
    ni.placeholder='Name eingeben...';
    var pw=ge('v-pw');if(pw)pw.focus();
  };

function doVoraLogin(){
  var hotel=gv('v-hotel'),name=gv('v-name').trim(),pw=gv('v-pw').trim();
  var errEl=ge('v-pw-err');
  if(!hotel){toast('Hotel auswählen!','err');return;}
  if(!name){toast('Name eingeben!','err');return;}
  var vc=[];try{vc=JSON.parse(localStorage.getItem('aj_vora_config')||'[]');}catch(e){}
  var correctPw='',active=true;
  vc.forEach(function(v){if(v.name===name){correctPw=v.pw||'';active=v.aktiv!==false;}});
  if(!active){toast('Konto deaktiviert!','err');return;}
  if(correctPw&&pw!==correctPw){
    if(errEl){errEl.style.display='block';errEl.textContent='Falsches Passwort!';}
    var pwI=ge('v-pw');if(pwI){pwI.value='';pwI.focus();}
    return;
  }
  if(errEl)errEl.style.display='none';
  USER={role:'vora',hotel:hotel,name:name};
  startApp();
}

    {id:'meldung',lb:'📩 Meldung'}
  ];
  if(isSpark_)voraTabs.splice(voraTabs.length-1,0,{id:'mb',lb:'🍺 Minibar'});

  var list=USER.role==='chef'?chefTabs:voraTabs;
  var tabsEl=ge('tabs');if(!tabsEl)return;
  tabsEl.innerHTML=list.map(function(t){
    return '<div class="tab" id="tab-'+t.id+'" data-tid="'+t.id+'">'+t.lb+'</div>';
  }).join('');
  // Use event delegation -- no inline onclick
  tabsEl.onclick=function(e){
    var el=e.target;
    while(el&&el!==tabsEl){
      var tid=el.getAttribute('data-tid');
      if(tid){switchTab(tid);return;}
      el=el.parentNode;
    }
  };
}

function switchTab(id){
  // Role guard — Teamleader darf keine Chef-Seiten sehen
  var chefOnly=['dash','team','ma','kalk','prod','admin','lohn'];
  if(USER&&USER.role!=='chef'&&chefOnly.indexOf(id)>=0)id='ta';
  currentTab=id;
  try{
    var tabs=document.querySelectorAll('.tab');
    for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('active');
    var el=ge('tab-'+id);if(el)el.classList.add('active');
  }catch(e){}
  var cont=ge('content');if(cont)cont.innerHTML='';
  var pages={
    dash:pgDash,ta:pgTa,sz:pgSz,lu:pgLu,team:pgTeam,
    dp:pgDp,ma:pgMa,kalk:pgKalk,prod:pgProd,admin:pgAdmin,
    r1:pgR1,mb:pgMb,lohn:pgLohn,meldung:pgMeldung
  };
  if(pages[id]){
    try{pages[id]();}
    catch(e){
      console.error('Tab ['+id+'] error:',e.message,e.stack);
      if(cont)cont.innerHTML='<div class="card" style="padding:20px;color:var(--red)"><b>Fehler:</b> '+e.message+'</div>';
    }
  }
}

      var gt=t.getAttribute&&t.getAttribute('data-goto');

}

function getTaName(ri){var e=ge('ta_nm_'+ri);return e?e.value.trim():'';}

function taCalc(ri){
  var cfg=getCfg(USER.hotel),hotel=USER.hotel;
  var _t3=hotelTyp(hotel),isRS=_t3==='rs',isMC=_t3==='mc',isSp=_t3==='spark';
  var zi=parseFloat(gv('ta_zi_'+ri))||0,gr=parseFloat(gv('ta_gr_'+ri))||0;
  var chk=parseFloat(gv('ta_chk_'+ri))||0,pub=parseFloat(gv('ta_pub_'+ri))||0,son=parseFloat(gv('ta_son_'+ri))||0;
  var ist;
  if(isRS){var ses=parseFloat(gv('ta_ses_'+ri))||0;ist=zi/(cfg.ziH||2.5)+gr/(cfg.aptH||2.0)+ses*(cfg.sesH||1.0)+chk*(cfg.ckMin||4)/60+pub+son+(cfg.pub||0);}
  else if(isSp){var mini=parseFloat(gv('ta_mini_'+ri))||0;ist=zi/(cfg.ziH||3)+gr/(cfg.ziH||3)+mini*(cfg.miniMin||3)/60+chk*(cfg.ckMin||4)/60+pub+son+(cfg.pub||0);}
  else if(isMC){ist=zi/(cfg.ziH||3.5)+gr/(cfg.ziH||3.5)+chk*(cfg.ckMin||4)/60+pub+(cfg.pub||0);}
  else{ist=zi/(cfg.ziH||2.5)+gr/(cfg.grH||cfg.ziH||2.5)+chk*(cfg.ckMin||4)/60+pub+son+(cfg.pub||0);}
  var istEl=ge('ta_ist_'+ri);if(istEl)istEl.value=ist>0?ist.toFixed(2):'';
  taCalcGes();
  // NICHT hier speichern/transferieren — nur beim echten Speichern-Button!
}

function taCalcGes(){
  var hotel=USER.hotel;
  var _t4=hotelTyp(hotel),isRS=_t4==='rs',isMC=_t4==='mc',isSp=_t4==='spark';
  var gcols=isRS?['zi','gr','ses','chk','pub','son','auf']:isMC?['zi','gr','chk','pub']:isSp?['zi','gr','mini','chk','pub','son','auf']:['zi','gr','chk','pub','wae','son','auf'];
  gcols.forEach(function(col){
    var s=0;for(var ri=0;ri<TA_ROWS;ri++)s+=parseFloat(gv('ta_'+col+'_'+ri))||0;
    var el=ge('tages_'+col);if(el)el.textContent=s||'-';
  });
  var s=0;for(var ri=0;ri<TA_ROWS;ri++)s+=parseFloat(gv('ta_ist_'+ri))||0;
  var el=ge('tages_ist');if(el)el.textContent=s>0?s.toFixed(2)+' h':'-';
}

function taAutoTransfer(ri,zi,gr,chk,pub,son,ist,cfg){
  var maName=getTaName(ri);if(!maName)return;
  var datumStr=gv('ta-datum')||'';
  var day=datumStr.indexOf('.')>=0?parseInt(datumStr.split('.')[0]):null;
  if(!day||day<1||day>31)return;
  var hotel=USER.hotel;
  var monat='';
  if(datumStr.indexOf('.')>=0){var p=datumStr.split('.');monat=(p[2]||new Date().getFullYear())+'-'+String(p[1]||1).padStart(2,'0');}
  if(!monat)monat=new Date().toISOString().slice(0,7);
  var ses=parseFloat(gv('ta_ses_'+ri))||0;
  var mini=parseFloat(gv('ta_mini_'+ri))||0;
  var wae=parseFloat(gv('ta_wae_'+ri))||0;
  var auf=parseFloat(gv('ta_auf_'+ri))||0;

  // Keys für Firebase bereinigen (keine Sonderzeichen!)
  var maKey=fbKey(maName); // Leerzeichen → _
  var dayKey='d'+String(day).padStart(2,'0'); // Zahl → String z.B. "d26"

  // ── 1. STUNDENZETTEL transfer ──
  if(!DATA.sz[hotel])DATA.sz[hotel]={};
  if(!DATA.sz[hotel][maKey])DATA.sz[hotel][maKey]={name:maName};
  if(!DATA.sz[hotel][maKey][monat])DATA.sz[hotel][maKey][monat]={tage:{},istGes:0,ziGes:0,grGes:0};
  var von='09:00';
  var bis=ist>0?m2t((t2m(von)||540)+Math.round(ist*60)+30):'';
  DATA.sz[hotel][maKey][monat].tage[dayKey]={
    zi:zi||0,gr:gr||0,ses:ses||0,chk:chk||0,
    pub:pub||0,son:son||0,mini:mini||0,wae:wae||0,
    von:von,bis:bis,ist:ist>0?parseFloat(ist.toFixed(2)):0,pause:0.5
  };
  // Monatssummen
  var totIst=0,totZi=0,totGr=0;
  Object.keys(DATA.sz[hotel][maKey][monat].tage).forEach(function(d){
    var t=DATA.sz[hotel][maKey][monat].tage[d];
    totIst+=parseFloat(t.ist)||0;
    totZi+=parseInt(t.zi)||0;
    totGr+=parseInt(t.gr)||0;
  });
  DATA.sz[hotel][maKey][monat].istGes=parseFloat(totIst.toFixed(2));
  DATA.sz[hotel][maKey][monat].ziGes=totZi;
  DATA.sz[hotel][maKey][monat].grGes=totGr;

  // ── 2. LEISTUNGSÜBERSICHT transfer ──
  if(!DATA.lu[hotel])DATA.lu[hotel]={};
  if(!DATA.lu[hotel][monat])DATA.lu[hotel][monat]={rows:{}};
  var totDay={zi:0,gr:0,ses:0,chk:0,pub:0,wae:0,son:0,auf:0,mini:0,ist:0};
  for(var r=0;r<TA_ROWS;r++){
    totDay.zi+=parseFloat(gv('ta_zi_'+r))||0;
    totDay.gr+=parseFloat(gv('ta_gr_'+r))||0;
    totDay.ses+=parseFloat(gv('ta_ses_'+r))||0;
    totDay.chk+=parseFloat(gv('ta_chk_'+r))||0;
    totDay.pub+=parseFloat(gv('ta_pub_'+r))||0;
    totDay.wae+=parseFloat(gv('ta_wae_'+r))||0;
    totDay.son+=parseFloat(gv('ta_son_'+r))||0;
    totDay.auf+=parseFloat(gv('ta_auf_'+r))||0;
    totDay.mini+=parseFloat(gv('ta_mini_'+r))||0;
  }
  var totDayIst=0;
  for(var r2=0;r2<TA_ROWS;r2++){totDayIst+=parseFloat(gv('ta_ist_'+r2))||0;}
  totDay.ist=parseFloat(totDayIst.toFixed(2));
  DATA.lu[hotel][monat].rows[dayKey]=totDay;

  // R1 Transfer
  var isR1=false;
  R1_FIRMS.forEach(function(f){if(f.aktiv!==false&&maName.indexOf(f.kuerzel)>=0)isR1=true;});
  if(isR1){
    if(!DATA.r1[hotel])DATA.r1[hotel]={};
    if(!DATA.r1[hotel][monat])DATA.r1[hotel][monat]={};
    if(!DATA.r1[hotel][monat][day])DATA.r1[hotel][monat][day]=[];
    var r1e=DATA.r1[hotel][monat][day],r1i=-1;
    for(var _i=0;_i<r1e.length;_i++){if(r1e[_i].name===maName){r1i=_i;break;}}
    var entry={name:maName,zi:zi||0,gr:gr||0,chk:chk||0,son:son||0,pub:pub||0,ist:ist>0?parseFloat(ist.toFixed(2)):0};
    if(r1i>=0)r1e[r1i]=entry;else r1e.push(entry);
  }
  // saveData() wird von saveTa() aufgerufen — nicht hier!
}

function taDateChanged(){for(var ri=0;ri<TA_ROWS;ri++)taCalc(ri);}

function saveTa(){
  var hotel=USER.hotel,datum=gv('ta-datum')||'';
  if(!datum){toast('Datum eingeben!','err');return;}
  if(!DATA.ta[hotel])DATA.ta[hotel]={};

  // Erst alle Zeilen neu berechnen
  for(var ri2=0;ri2<TA_ROWS;ri2++){if(getTaName(ri2))taCalc(ri2);}

  // Zeilen sammeln — alle Werte als Zahlen, keine leeren Strings
  var rows=[];
  for(var ri=0;ri<TA_ROWS;ri++){
    var nm=getTaName(ri);if(!nm)continue;
    var row={
      name:String(nm),
      zi:parseFloat(gv('ta_zi_'+ri))||0,
      gr:parseFloat(gv('ta_gr_'+ri))||0,
      ses:parseFloat(gv('ta_ses_'+ri))||0,
      chk:parseFloat(gv('ta_chk_'+ri))||0,
      pub:parseFloat(gv('ta_pub_'+ri))||0,
      wae:parseFloat(gv('ta_wae_'+ri))||0,
      son:parseFloat(gv('ta_son_'+ri))||0,
      auf:parseFloat(gv('ta_auf_'+ri))||0,
      mini:parseFloat(gv('ta_mini_'+ri))||0,
      ist:parseFloat(gv('ta_ist_'+ri))||0
    };
    rows.push(row);
  }

  // In DATA.ta speichern
  DATA.ta[hotel][datum]={datum:datum,hotel:hotel,tl:USER.name,rows:rows,savedAt:Date.now()};

  // ── AUTOMATISCHER TRANSFER in SZ + LU + R1 ──
  var cfg=getCfg(hotel);
  var transferCount=0;
  for(var ri3=0;ri3<TA_ROWS;ri3++){
    if(!getTaName(ri3))continue;
    var zi=parseFloat(gv('ta_zi_'+ri3))||0;
    var gr=parseFloat(gv('ta_gr_'+ri3))||0;
    var chk=parseFloat(gv('ta_chk_'+ri3))||0;
    var pub=parseFloat(gv('ta_pub_'+ri3))||0;
    var son=parseFloat(gv('ta_son_'+ri3))||0;
    var ist=parseFloat(gv('ta_ist_'+ri3))||0;
    taAutoTransfer(ri3,zi,gr,chk,pub,son,ist,cfg);
    transferCount++;
  }

  saveData();

  // ── DIREKT ZU FIREBASE SCHREIBEN ──
  var hk=fbKey(hotel);
  var ts=Date.now();
  // Datum für Firebase-Pfad: Punkte ersetzen
  var datumKey=datum.replace(/\./g,'_').replace(/-/g,'_');

  // 1. Tagesabrechnung direkt schreiben
  var taEntry=DATA.ta[hotel][datum];
  fbPatch('dailyReports/'+hk+'/'+datumKey,taEntry);

  // 2. Stundenzettel direkt schreiben
  if(DATA.sz[hotel])fbPatch('timesheets/'+hk,DATA.sz[hotel]);

  // 3. Leistungsübersicht direkt schreiben
  if(DATA.lu[hotel])fbPatch('leistung/'+hk,DATA.lu[hotel]);

  // 4. Notification für Chef
  fbPatch('notifications/ta_'+ts,{
    typ:'tagesabrechnung',
    hotel:hotel,
    hotelKey:hk,
    datum:datum,
    tl:USER.name,
    count:transferCount,
    ts:ts,
    gelesen:false
  });

  // 5. Hotels Pfad
  if(taEntry)fbPatch('hotels/'+hk+'/ta/'+datumKey,taEntry);
  if(DATA.sz[hotel])fbPatch('hotels/'+hk+'/sz',DATA.sz[hotel]);

  toast('✅ Gespeichert & an Chef gesendet!','ok',4000);
}

function szBuildRows(monat,cfg,maName){
  var tbody=ge('sz-body');if(!tbody)return;
  var hotel=USER.hotel,isRS=hotel.indexOf('Bruhl')>=0;
  var savedTage={};
  if(DATA.sz[hotel]&&DATA.sz[hotel][maName]&&DATA.sz[hotel][maName][monat])
    savedTage=DATA.sz[hotel][maName][monat].tage||{};

  // NRW public holidays for given year/month
  var monParts=monat.split('-'),yr=parseInt(monParts[0]),mo=parseInt(monParts[1]);
  var holidays=getNRWHolidays(yr);

  var rows='';
  for(var day=1;day<=31;day++){
    var sv=savedTage[day]||{};
    // Check if valid day
    var dt=new Date(yr,mo-1,day);
    if(dt.getMonth()!==mo-1){
      // Invalid day (e.g. Feb 30) - show as empty disabled
      rows+='<tr style="opacity:0.2"><td class="sz-nr" style="color:#555">'+day+'</td>';
      rows+='<td colspan="8" style="border:1px solid rgba(30,58,82,0.2)"></td></tr>';
      continue;
    }
    var dow=dt.getDay(); // 0=Sun,6=Sat
    var isSat=dow===6,isSun=dow===0;
    var dateStr=yr+'-'+String(mo).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    var isHoliday=holidays[dateStr]||false;
    var dayName=['So','Mo','Di','Mi','Do','Fr','Sa'][dow];

    var rowBg='';
    var nrStyle='color:var(--muted)';

// NRW Public Holidays calculator
function getNRWHolidays(yr){
  var h={};
  function add(m,d,name){h[yr+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0')]=name;}
  // Easter calculation (Gauss algorithm)
  var a=yr%19,b=Math.floor(yr/100),c2=yr%100;
  var d2=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3);
  var h2=Math.floor(19*a+b-d2-g+15)%30,i=Math.floor(c2/4),k=c2%4;
  var l=(32+2*e+2*i-h2-k)%7;
  var m2=Math.floor((a+11*h2+22*l)/451);
  var easterM=Math.floor((h2+l-7*m2+114)/31);
  var easterD=((h2+l-7*m2+114)%31)+1;
  var easter=new Date(yr,easterM-1,easterD);
  function easterPlus(days){var d3=new Date(easter);d3.setDate(d3.getDate()+days);return d3;}
  function fmtD(d3){return yr+'-'+String(d3.getMonth()+1).padStart(2,'0')+'-'+String(d3.getDate()).padStart(2,'0');}
  // Fixed holidays
  add(1,1,'Neujahr');
  add(5,1,'Tag der Arbeit');
  add(10,3,'Tag der Deutschen Einheit');
  add(11,1,'Allerheiligen');
  add(12,25,'1. Weihnachtstag');
  add(12,26,'2. Weihnachtstag');
  // Easter-based
  h[fmtD(easterPlus(-2))]='Karfreitag';
  h[fmtD(easterPlus(0))]='Ostersonntag';
  h[fmtD(easterPlus(1))]='Ostermontag';
  h[fmtD(easterPlus(39))]='Christi Himmelfahrt';
  h[fmtD(easterPlus(49))]='Pfingstsonntag';
  h[fmtD(easterPlus(50))]='Pfingstmontag';
  h[fmtD(easterPlus(60))]='Fronleichnam';
  return h;
}

function szFmtTime(day){
  var el=ge('sz_von_'+day);if(!el)return;
  var v=el.value.trim();
  if(v&&v.indexOf(':')<0&&v.length>=3&&v.length<=4){el.value=v.slice(0,v.length-2)+':'+v.slice(-2);szCalcRow(day);}
}

function szCalcRow(day){
  var cfg=getCfg(USER.hotel),isRS=USER.hotel.indexOf('Bruhl')>=0;
  var zi=parseFloat(gv('sz_zi_'+day))||0,gr=parseFloat(gv('sz_gr_'+day))||0;
  var ses=parseFloat(gv('sz_ses_'+day))||0,chk=parseFloat(gv('sz_chk_'+day))||0;
  var von=gv('sz_von_'+day)||'09:00';
  var ist=isRS?zi/(cfg.ziH||2.5)+gr/(cfg.aptH||2.0)+ses*(cfg.sesH||1.0)+chk*(cfg.ckMin||4)/60+(cfg.pub||0):zi/(cfg.ziH||2.5)+gr/(cfg.grH||cfg.ziH||2.5)+chk*(cfg.ckMin||4)/60+(cfg.pub||0);
  var istEl=ge('sz_ist_'+day),bisEl=ge('sz_bis_'+day),pauEl=ge('sz_pau_'+day);
  if(istEl)istEl.value=ist>0?ist.toFixed(2):'';
  if(bisEl){var vm=t2m(von);bisEl.value=(vm!==null&&ist>0)?m2t(vm+ist*60+30):'';}
  if(pauEl)pauEl.value=ist>0?'0,50':'';
  var row=ge('szr'+day);if(row)row.classList[ist>0?'add':'remove']('filled');
  szCalcGes();
}

function szCalcGes(){
  var ist=0,zi=0,gr=0;
  for(var d=1;d<=31;d++){ist+=parseFloat(gv('sz_ist_'+d))||0;zi+=parseFloat(gv('sz_zi_'+d))||0;gr+=parseFloat(gv('sz_gr_'+d))||0;}
  function sg(id,v){var e=ge(id);if(e)e.textContent=v;}
  sg('sz-ges-ist',ist?ist.toFixed(2)+' h':'-');sg('sz-ges-zi',zi||'-');
  sg('sz-tbl-ist',ist?ist.toFixed(2)+' h':'-');sg('sz-tbl-zi',zi||'-');sg('sz-tbl-gr',gr||'-');
}

function saveSz(){
  var mon=gv('sz-mon');if(!mon){toast('Monat wählen!','err');return;}
  var hotel=USER.hotel,maName=gv('sz-ma-sel')||USER.name;
  if(!DATA.sz[hotel])DATA.sz[hotel]={};
  if(!DATA.sz[hotel][maName])DATA.sz[hotel][maName]={};

function pgMa(){

  else{

  }
  html+='</div>';

  html+='<div class="card"><div class="card-title">🤒 Krankmeldung erfassen</div>';

  html+='<div class="ff"><label class="lbl">Mitarbeiter</label><select class="inp" id="km-ma">';
  var allMa=[];

  allMa.forEach(function(mn){html+='<option>'+mn+'</option>';});
  html+='</select></div>';
  html+='<div class="ff" style="max-width:140px"><label class="lbl">Krank ab</label><input class="inp" type="date" id="km-von" value="'+new Date().toISOString().slice(0,10)+'"></div>';
  html+='<div class="ff" style="max-width:140px"><label class="lbl">Krank bis (ca.)</label><input class="inp" type="date" id="km-bis"></div>';
  html+='</div>';
  html+='<div style="margin-bottom:8px"><label class="lbl">Krankschein Foto (optional)</label>';
  html+='<div style="margin-top:4px">';
  html+='<label for="km-foto" class="btn sm" style="color:#5b9bd5;border-color:rgba(91,155,213,0.3);display:inline-flex;align-items:center;gap:6px;cursor:pointer">📷 Foto aufnehmen / auswählen</label>';
  html+='<input type="file" id="km-foto" accept="image/*" capture="environment" style="position:absolute;left:-9999px;opacity:0;width:1px;height:1px">';
  html+='<span id="km-foto-name" style="font-size:0.65rem;color:var(--muted);margin-left:8px;display:block;margin-top:4px"></span>';
  html+='<div id="km-foto-preview" style="margin-top:6px"></div></div></div>';
  html+='<div><label class="lbl">Notiz</label><input class="inp" id="km-notiz" placeholder="z.B. Arztbescheinigung liegt vor"></div>';
  html+='<button class="btn primary" id="btn-km-save" style="margin-top:8px">✓ Krankmeldung speichern</button></div>';

  // ── Urlaubsantrag ──
  html+='<div class="card"><div class="card-title">🏖 Urlaubsantrag eintragen</div>';
  html+='<div class="frow">';
  html+='<div class="ff"><label class="lbl">Mitarbeiter</label><select class="inp" id="url-ma">';
  allMa.forEach(function(mn){html+='<option>'+mn+'</option>';});
  html+='</select></div>';
  html+='<div class="ff" style="max-width:140px"><label class="lbl">Von</label><input class="inp" type="date" id="url-von"></div>';
  html+='<div class="ff" style="max-width:140px"><label class="lbl">Bis</label><input class="inp" type="date" id="url-bis"></div>';
  html+='</div>';
  html+='<div style="margin-bottom:8px"><label class="lbl">Notiz</label><input class="inp" id="url-notiz" placeholder="z.B. Jahresurlaub, bereits besprochen"></div>';
  html+='<div style="display:flex;gap:8px">';
  html+='<button class="btn primary" id="btn-url-save">📋 Als Antrag speichern</button>';
  html+='<button class="btn" id="btn-url-sofort" style="color:#4caf7d;border-color:rgba(76,175,125,0.3)">✓ Direkt genehmigen</button>';
  html+='</div></div>';

  // ── Übersicht alle Krankmeldungen/Urlaube ──
  var alleKm=Object.values(kmData).sort(function(a,b){return b.datum>a.datum?1:-1;});
  var alleUrl=Object.values(urlData).sort(function(a,b){return b.von>a.von?1:-1;});
  if(alleKm.length||alleUrl.length){
    html+='<div class="card"><div class="card-title">📋 Alle Meldungen</div>';
    if(alleKm.length){
      html+='<div style="font-size:0.65rem;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.1em">Krankmeldungen</div>';
      html+='<table class="tbl" style="margin-bottom:12px"><thead><tr><th>MA</th><th>Ab</th><th>Bis</th><th>Status</th><th></th></tr></thead><tbody>';
      alleKm.slice(0,20).forEach(function(km){
        html+='<tr><td><b>'+km.name+'</b></td><td>'+km.von+'</td><td>'+(km.bis||'—')+'</td>'
          +'<td style="color:'+(km.beendet?'var(--muted)':'#e05555')+'">'+(km.beendet?'Beendet':'Aktiv')+'</td>'
          +'<td style="display:flex;gap:4px">'
          +'<button class="btn sm" data-km-pdf="'+km.id+'">🖶</button>'
          +(km.beendet?'':'<button class="btn sm" data-km-end="'+km.id+'" style="color:#4caf7d;font-size:0.5rem">Beendet</button>')
          +'<button class="btn danger sm" data-km-del="'+km.id+'" style="font-size:0.5rem">✕</button>'
          +'</td></tr>';
      });
      html+='</tbody></table>';
    }
    if(alleUrl.length){
      html+='<div style="font-size:0.65rem;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.1em">Urlaubsanträge</div>';
      html+='<table class="tbl"><thead><tr><th>MA</th><th>Von</th><th>Bis</th><th>Tage</th><th>Status</th><th></th></tr></thead><tbody>';
      alleUrl.slice(0,20).forEach(function(u){
        var sc=u.status==='genehmigt'?'#4caf7d':u.status==='abgelehnt'?'#e05555':'#d4a843';
        html+='<tr><td><b>'+u.name+'</b></td><td>'+u.von+'</td><td>'+u.bis+'</td><td>'+u.tage+'</td>'
          +'<td style="color:'+sc+';font-weight:700">'+u.status+'</td>'
          +'<td style="display:flex;gap:4px">'
          +'<button class="btn sm" data-url-pdf="'+u.id+'">🖶</button>'
          +(u.status==='wartend'?'<button class="btn sm" data-url-ok="'+u.id+'" style="color:#4caf7d;font-size:0.5rem">✓</button><button class="btn danger sm" data-url-ab="'+u.id+'" style="font-size:0.5rem">✕</button>':'')
          +'<button class="btn danger sm" data-url-del="'+u.id+'" style="font-size:0.5rem">🗑</button>'
          +'</td></tr>';
      });
      html+='</tbody></table>';
    }
    html+='</div>';
  }

  c.innerHTML=html;

  // ── Event Handler ──
  ge('btn-ma-add').onclick=function(){addMa();};

  // Foto-Vorschau (pgMa)
  ge('km-foto').onchange=function(){
    var f=this.files[0];if(!f)return;
    ge('km-foto-name').textContent=f.name;
    var r=new FileReader();
    r.onload=function(e){
      ge('km-foto-preview').innerHTML='<img src="'+e.target.result+'" style="max-width:100%;max-height:150px;border-radius:4px;margin-top:4px">';
      ge('km-foto').setAttribute('data-b64',e.target.result);
    };
    r.readAsDataURL(f);
  };

  // Krankmeldung speichern
  ge('btn-km-save').onclick=function(){
    var name=gv('km-ma');if(!name){toast('Mitarbeiter wählen!','err');return;}
    var von=gv('km-von');if(!von){toast('Datum eingeben!','err');return;}
    var id='km_'+Date.now();
    var foto=ge('km-foto').getAttribute('data-b64')||'';
    kmData[id]={id:id,name:name,hotel:USER.hotel,von:von,bis:gv('km-bis'),
      notiz:gv('km-notiz'),foto:foto,datum:new Date().toLocaleDateString('de-DE'),gesehen:false,beendet:false};
    localStorage.setItem(kmKey,JSON.stringify(kmData));
    // MA im Dienstplan als krank markieren
    toast('✓ Krankmeldung gespeichert! MA wird als krank markiert.','ok');
    pgMa();
  };

  // Urlaubsantrag
  ge('btn-url-save').onclick=function(){urlSave('wartend');};
  ge('btn-url-sofort').onclick=function(){urlSave('genehmigt');};

  function urlSave(status){
    var name=gv('url-ma');if(!name){toast('Mitarbeiter wählen!','err');return;}
    var von=gv('url-von'),bis=gv('url-bis');
    if(!von||!bis){toast('Datum eingeben!','err');return;}
    var tage=Math.round((new Date(bis)-new Date(von))/(1000*60*60*24))+1;
    var id='url_'+Date.now();
    urlData[id]={id:id,name:name,hotel:USER.hotel,von:von,bis:bis,tage:tage,
      notiz:gv('url-notiz'),status:status,datum:new Date().toLocaleDateString('de-DE')};
    localStorage.setItem(urlKey,JSON.stringify(urlData));
    toast(status==='genehmigt'?'✓ Urlaub genehmigt!':'✓ Antrag gespeichert (wartet auf Genehmigung)','ok');
    pgMa();
  }

  // Click-Delegation für alle Buttons
  c.onclick=function(e){
    var t=e.target;
    var idx=t.getAttribute('data-del-ma');
    if(idx!==null&&idx!==''){delMa(parseInt(idx));return;}
    var ei=t.getAttribute('data-edit-ma');
    if(ei!==null&&ei!==''){editMa(parseInt(ei));return;}
    // Krankmeldung-Buttons
    var kg=t.getAttribute('data-km-gesehen');
    if(kg){kmData[kg].gesehen=true;localStorage.setItem(kmKey,JSON.stringify(kmData));pgMa();return;}
    var ke=t.getAttribute('data-km-end');
    if(ke){kmData[ke].beendet=true;localStorage.setItem(kmKey,JSON.stringify(kmData));pgMa();return;}
    var kd=t.getAttribute('data-km-del');
    if(kd){if(confirm('Krankmeldung löschen?')){delete kmData[kd];localStorage.setItem(kmKey,JSON.stringify(kmData));pgMa();}return;}
    var kp=t.getAttribute('data-km-pdf');
    if(kp){kmPdf(kmData[kp]);return;}
    // Urlaub-Buttons
    var uo=t.getAttribute('data-url-ok');
    if(uo){urlData[uo].status='genehmigt';localStorage.setItem(urlKey,JSON.stringify(urlData));toast('✓ Urlaub genehmigt!','ok');pgMa();return;}
    var ua=t.getAttribute('data-url-ab');
    if(ua){urlData[ua].status='abgelehnt';localStorage.setItem(urlKey,JSON.stringify(urlData));toast('Urlaub abgelehnt','info');pgMa();return;}
    var ud=t.getAttribute('data-url-del');
    if(ud){if(confirm('Eintrag löschen?')){delete urlData[ud];localStorage.setItem(urlKey,JSON.stringify(urlData));pgMa();}return;}
    var up=t.getAttribute('data-url-pdf');
    if(up){urlPdf(urlData[up]);return;}
  };
}

function addMa(){
  var name=gv('ma-nm').trim();if(!name){toast('Name eingeben!','err');return;}
  var hotel=USER.hotel;if(!DATA.ma[hotel])DATA.ma[hotel]=[];
  DATA.ma[hotel].push({name:name,pnr:gv('ma-pnr').trim(),rolle:gv('ma-rolle').trim(),satz:gv('ma-satz').trim()});
  saveData();toast('✓ Gespeichert!','ok');pgMa();
}

function editMa(idx){
  var hotel=USER.hotel,m=DATA.ma[hotel][idx];if(!m)return;
  var newName=prompt('Name:',m.name);if(newName===null)return;
  var newPnr=prompt('Personalnummer:',m.pnr||'');
  var newRolle=prompt('Rolle:',m.rolle||'');
  var newSatz=prompt('Stundensatz (€):',m.satz||'');
  DATA.ma[hotel][idx]={name:newName.trim(),pnr:newPnr.trim(),rolle:newRolle.trim(),satz:newSatz.trim()};
  saveData();toast('✓ Geändert!','ok');pgMa();
}

function delMa(idx){if(!confirm('Mitarbeiter löschen?'))return;DATA.ma[USER.hotel].splice(idx,1);saveData();pgMa();}

    +'<div style="text-align:right"><b style="font-size:11pt">KRANKMELDUNG</b><br><span style="font-size:7pt;color:#555">'+km.datum+'</span></div></div>'

    +'<div class="field"><span class="lbl">Notiz</span>'+(km.notiz||'—')+'</div>'

// ── Urlaub PDF ──
function urlPdf(u){
  if(!u)return;

  var css=PRT_BASE+'@page{size:A4 portrait;margin:15mm}.field{border-bottom:1px solid #ccc;padding:4px 0;margin-bottom:4mm;font-size:9pt}.lbl{font-size:6pt;letter-spacing:0.15em;text-transform:uppercase;color:#777;display:block;margin-bottom:1px}';
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>'+css+'</style></head><body>'
    +'<div class="prt-hdr">'+ajLogoHtml(28,17)
    +'<div style="text-align:right"><b style="font-size:11pt">URLAUBSANTRAG</b><br><span style="font-size:7pt;color:#555">'+u.datum+'</span></div></div>'
    +'<h2 style="font-size:13pt;color:#1a3a6b;margin:4mm 0">🏖 Urlaubsantrag</h2>'
    +'<div class="field"><span class="lbl">Mitarbeiter</span>'+u.name+'</div>'
    +'<div class="field"><span class="lbl">Hotel / Einsatzort</span>'+u.hotel+'</div>'
    +'<div class="field"><span class="lbl">Urlaub von</span>'+u.von+'</div>'
    +'<div class="field"><span class="lbl">Urlaub bis</span>'+u.bis+'</div>'
    +'<div class="field"><span class="lbl">Anzahl Tage</span>'+u.tage+' Tage</div>'

// Alle gespeicherten Kalkulationen laden
function kalkGetAll(){
  var all={};
  try{all=JSON.parse(localStorage.getItem('aj_kalk_angebote')||'{}');}catch(e){}
  return all;
}
function kalkSaveAll(all){
  localStorage.setItem('aj_kalk_angebote',JSON.stringify(all));
}

function pgKalk(){
  var c=ge('content');
  var all=kalkGetAll();
  var names=Object.keys(all);

  // ── Neue Kalkulation anlegen ──
  var html='<div class="card">';
  html+='<div class="card-title">💰 Angebots-Kalkulation</div>';
  html+='<div style="font-size:0.62rem;color:var(--muted);margin-bottom:12px">Erstelle Kalkulationen für beliebige Hotels. Gib den Hotelnamen ein und berechne das Angebot.</div>';
  html+='<div class="frow">';
  html+='<div class="ff"><label class="lbl">Hotel / Kunde (Name)</label>';
  html+='<input class="inp" id="kalk-new-name" placeholder="z.B. Hilton Köln, Marriott Düsseldorf..." style="font-size:0.9rem;color:var(--gold);font-weight:700"></div>';
  html+='<div style="display:flex;align-items:flex-end">';
  html+='<button class="btn primary" id="btn-kalk-neu">+ Neue Kalkulation</button>';
  html+='</div></div></div>';

  // ── Gespeicherte Kalkulationen ──
  if(names.length){
    html+='<div class="card"><div class="card-title">Gespeicherte Kalkulationen <span style="font-size:0.7rem;color:var(--muted);font-weight:300">'+names.length+' Hotels</span></div>';
    html+='<table class="tbl"><thead><tr><th>Hotel / Kunde</th><th>Zimmer/Mon.</th><th>Ø Belegung</th><th>Angebotspreis</th><th>Stunden/Mon.</th><th></th></tr></thead><tbody>';
    names.forEach(function(n){
      var d=all[n];
      var totZi=(parseInt(d.dz||0)+parseInt(d.ez||0)+parseInt(d.apt||0)+parseInt(d.suite||0));
      var belZi=Math.round(totZi*(parseFloat(d.belegung||70)/100));
      var stunden=kalkCalcStunden(d);
      var preis=kalkCalcPreis(d);
      html+='<tr>';
      html+='<td><b style="color:var(--gold)">'+n+'</b></td>';
      html+='<td>'+belZi+'</td>';
      html+='<td>'+(d.belegung||70)+' %</td>';
      html+='<td style="color:#81c784;font-weight:700">'+preis.toFixed(2)+' €</td>';
      html+='<td>'+stunden.toFixed(1)+' h</td>';
      html+='<td style="display:flex;gap:4px">';
      html+='<button class="btn sm" data-kalk-open="'+encodeURIComponent(n)+'">✏ Öffnen</button>';
      html+='<button class="btn sm" data-kalk-pdf="'+encodeURIComponent(n)+'" style="color:#5b9bd5">🖶</button>';
      html+='<button class="btn danger sm" data-kalk-del="'+encodeURIComponent(n)+'">✕</button>';
      html+='</td></tr>';
    });
    html+='</tbody></table></div>';
  }

  // ── Kalkulations-Formular ──
  html+='<div id="kalk-form-wrap"></div>';

  c.innerHTML=html;

  ge('btn-kalk-neu').onclick=function(){
    var name=gv('kalk-new-name').trim();
    if(!name){toast('Bitte Hotelnamen eingeben!','err');return;}
    var all2=kalkGetAll();
    if(!all2[name])all2[name]=kalkDefault();
    kalkSaveAll(all2);
    kalkOpenForm(name,all2[name]);
  };

  c.onclick=function(e){
    var t=e.target;
    var ko=t.getAttribute('data-kalk-open');
    var kd=t.getAttribute('data-kalk-del');
    var kp=t.getAttribute('data-kalk-pdf');
    if(ko){var n2=decodeURIComponent(ko);var all3=kalkGetAll();kalkOpenForm(n2,all3[n2]||kalkDefault());return;}
    if(kd){var n3=decodeURIComponent(kd);if(confirm('Kalkulation "'+n3+'" löschen?')){var all4=kalkGetAll();delete all4[n3];kalkSaveAll(all4);pgKalk();}return;}
    if(kp){var n4=decodeURIComponent(kp);var all5=kalkGetAll();kalkPrintAngebot(n4,all5[n4]||{});return;}
  };
}

function kalkDefault(){
  return {
    dz:100,ez:0,apt:0,suite:0,
    belegung:70,
    gr_tag:2,pub_std:2,son_std:0,
    ziPreis:6.50,grPreis:28.00,pubPreis:18.00,sonPreis:18.00,
    stSatz:14.50,
    aufschlag:15,
    notizen:''
  };
}

function kalkCalcStunden(d){
  var bel=parseFloat(d.belegung||70)/100;
  var dz=parseInt(d.dz||0),ez=parseInt(d.ez||0),apt=parseInt(d.apt||0),suite=parseInt(d.suite||0);
  var totZi=dz+ez+apt+suite;
  var ziTag=Math.round(totZi*bel);
  var tage=26;
  var ziMon=ziTag*tage;
  var grMon=(parseInt(d.gr_tag||2))*tage;
  var pubMon=(parseFloat(d.pub_std||2))*tage;
  var sonMon=parseFloat(d.son_std||0)*tage;
  var stunden=ziMon/2.5+grMon/2.5+pubMon+sonMon;
  return stunden;
}

function kalkCalcPreis(d){
  var bel=parseFloat(d.belegung||70)/100;
  var dz=parseInt(d.dz||0),ez=parseInt(d.ez||0),apt=parseInt(d.apt||0),suite=parseInt(d.suite||0);
  var totZi=dz+ez+apt+suite;
  var ziTag=Math.round(totZi*bel);
  var tage=26;
  var ziMon=ziTag*tage;
  var grMon=parseInt(d.gr_tag||2)*tage;
  var pubMon=parseFloat(d.pub_std||2)*tage;
  var sonMon=parseFloat(d.son_std||0)*tage;
  var netto=ziMon*(parseFloat(d.ziPreis||6.5))+grMon*(parseFloat(d.grPreis||28))+pubMon*(parseFloat(d.pubPreis||18))+sonMon*(parseFloat(d.sonPreis||18));
  var auf=parseFloat(d.aufschlag||15)/100;
  return netto*(1+auf);
}

function dpCalcHours(t){
  if(!t||t.indexOf('-')<0)return null;
  var p=t.split('-'),a=(p[0]||'').trim(),b=(p[1]||'').trim();
  var am=a.split(':'),bm=b.split(':');
  if(am.length<2||bm.length<2)return null;
  var diff=(parseInt(bm[0])*60+parseInt(bm[1]))-(parseInt(am[0])*60+parseInt(am[1]));
  return diff>0?+(Math.max(0,diff/60-DP_PAUSE).toFixed(2)):null;
}

function dpOpenModal(ri,di,name){
  var az=document.getElementById('dpaz'+ri+'_'+di);

  var cur=az?az.value:'',curSt=st?st.value:'';

  document.getElementById('dp-modal-time').value=cur;
  document.getElementById('dp-modal-ri').value=ri;
  document.getElementById('dp-modal-di').value=di;
  ['ARBEIT','FREI','URLAUB','KRANK'].forEach(function(s){
    var b=document.getElementById('dp-modal-btn-'+s);
    if(b){var _active=(s==='ARBEIT'&&!curSt)||(s===curSt);if(_active)b.classList.add('active');else b.classList.remove('active');}
  });
  m.style.display='flex';
  // Attach events via addEventListener (no inline onclick needed)
  var timeInp=document.getElementById('dp-modal-time');
  if(timeInp){
    timeInp.onkeydown=function(e){if((e.keyCode||e.which)==13)dpModalOk();};
    setTimeout(function(){timeInp.focus();timeInp.select();},80);
  }
  // Quick time buttons
  var qWrap=document.getElementById('dpm-quick-btns');
  if(qWrap){
    qWrap.innerHTML='';
    DP_QUICK_TIMES.forEach(function(t){
      var btn=document.createElement('button');
      btn.className='dpm-qbtn';
      btn.textContent=t;
      btn.onclick=function(){dpModalQuick(t);};
      qWrap.appendChild(btn);
    });
  }
  // Status buttons
  var stBtns=document.querySelectorAll('.dpm-stbtn');
  for(var _i=0;_i<stBtns.length;_i++){
    (function(btn){
      btn.onclick=function(){dpModalSetStatus(btn.getAttribute('data-st'));};
    })(stBtns[_i]);
  }
  // OK / Cancel
  var okBtn=document.getElementById('dpm-ok-btn');
  var cancelBtn=document.getElementById('dpm-cancel-btn');
  if(okBtn) okBtn.onclick=dpModalOk;
  if(cancelBtn) cancelBtn.onclick=dpModalClose;

function dpRefreshRowTotal(ri){
  var tot=0,any=false;
  for(var di=0;di<7;di++){
    var stV=gv('dpst'+ri+'_'+di);
    if(stV==='FREI'||stV==='URLAUB'||stV==='KRANK')continue;
    var h=dpCalcHours(gv('dpaz'+ri+'_'+di));
    if(h!==null){tot+=h;any=true;}
  }

function dpCalc(){
  var hotel=USER?USER.hotel:'';
  var cfg=getCfg(hotel);
  var zpm=parseInt(gv('dp-zpm'))||cfg.zpma||15;
  var maxR=dpRowCount(hotel);
  for(var i=0;i<7;i++){
    var ab=parseInt(gv('dpab'+i))||0,bl=parseInt(gv('dpbl'+i))||0,zi=ab+bl;
    var el=document.getElementById('dpma'+i);if(!el)continue;
    if(!zi){
      el.innerHTML='<span style="color:var(--muted);font-size:0.7rem">—</span>';
      el.style.background='';
      continue;
    }
    var need=Math.ceil(zi/zpm),active=0;
    for(var ri=0;ri<maxR;ri++){
      var nm=document.getElementById('dpnm'+ri);
      if(!nm||!nm.value.trim())continue;
      var stV=gv('dpst'+ri+'_'+i);
      if(!stV||stV==='')active++;
    }
    var ok=active>=need,diff=active-need;
    var color=ok?'var(--green)':active>0?'var(--gold2)':'var(--red)';
    var bg=ok?'rgba(76,175,125,0.1)':active>0?'rgba(212,168,67,0.08)':'rgba(224,85,85,0.1)';
    el.style.background=bg;
    el.innerHTML='<b style="font-family:Georgia,serif;font-size:0.9rem;font-weight:900;color:'+color+';display:block;line-height:1.1">'+need+'</b>'
      +'<span style="font-size:0.46rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);display:block">MA</span>'
      +'<span style="font-size:0.5rem;color:'+(ok?'var(--green)':'var(--red)')+'">'+active+(diff>=0?' ✓':' !')+'</span>';
  }
  for(var ri2=0;ri2<maxR;ri2++)dpRefreshRowTotal(ri2);
}

function r1CalcDay(mk,day,maName){
  var cfg=getCfg(USER.hotel);
  var isRS=USER.hotel.indexOf('Bruhl')>=0;
  var zi=parseFloat(gv('r1_'+mk+'_zi_'+day))||0;
  var gr=parseFloat(gv('r1_'+mk+'_gr_'+day))||0;
  var chk=parseFloat(gv('r1_'+mk+'_chk_'+day))||0;
  var son=parseFloat(gv('r1_'+mk+'_son_'+day))||0;
  var ist=isRS?zi/(cfg.ziH||2.5)+gr/(cfg.aptH||2.0)+chk*cfg.ckMin/60:zi/cfg.ziH+gr/(cfg.grH||cfg.ziH)+chk*cfg.ckMin/60+son;
  var el=document.getElementById('r1_'+mk+'_ist_'+day);
  if(el) el.value=ist>0?ist.toFixed(2):'';
  var hotel=USER.hotel;
  var mon=gv('r1-mon')||new Date().toISOString().slice(0,7);
  if(!DATA.r1[hotel]) DATA.r1[hotel]={};
  if(!DATA.r1[hotel][mon]) DATA.r1[hotel][mon]={};
  if(!DATA.r1[hotel][mon][day]) DATA.r1[hotel][mon][day]=[];
  var entries=DATA.r1[hotel][mon][day],idx=-1;
  for(var i=0;i<entries.length;i++){if(entries[i].name===maName){idx=i;break;}}
  var entry={name:maName,zi:zi,gr:gr,chk:chk,son:son,ist:ist>0?ist:0};
  if(idx>=0) entries[idx]=entry; else entries.push(entry);
  saveData();
}

function r1CalcDayEl(el){
  var mk=el.getAttribute('data-mk');
  var day=parseInt(el.getAttribute('data-day'));
  var maName=el.getAttribute('data-ma');

}

function mbCalc(){
  var zi=parseFloat(gv('mb-zi'))||0;
  var std=zi*MB_MIN_PRO_ZI/60,bet=zi*MB_PREIS_ZI;
  var se=document.getElementById('mb-std'),be=document.getElementById('mb-bet');
  if(se) se.value=std>0?std.toFixed(2)+' h':'';
  if(be) be.value=bet>0?bet.toFixed(2)+' €':'';
}

function mbAdd(){
  var hotel=USER.hotel,zi=gv('mb-zi')||'',dat=gv('mb-dat')||'',ma=gv('mb-ma')||'';
  if(!zi){toast('Zimmer eingeben!','err');return;}
  var std=(parseFloat(zi)||0)*MB_MIN_PRO_ZI/60,bet=(parseFloat(zi)||0)*MB_PREIS_ZI;
  var mon='';
  if(dat.indexOf('.')>=0){var p=dat.split('.');mon=(p[2]||new Date().getFullYear())+'-'+String(p[1]||1).padStart(2,'0');}
  else mon=new Date().toISOString().slice(0,7);
  if(!DATA.mb) DATA.mb={};
  if(!DATA.mb[hotel]) DATA.mb[hotel]={};
  if(!DATA.mb[hotel][mon]) DATA.mb[hotel][mon]=[];
  DATA.mb[hotel][mon].push({dat:dat,zi:zi,std:std.toFixed(2),betrag:bet.toFixed(2),ma:ma});
  saveData(); toast('✓ Minibar gespeichert!','ok'); pgMb();
}

function mbDel(mon,idx){
  var hotel=USER.hotel;
  if(!DATA.mb||!DATA.mb[hotel]||!DATA.mb[hotel][mon]) return;
  DATA.mb[hotel][mon].splice(idx,1);saveData();pgMb();
}

function saveProd(){
  var customCfg={};
  try{customCfg=JSON.parse(localStorage.getItem('aj_prod_cfg')||'{}');}catch(e){}
  Object.keys(HOTELS).forEach(function(h){
    var hk=h.replace(/[^a-zA-Z0-9]/g,'_');
    var ov={};
    ['ziH','grH','aptH','sesH','ckMin','zpma','pub'].forEach(function(field){
      var el=document.getElementById('prod_'+hk+'_'+field);
      if(el&&el.value!=='') ov[field]=parseFloat(el.value)||0;
    });
    customCfg[h]=ov;
    // Apply live to HOTELS
    Object.assign(HOTELS[h],ov);
  });
  localStorage.setItem('aj_prod_cfg',JSON.stringify(customCfg));
  toast('✓ Produktivitätsdaten gespeichert!','ok');
}

function resetProd(){

  toast('✓ Zurückgesetzt auf Standard','ok');
  pgProd();
}

function sigInit(id,hintId,statId){
  var canvas=document.getElementById(id);
  if(!canvas) return;
  var ctx=canvas.getContext('2d');
  var drawing=false;
  var rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=(rect.width||300)*window.devicePixelRatio;
  canvas.height=80*window.devicePixelRatio;
  canvas.style.width=(rect.width||300)+'px';
  canvas.style.height='80px';
  ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
  ctx.strokeStyle='#c8a84b'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.lineJoin='round';
  function pos(e){var r=canvas.getBoundingClientRect();var src=e.touches?e.touches[0]:e;return{x:src.clientX-r.left,y:src.clientY-r.top};}
  function start(e){e.preventDefault();drawing=true;var p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);var h=document.getElementById(hintId);if(h)h.style.opacity='0';}
  function move(e){if(!drawing)return;e.preventDefault();var p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();var s=document.getElementById(statId);if(s)s.textContent='✓ Unterschrift OK';}
  function end(e){e.preventDefault();drawing=false;}
  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',end,{passive:false});
}

function sigClear(id,hintId,statId){
  var canvas=document.getElementById(id);
  if(!canvas) return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
  var h=document.getElementById(hintId);if(h)h.style.opacity='1';
  var s=document.getElementById(statId);if(s)s.textContent='';
}

function prtBase(inner){
  // iOS Safari: iframe ist zuverlässiger als div für Druck
  var existingIframe=ge('print-iframe');
  if(existingIframe)existingIframe.parentNode.removeChild(existingIframe);

  var iframe=document.createElement('iframe');
  iframe.id='print-iframe';
  iframe.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:99999;background:#fff;';
  document.body.appendChild(iframe);

  // Dokument in iframe schreiben
  var doc=iframe.contentDocument||iframe.contentWindow.document;
  doc.open();
  doc.write(inner);
  doc.close();

  // Warten bis iframe geladen ist
  iframe.onload=function(){
    setTimeout(function(){
      try{
        iframe.contentWindow.focus();
        iframe.contentWindow.print();
      }catch(e){
        window.print();
      }
      // Aufräumen nach Druck
      setTimeout(function(){
        if(iframe.parentNode)iframe.parentNode.removeChild(iframe);
      },1500);
    },300);
  };

  // Fallback wenn onload nicht feuert
  setTimeout(function(){
    if(document.getElementById('print-iframe')){
      try{iframe.contentWindow.print();}catch(e){window.print();}
      setTimeout(function(){
        if(iframe.parentNode)iframe.parentNode.removeChild(iframe);
      },1500);
    }
  },1000);
}

  var cp=ge('chef-pw');if(cp)cp.onkeydown=function(e){if(e.keyCode===13)loginChef();};
