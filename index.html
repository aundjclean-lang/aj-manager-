  // iOS install
  var isIos=/iphone|ipad|ipod/i.test(navigator.userAgent||'');
  var isSafari=/safari/i.test(navigator.userAgent||'')&&!/chrome/i.test(navigator.userAgent||'');
  var isStandalone=window.navigator.standalone===true;
  if(isIos&&isSafari&&!isStandalone){
    setTimeout(function(){var h=ge('aj-ios');if(h)h.style.display='flex';},3500);
  }

  // Global event delegation for dynamic inline-onclick content
  // This handles onclick="fnName(args)" calls inside innerHTML strings
  document.addEventListener('click',function(e){
    var el=e.target;
    // Walk up to find element with onclick attribute (set via innerHTML)
    while(el&&el!==document.body){
      var oc=el.getAttribute&&el.getAttribute('onclick');
      if(oc){
        // Already handled by browser if it's a real onclick attribute
        // This is just a safety net - real fix is in saveDp/dpWhatsApp aliases below
        break;
      }
      el=el.parentNode;
    }
  });

  // Alias functions that may be called from inline onclick in innerHTML
  // (saveDp, dpWhatsApp, dienstplanPdf used in pgDp html strings)
  window.saveDp=function(){if(typeof dpSaveNew==='function')dpSaveNew();};
  window.dpWhatsApp=function(){if(typeof dpWhatsAppNew==='function')dpWhatsAppNew();};
  window.dienstplanPdf=function(){if(typeof dpPrintNew==='function')dpPrintNew();};
  window.dashPrintToday=function(){if(typeof _dashPrintToday==='function')_dashPrintToday();};

  // Chef-Passwort Ersteinrichtungs-Hinweis
  var firstRun=!localStorage.getItem('aj_chef_pw2');
  if(firstRun){
    // Kein Passwort gesetzt = erster Start. Setze leeres PW damit Login funktioniert.
    localStorage.setItem('aj_chef_pw2','');
  }

  // ============================================================
  // PUSH BENACHRICHTIGUNGEN — Echtzeit, auch wenn App zu ist
  // ============================================================

  // VAPID Public Key (für Web Push)
  var VAPID_PUBLIC='BEl62iUYgUivxIkv69yViEuiBIa-Ib9-SkvMeAtA3LFgDzkrxZJjSgSnfckjZJnRpGt2VFUI6WlPaLEbPM2O7R4';

  // Service Worker mit Push registrieren
  var SW_REG=null;

  function urlBase64ToUint8(b64){
    var p=(4-(b64.length%4))%4;
    var s=b64.replace(/-/g,'+').replace(/_/g,'/').padEnd(b64.length+p,'=');
    var r=atob(s),a=new Uint8Array(r.length);
    for(var i=0;i<r.length;i++)a[i]=r.charCodeAt(i);
    return a;
  }

  function initPush(){
    if(!('serviceWorker' in navigator)||!('PushManager' in window))return;
    navigator.serviceWorker.ready.then(function(reg){
      SW_REG=reg;
      // Wenn Chef und Berechtigung schon erteilt: automatisch subscriben
      if(USER&&USER.role==='chef'&&Notification.permission==='granted'){
        subscribePush(reg);
      }
    });
  }

  function subscribePush(reg){
    if(!reg||!reg.pushManager)return;
    reg.pushManager.getSubscription().then(function(sub){
      if(sub){
        // Bereits subscribed — in Firebase speichern
        savePushSub(sub);
        return;
      }
      reg.pushManager.subscribe({
        userVisibleOnly:true,
        applicationServerKey:urlBase64ToUint8(VAPID_PUBLIC)
      }).then(function(sub){
        savePushSub(sub);
        toast('🔔 Push-Benachrichtigungen aktiv!','ok');
      }).catch(function(){});
    });
  }

  function savePushSub(sub){
    // Push-Subscription in Firebase speichern damit Server sie findet
    if(!sub||!FB_URL||FB_DISABLED)return;
    var subObj=JSON.parse(JSON.stringify(sub));
    fbPatch('push_subs/chef',{
      endpoint:subObj.endpoint,
      keys:subObj.keys,
      name:USER.name||'Chef',
      updatedAt:Date.now()
    });
    localStorage.setItem('aj_push_sub',JSON.stringify(subObj));
  }

  // Benachrichtigungs-Erlaubnis anfragen
  function requestNotifPermission(){
    if(!('Notification' in window)){toast('Benachrichtigungen nicht unterstützt','err');return;}
    if(Notification.permission==='granted'){
      toast('🔔 Bereits aktiv!','ok');
      if(SW_REG)subscribePush(SW_REG);
      if(ge('btn-notif-req'))ge('btn-notif-req').style.color='#4caf7d';
      return;
    }
    Notification.requestPermission().then(function(perm){
      if(perm==='granted'){
        localStorage.setItem('aj_notif','1');
        toast('🔔 Benachrichtigungen aktiviert!','ok');
        // Test-Benachrichtigung sofort
        new Notification('A&J Manager ✅',{
          body:'Benachrichtigungen aktiv! Du wirst sofort informiert.',
          icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🏨</text></svg>',
          requireInteraction:false
        });
        if(SW_REG)subscribePush(SW_REG);
        if(ge('btn-notif-req')){ge('btn-notif-req').textContent='🔔 Benachrichtigungen: granted';ge('btn-notif-req').style.color='#4caf7d';}
      } else {
        toast('Benachrichtigungen abgelehnt — bitte in iPhone-Einstellungen aktivieren','err',5000);
      }
    });
  }

  // Lokale Benachrichtigung (wenn App offen)
  window.ajNotify=function(title,body){
    if(!('Notification' in window)||Notification.permission!=='granted')return;
    try{
      new Notification(title,{
        body:body,
        icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🏨</text></svg>',
        tag:'aj-'+Date.now(),
        requireInteraction:true,
        vibrate:[200,100,200]
      });
    }catch(e){}
  };

  // Neue Daten in Firebase erkennen → sofort benachrichtigen
  var _lastDataKeys={};
  var _firstPoll=true;
  var _lastNotifTs=Date.now();

  function checkFbNewData(hotelData){
    if(!USER||USER.role!=='chef')return;
    if(Notification.permission!=='granted')return;
    if(_firstPoll){
      Object.keys(hotelData||{}).forEach(function(hk){
        var hd=hotelData[hk]||{};
        if(hd.ta)Object.keys(hd.ta).forEach(function(d){_lastDataKeys['ta_'+hk+'_'+d]=true;});
      });
      _firstPoll=false;
      return;
    }
    Object.keys(hotelData||{}).forEach(function(hk){
      var hd=hotelData[hk]||{};
      var hotelName=Object.keys(HOTELS).find(function(h){return fbKey(h)===hk;})||hk;
      if(hd.ta){
        Object.keys(hd.ta).forEach(function(datum){
          var key='ta_'+hk+'_'+datum;
          if(!_lastDataKeys[key]){
            _lastDataKeys[key]=true;
            ajNotify('📋 Neue Tagesabrechnung!',hotelName+'\n'+datum);
          }
        });
      }
    });
  }

  // Zusätzlich: notifications Pfad in Firebase pollen (alle Hotels)
  function checkFbNotifications(){
    if(!USER||USER.role!=='chef')return;
    if(FB_DISABLED)return;
    // Notifications (Tagesabrechnung etc.)
    fbGet('notifications',function(notifs){
      if(!notifs||typeof notifs!=='object')return;
      Object.keys(notifs).forEach(function(nid){
        var n=notifs[nid];
        if(!n||!n.ts)return;
        if(n.ts>_lastNotifTs){
          _lastNotifTs=n.ts;
          if(n.typ==='tagesabrechnung'){
            ajNotify('📋 Neue Tagesabrechnung!',(n.hotel||'')+' · '+(n.datum||'')+'\nTeamleader: '+(n.tl||''));
            toast('📋 '+( n.hotel||'')+' · '+(n.datum||''),'info',4000);
            if(currentTab==='dash')pgDash();
          }
        }
      });
    });
    // Krankmeldungen von Firebase holen und mergen
    fbGet('global/krankmeldung',function(fbKm){
      if(!fbKm||typeof fbKm!=='object')return;
      var local={};
      try{local=JSON.parse(localStorage.getItem('aj_krankmeldung')||'{}');}catch(e){}
      var changed=false;
      Object.keys(fbKm).forEach(function(kid){
        if(!local[kid]){
          local[kid]=fbKm[kid];
          changed=true;
          // Neue KM — benachrichtigen!
          var k=fbKm[kid];
          ajNotify('🤒 Neue Krankmeldung!',(k.name||'?')+' · '+(k.hotel||'')+'\nAb: '+(k.von||''));
          toast('🤒 Krankmeldung: '+(k.name||'?')+' · '+(k.hotel||''),'info',5000);
          if(currentTab==='dash')setTimeout(pgDash,500);
        }
      });
      if(changed)localStorage.setItem('aj_krankmeldung',JSON.stringify(local));
    });
    // Urlaubsanträge von Firebase holen
    fbGet('global/urlaub',function(fbUrl){
      if(!fbUrl||typeof fbUrl!=='object')return;
      var local2={};
      try{local2=JSON.parse(localStorage.getItem('aj_urlaub')||'{}');}catch(e){}
      var changed2=false;
      Object.keys(fbUrl).forEach(function(uid){
        if(!local2[uid]){
          local2[uid]=fbUrl[uid];
          changed2=true;
          var u=fbUrl[uid];
          ajNotify('🏖 Neuer Urlaubsantrag!',(u.name||'?')+' · '+(u.hotel||'')+'\n'+u.von+' – '+u.bis);
          toast('🏖 Urlaubsantrag: '+(u.name||'?'),'info',5000);
          if(currentTab==='dash')setTimeout(pgDash,500);
        }
      });
      if(changed2)localStorage.setItem('aj_urlaub',JSON.stringify(local2));
    });
  }

  // Firebase Poll: nach jedem Sync neue Daten prüfen
  var _origFbPollNow=fbPollNow;
  fbPollNow=function(){
    _origFbPollNow();
    setTimeout(function(){
      if(USER&&USER.role==='chef'){
        var combined={};
        Object.keys(HOTELS).forEach(function(h){
          combined[fbKey(h)]={ta:DATA.ta[h]||{}};
        });
        checkFbNewData(combined);
        checkFbNotifications();
      }
    },2000);
  };

  // Krankmeldungs-Check auch lokal
  var _lastKmKeys={};
  function checkNewKrankmeldung(){
    if(!USER||USER.role!=='chef')return;
    var km={};
    try{km=JSON.parse(localStorage.getItem('aj_krankmeldung')||'{}');}catch(e){}
    Object.keys(km).forEach(function(kid){
      if(!_lastKmKeys[kid]){
        if(Object.keys(_lastKmKeys).length>0){ // Nicht beim ersten Laden
          var k=km[kid];
          ajNotify('🤒 Krankmeldung!',(k.name||'')+' · '+(k.hotel||''));
        }
        _lastKmKeys[kid]=true;
      }
    });
  }

  // Service Worker registrieren (offline + Push)
  if('serviceWorker' in navigator){
    try{
      var swCode=
        "var CACHE='aj-v7';"
        +"self.addEventListener('install',function(e){"
        +"  e.waitUntil(caches.open(CACHE).then(function(c){return c.add(self.location.href);}).then(function(){return self.skipWaiting();}));"
        +"});"
        +"self.addEventListener('activate',function(e){"
        +"  e.waitUntil(caches.keys().then(function(keys){"
        +"    return Promise.all(keys.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));"
        +"  }).then(function(){return self.clients.claim();}));"
        +"});"
        +"self.addEventListener('fetch',function(e){"
        +"  e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request).catch(function(){return caches.match(self.location.href);});}));"
        +"});"
        // Push empfangen — auch wenn App zu ist!
        +"self.addEventListener('push',function(e){"
        +"  var d={};"
        +"  try{d=e.data.json();}catch(err){d={title:'A&J Manager',body:e.data?e.data.text():'Neue Eingabe'};}"
        +"  var opts={"
        +"    body:d.body||'Neue Eingabe im System',"
        +"    icon:'data:image/svg+xml,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 100\"><text y=\".9em\" font-size=\"90\">🏨</text></svg>',"
        +"    badge:'data:image/svg+xml,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 100\"><text y=\".9em\" font-size=\"90\">🔔</text></svg>',"
        +"    requireInteraction:true,"
        +"    vibrate:[300,100,300,100,300],"
        +"    data:{url:self.location.origin}"
        +"  };"
        +"  e.waitUntil(self.registration.showNotification(d.title||'A&J Manager',opts));"
        +"});"
        // Klick auf Benachrichtigung → App öffnen
        +"self.addEventListener('notificationclick',function(e){"
        +"  e.notification.close();"
        +"  e.waitUntil(clients.matchAll({type:'window'}).then(function(cs){"
        +"    if(cs.length)return cs[0].focus();"
        +"    return clients.openWindow(e.notification.data&&e.notification.data.url?e.notification.data.url:self.location.origin);"
        +"  }));"
        +"});";

      var blob=new Blob([swCode],{type:'application/javascript'});
      var swUrl=URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).then(function(reg){
        SW_REG=reg;
        // Push initialisieren wenn Chef eingeloggt
        if(USER&&USER.role==='chef'&&Notification.permission==='granted'){
          subscribePush(reg);
        }
      }).catch(function(){});
    }catch(e){}
  }

  // Chef-Login: Benachrichtigungen automatisch anfragen
  var _origLoginChef=loginChef;
  loginChef=function(){
    _origLoginChef();
    setTimeout(function(){
      if(USER&&USER.role==='chef'){
        initPush();
        if(Notification.permission==='default'){
          requestNotifPermission();
        } else if(Notification.permission==='granted'){
          if(SW_REG)subscribePush(SW_REG);
        }
      }
    },1500);
  };

  // Krankmeldungs-Check alle 8s
  setInterval(function(){
    if(USER&&USER.role==='chef')checkNewKrankmeldung();
  },8000);

  // Benachrichtigung senden (lokal, wenn App offen)
  window.ajNotify=function(title,body){
    if(!('Notification' in window)||Notification.permission!=='granted')return;
    try{
      new Notification(title,{
        body:body,
        icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🏨</text></svg>',
        badge:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🔔</text></svg>',
        tag:'aj-'+Date.now(),
        requireInteraction:false
      });
    }catch(e){}
  };

  // Chef benachrichtigen wenn neues Datum in Firebase erscheint
  var _lastFbKeys={};
  function checkFbNewData(data){
    if(!USER||USER.role!=='chef')return;
    if(Notification.permission!=='granted')return;
    Object.keys(data||{}).forEach(function(hk){
      var hd=data[hk];if(!hd)return;
      // Neue Tagesabrechnung?
      if(hd.ta){
        Object.keys(hd.ta).forEach(function(datum){
          var key='ta_'+hk+'_'+datum;
          if(!_lastFbKeys[key]){
            _lastFbKeys[key]=true;
            // Nur bei wirklich neuen Einträgen (nicht beim ersten Laden)
            if(Object.keys(_lastFbKeys).length>1){
              var hotelName=Object.keys(HOTELS).find(function(h){return fbKey(h)===hk;})||hk;
              ajNotify('📋 Neue Tagesabrechnung',hotelName+' · '+datum);
            }
          }
        });
      }
      // Neue Krankmeldung?
      if(hd.krankmeldung){
        Object.keys(hd.krankmeldung||{}).forEach(function(kid){
          var key='km_'+kid;
          if(!_lastFbKeys[key]){
            _lastFbKeys[key]=true;
            if(Object.keys(_lastFbKeys).length>1){
              var km=hd.krankmeldung[kid];
              ajNotify('🤒 Neue Krankmeldung',( km.name||'')+' · '+(km.hotel||'')+' · ab '+( km.von||''));
            }
          }
        });
      }
    });
  }

  // In fbPollNow einbinden — wird nach jedem Poll aufgerufen
  var _origFbPollNow=fbPollNow;
  fbPollNow=function(){
    _origFbPollNow();
    // Nach kurzer Verzögerung neue Daten prüfen
    setTimeout(function(){
      if(USER&&USER.role==='chef'&&DATA){
        var combined={};
        Object.keys(HOTELS).forEach(function(hk){
          combined[fbKey(hk)]={ta:DATA.ta[hk]||{}};
        });
        checkFbNewData(combined);
      }
    },2000);
  };

  // Chef-Login: Benachrichtigungen anfragen
  var origLoginChef=loginChef;
  loginChef=function(){
    origLoginChef();
    setTimeout(function(){
      if(USER&&USER.role==='chef')requestNotifPermission();
    },1000);
  };

  // Service Worker (offline support + Push)
  if('serviceWorker' in navigator){
    try{
      var swCode="var C='aj-v6';"
        +"self.addEventListener('install',function(e){e.waitUntil(caches.open(C).then(function(c){return c.add(self.location.href);}).then(function(){return self.skipWaiting();}));});"
        +"self.addEventListener('activate',function(e){e.waitUntil(caches.keys().then(function(keys){return Promise.all(keys.filter(function(k){return k!==C;}).map(function(k){return caches.delete(k);}));}).then(function(){return self.clients.claim();}));});"
        +"self.addEventListener('fetch',function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request).catch(function(){return caches.match(self.location.href);});}));});"
        // Push-Empfang im Service Worker
        +"self.addEventListener('push',function(e){var d=e.data?e.data.json():{};e.waitUntil(self.registration.showNotification(d.title||'A&J Manager',{body:d.body||'Neue Eingabe',icon:'/icon.png',badge:'/icon.png',requireInteraction:true}));});"
        +"self.addEventListener('notificationclick',function(e){e.notification.close();e.waitUntil(clients.openWindow(self.location.origin));});";
      var blob=new Blob([swCode],{type:'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(blob)).then(function(reg){
        // Service Worker registriert
        if(reg)localStorage.setItem('aj_sw','1');
      }).catch(function(){});
    }catch(e){}
  }
});

</script>
</body>
</html>
